<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dental Quiz Trainer</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:#e5e7eb;
text-align:center;
}

header{
background:#111827;
padding:18px;
font-size:20px;
font-weight:bold;
}

.container{
padding:20px;
}

.case{
background:#1f2937;
padding:20px;
border-radius:12px;
margin-bottom:15px;
font-size:18px;
}

.btn{
display:block;
margin:10px auto;
padding:12px;
width:90%;
max-width:400px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
background:#374151;
color:white;
}

.btn:hover{
background:#4b5563;
}

.correct{
background:#16a34a !important;
}

.wrong{
background:#dc2626 !important;
}

.next{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:8px;
background:#38bdf8;
font-weight:bold;
cursor:pointer;
display:none;
}

</style>
</head>

<body>

<header>🦷 Dental Quiz Trainer</header>

<div class="container">

<div id="question" class="case"></div>

<div id="answers"></div>

<button class="next" id="nextBtn" onclick="nextQ()">السؤال التالي</button>

</div>

<script>

const data = [
{
q:"مريض يعاني من ألم شديد مع تسوس عميق",
options:[
"التهاب لب غير عكوس",
"التهاب لثة بسيط",
"تآكل مينا"
],
answer:0
},
{
q:"نزف لثة + جيوب 5mm",
options:[
"التهاب دواعم سن مزمن",
"تسوس سطحي",
"كسر تاجي"
],
answer:0
},
{
q:"ألم ضرس عقل مع انطمار",
options:[
"انطمار ضرس عقل",
"التهاب جيوب أنفية",
"تسوس عنقي"
],
answer:0
},
{
q:"طفل مع تسوس متعدد",
options:[
"تسوس طفولي منتشر",
"حساسية عاجية",
"تآكل ميكانيكي"
],
answer:0
},
{
q:"كسر سن أمامي",
options:[
"كسر تاجي",
"التهاب لثة",
"خراج أنفي"
],
answer:0
},
{
q:"رائحة فم + ترسبات",
options:[
"التهاب لثة مزمن",
"تسوس بسيط",
"كسر جذر"
],
answer:0
}
];

let current = 0;

function loadQ(){
document.getElementById("nextBtn").style.display="none";
let q = data[current];

document.getElementById("question").innerText = q.q;

let html="";
q.options.forEach((opt,i)=>{
html+=`<button class="btn" onclick="check(${i})">${opt}</button>`;
});

document.getElementById("answers").innerHTML=html;
}

function check(i){
let buttons=document.querySelectorAll(".btn");
let correct=data[current].answer;

buttons.forEach((b,idx)=>{
if(idx===correct) b.classList.add("correct");
if(idx===i && i!==correct) b.classList.add("wrong");
b.disabled=true;
});

document.getElementById("nextBtn").style.display="inline-block";
}

function nextQ(){
current++;
if(current>=data.length) current=0;
loadQ();
}

loadQ();

</script>

</body>
</html>
