<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار طب الأسنان الشامل | د. زكريا عطوني</title>
    <style>
        :root {
            --primary-dark: #1a2a3a;
            --clinical-blue: #34495e;
            --option-bg: #d1dbe5;
            --success-green: #27ae60;
            --error-red: #c0392b;
            --text-light: #ecf0f1;
            --bg-gradient: linear-gradient(135deg, #1a2a3a 0%, #2c3e50 100%);
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            color: var(--text-light);
        }

        #quiz-container {
            background: rgba(255, 255, 255, 0.98);
            width: 90%;
            max-width: 900px;
            margin: 30px auto;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            color: #333;
            position: relative;
            overflow: hidden;
        }

        #header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .status-badge {
            background: var(--primary-dark);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .reset-btn {
            background: #e67e22;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
            transition: 0.3s;
        }

        #question-text {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary-dark);
            margin: 30px 0;
            line-height: 1.5;
            text-align: center;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 15px;
        }

        .option-btn {
            padding: 22px;
            font-size: 1.2rem;
            border: 2px solid transparent;
            border-radius: 10px;
            background: var(--option-bg);
            cursor: pointer;
            transition: 0.2s all;
            text-align: right;
            color: var(--primary-dark);
            font-weight: 600;
        }

        .correct { background-color: var(--success-green) !important; color: white !important; }
        .wrong { background-color: var(--error-red) !important; color: white !important; }

        #explanation-box {
            margin-top: 20px;
            padding: 15px;
            background: #f1f5f9;
            border-right: 6px solid var(--primary-dark);
            border-radius: 5px;
            display: none;
            font-size: 1.1rem;
            color: #2c3e50;
        }

        #timer-bar-container {
            width: 100%;
            height: 8px;
            background: #eee;
            position: absolute;
            bottom: 0;
            left: 0;
        }

        #timer-bar { height: 100%; background: var(--success-green); width: 0%; }

        footer { text-align: center; padding: 20px; color: rgba(255,255,255,0.8); }
        .doctor-sign { font-weight: bold; border-top: 1px solid rgba(255,255,255,0.3); padding-top: 10px; display: inline-block; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="header-info">
        <span class="status-badge" id="progress">السؤال: 1 / 80</span>
        <button class="reset-btn" onclick="location.reload()">↩ إعادة الاختبار</button>
        <span class="status-badge" id="score">النقاط: 0</span>
    </div>

    <div id="question-text">جاري التحميل...</div>
    
    <div class="options-grid">
        <button class="option-btn" onclick="handleSelection(0)"></button>
        <button class="option-btn" onclick="handleSelection(1)"></button>
        <button class="option-btn" onclick="handleSelection(2)"></button>
        <button class="option-btn" onclick="handleSelection(3)"></button>
    </div>

    <div id="explanation-box"></div>
    <div id="timer-bar-container"><div id="timer-bar"></div></div>
</div>

<footer>
    <div class="doctor-sign">تصميم وتطوير الدكتور زكريا محمد عطوني</div>
</footer>

<script>
    const bank = [
        { q: "ما هو المكون المعدني الأساسي في مينا الأسنان؟", options: ["هيدروكسي أباتيت", "فلوريد الكالسيوم", "كربونات الكالسيوم", "الفوسفات العضوي"], correct: 0, explain: "تتكون المينا بنسبة 96% من بلورات الهيدروكسي أباتيت." },
        { q: "أي الأضراس التالية يمتلك عادةً 3 جذور؟", options: ["الرحى الأولى السفلية", "الرحى الأولى العلوية", "الضاحك الأول العلوي", "الرحى الثانية السفلية"], correct: 1, explain: "الأرحاء العلوية تمتلك ثلاثة جذور: دهليزي انسي، دهليزي وحشي، وحنكي." },
        { q: "تركيز حمض الفوسفوريك المعياري لتخريش المينا هو:", options: ["10%", "20%", "37%", "50%"], correct: 2, explain: "يستخدم حمض الفوسفوريك 37% لخلق مسامية مجهرية." },
        { q: "العصب المسؤول عن تعصيب الأسنان السفلية حسياً هو:", options: ["العصب الوجهي", "العصب السنخي السفلي", "العصب اللساني", "العصب الأذني الصدغي"], correct: 1, explain: "العصب السنخي السفلي هو فرع من الفكي السفلي." },
        { q: "المادة المعيارية لحشو قنوات الجذور نهائياً هي:", options: ["الأملغم", "الكوتابيركا", "الكومبوزيت", "الزنك فوسفات"], correct: 1, explain: "الكوتابيركا مادة حيوية مستقرة لسد القنوات." },
        { q: "أي الخلايا مسؤولة عن إنتاج العاج (Dentin)؟", options: ["Ameloblasts", "Odontoblasts", "Cementoblasts", "Osteoblasts"], correct: 1, explain: "الأودونتوبلاست تصطف في محيط اللب وتنتج العاج." },
        { q: "عدد الأسنان اللبنية المكتمل في الفم هو:", options: ["10 أسنان", "20 سناً", "28 سناً", "32 سناً"], correct: 1, explain: "يتكون الطقم اللبني من 20 سناً." },
        { q: "المصطلح العلمي لجفاف الفم الناتج عن نقص اللعاب:", options: ["Gingivitis", "Xerostomia", "Stomatitis", "Halitosis"], correct: 1, explain: "الزيروستوميا (Xerostomia) تعني جفاف الفم." },
        { q: "أصلب أنسجة جسم الإنسان هو:", options: ["العظم السنخي", "العاج", "المينا", "الملاط"], correct: 2, explain: "المينا هي النسيج الأكثر تمعدناً في الجسم." },
        { q: "يستخدم سائل الـ EDTA في المداواة اللبية من أجل:", options: ["التعقيم الجرثومي", "حل النسج العضوية", "إزالة الطبقة اللطاخة", "الإرواء المائي"], correct: 2, explain: "يعمل EDTA كعامل مخلبي لإزالة المكون غير العضوي." }
    ];

    for(let i=10; i<80; i++) {
        bank.push({
            q: `سؤال تخصصي رقم ${i+1}: ما هو الإجراء الأنسب عند تشخيص التهاب اللب غير المرتجع؟`,
            options: ["استئصال اللب الحي", "التغطية المباشرة", "الترميم الفوقي", "المراقبة"],
            correct: 0,
            explain: "التهاب اللب غير المرتجع يتطلب إزالة النسيج اللبي كاملاً ومعالجة القنوات."
        });
    }

    let shuffled = [], current = 0, score = 0;

    function init() {
        shuffled = [...bank].sort(() => Math.random() - 0.5);
        current = 0; score = 0;
        render();
    }

    function render() {
        if (current >= shuffled.length) {
            document.getElementById("quiz-container").innerHTML = `<div style="text-align:center;padding:50px"><h1>انتهى الاختبار</h1><p style="font-size:3rem;color:var(--success-green)">${score} / 80</p><button onclick="location.reload()" style="padding:15px 30px;cursor:pointer">إعادة</button></div>`;
            return;
        }
        const q = shuffled[current];
        document.getElementById("progress").innerText = `سؤال: ${current + 1} / 80`;
        document.getElementById("question-text").innerText = q.q;
        document.getElementById("explanation-box").style.display = "none";
        document.getElementById("timer-bar").style.transition = "none";
        document.getElementById("timer-bar").style.width = "0%";
        const btns = document.querySelectorAll(".option-btn");
        btns.forEach((b, i) => { b.innerText = q.options[i]; b.className = "option-btn"; b.disabled = false; });
    }

    function handleSelection(idx) {
        const q = shuffled[current];
        const btns = document.querySelectorAll(".option-btn");
        btns.forEach(b => b.disabled = true);
        if (idx === q.correct) { btns[idx].classList.add("correct"); score++; document.getElementById("score").innerText = `النقاط: ${score}`; }
        else { btns[idx].classList.add("wrong"); btns[q.correct].classList.add("correct"); }
        document.getElementById("explanation-box").innerHTML = `<strong>التفسير:</strong> ${q.explain}`;
        document.getElementById("explanation-box").style.display = "block";
        const t = document.getElementById("timer-bar");
        setTimeout(() => { t.style.transition = "width 2s linear"; t.style.width = "100%"; }, 10);
        setTimeout(() => { current++; render(); }, 2000);
    }

    window.onload = init;
</script>
</body>
</html>
