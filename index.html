<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dental Clinical Exam Pro</title>

<style>
body{margin:0;font-family:system-ui;background:#0b1220;color:#fff}
header{
background:#0f172a;
padding:18px;
text-align:center;
border-bottom:3px solid #38bdf8;
font-weight:bold
}
.container{max-width:900px;margin:auto;padding:20px}

.card{background:#111827;padding:18px;border-radius:14px;margin-top:10px}
.btn{display:block;width:100%;padding:12px;margin:6px 0;border:none;border-radius:10px;background:#1f2937;color:white;cursor:pointer}
.correct{background:#16a34a !important}
.wrong{background:#dc2626 !important}

.meta{display:flex;justify-content:space-between;color:#93c5fd;font-size:13px}

.progress-bar{height:6px;background:#1f2937;border-radius:10px;margin-top:10px}
.progress{height:100%;background:#38bdf8;width:0%}

.explanation{margin-top:10px;background:#0f172a;padding:12px;border-radius:10px;border-left:4px solid #facc15}

footer{text-align:center;padding:14px;color:#64748b;font-size:13px;margin-top:20px}
</style>
</head>

<body>

<header>
🦷 Dental Clinical Exam Pro
<br><small style="color:#94a3b8">50 Clinical Cases</small>
</header>

<div class="container">

<div id="start">
<button class="btn" onclick="startExam()">ابدأ الامتحان</button>
</div>

<div id="exam" style="display:none">

<div class="meta">
<span id="progressText"></span>
<span id="score"></span>
</div>

<div class="progress-bar">
<div id="progressBar" class="progress"></div>
</div>

<div id="question" class="card"></div>
<div id="answers"></div>
<div id="explanation"></div>

<button class="btn" onclick="restartExam()">إعادة</button>

</div>

<div id="result"></div>

</div>

<footer>تصميم وتطوير د. زكريا محمد عطوني</footer>

<script>

/* 🔴 50 حالة سريرية مضبوطة */
const bank = [

/* Endo */
{q:"ألم ليلي نابض يستمر بعد البارد",o:["التهاب لب غير عكوس","حساسية","تموت لبي","لثة"],a:0,e:"irreversible pulpitis"},
{q:"ألم بارد يزول فوراً",o:["حساسية عاجية","تموت لبي","خراج","كسر"],a:0,e:"dentin hypersensitivity"},
{q:"سن غير حي مع آفة ذروية",o:["تموت لبي","التهاب لب","حساسية","تآكل"],a:0,e:"necrosis"},
{q:"ألم عند العض",o:["كسر سن","تسوس","لثة","حساسية"],a:0,e:"cracked tooth"},
{q:"ألم عفوي مستمر",o:["التهاب لب غير عكوس","عكوس","حساسية","تآكل"],a:0,e:"pulpitis"},
{q:"ألم حراري مستمر",o:["التهاب لب غير عكوس","حساسية","كسر","لثة"],a:0,e:"pulpal inflammation"},
{q:"ألم عند القرع",o:["التهاب حول الذروة","لثة","تسوس","حساسية"],a:0,e:"apical periodontitis"},
{q:"سن متغير اللون",o:["تموت لبي","تسوس","كسر","لثة"],a:0,e:"necrosis"},
{q:"تورم ذروي حاد",o:["خراج","كيس","ورم","تآكل"],a:0,e:"acute abscess"},
{q:"ألم بعد البارد فقط",o:["التهاب لب عكوس","غير عكوس","كسر","لثة"],a:0,e:"reversible pulpitis"},

/* Perio */
{q:"نزف لثوي فقط",o:["التهاب لثة","دواعم","كيس","خراج"],a:0,e:"gingivitis"},
{q:"فقدان عظم + جيوب",o:["التهاب دواعم","لثة","تسوس","كسر"],a:0,e:"periodontitis"},
{q:"قيح من اللثة",o:["خراج لثوي","كيس","تسوس","لثة سليمة"],a:0,e:"abscess"},
{q:"رائحة فم",o:["مرض لثوي","تسوس","كسر","تآكل"],a:0,e:"halitosis"},
{q:"حركة سنية",o:["فقدان دعم","تسوس","كسر","تصبغ"],a:0,e:"mobility"},
{q:"انحسار لثوي",o:["recession","تسوس","كسر","ورم"],a:0,e:"root exposure"},
{q:"نزف مع تفريش",o:["التهاب لثة","دواعم","كسر","خراج"],a:0,e:"gingivitis"},
{q:"جيوب بدون ألم",o:["دواعم مزمن","خراج","كيس","تسوس"],a:0,e:"chronic perio"},
{q:"تورم لثوي",o:["خراج لثوي","كيس","تآكل","تصبغ"],a:0,e:"localized abscess"},
{q:"تراجع عام",o:["recession","تسوس","كسر","ورم"],a:0,e:"gingival recession"},

/* Surgery */
{q:"تورم حاد",o:["خراج","كيس","ورم","تآكل"],a:0,e:"acute infection"},
{q:"تورم بطيء",o:["كيس","خراج","تسوس","لثة"],a:0,e:"cyst"},
{q:"Dry socket",o:["Alveolar osteitis","خراج","كيس","تسوس"],a:0,e:"post extraction pain"},
{q:"ضرس عقل ملتهب",o:["Pericoronitis","كسر","تسوس","حساسية"],a:0,e:"wisdom tooth infection"},
{q:"تورم منتشر",o:["Cellulitis","كيس","تسوس","لثة"],a:0,e:"diffuse infection"},
{q:"نزف بعد قلع",o:["Bleeding issue","كيس","تسوس","كسر"],a:0,e:"hemostasis problem"},
{q:"ألم بعد جراحة",o:["Inflammation","كسر","تسوس","لثة"],a:0,e:"post op pain"},
{q:"قيح",o:["Infection","كسر","تسوس","لثة"],a:0,e:"pus formation"},
{q:"تورم مع حرارة",o:["Systemic infection","كيس","تآكل","ورم"],a:0,e:"fever + swelling"},
{q:"ألم 48 ساعة بعد القلع",o:["Dry socket","كيس","خراج","تآكل"],a:0,e:"classic timing"},

/* Pedo */
{q:"ECC",o:["Early childhood caries","تآكل","كسر","تصبغ"],a:0,e:"child caries"},
{q:"بقع بيضاء",o:["Demineralization","تسوس","كسر","تآكل"],a:0,e:"early lesion"},
{q:"ألم سكريات",o:["Caries","كسر","لثة","تصبغ"],a:0,e:"caries"},
{q:"طفل غير متعاون",o:["Behavior management","خلع","تخدير","تأجيل"],a:0,e:"behavior"},
{q:"نخر متعدد",o:["ECC","كسر","تآكل","تصبغ"],a:0,e:"pattern"},
{q:"ألم لبني",o:["Pulpitis","كسر","لثة","تصبغ"],a:0,e:"pulp involvement"},
{q:"تسوس سطحي",o:["Preventive","خلع","جراحة","تاج"],a:0,e:"early"},
{q:"بقع سوداء",o:["Caries","تصبغ","كسر","تآكل"],a:0,e:"decay"},
{q:"حساسية طفل",o:["Caries","كسر","لثة","تصبغ"],a:0,e:"likely cause"},
{q:"تسوس متقدم",o:["Restoration","خلع","تاج","وقاية"],a:0,e:"treatment"},

/* Prostho */
{q:"سقوط تاج",o:["Cement failure","تسوس","كسر","لثة"],a:0,e:"cement"},
{q:"ألم تحت جسر",o:["Secondary caries","لثة","كسر","تآكل"],a:0,e:"decay under bridge"},
{q:"طقم غير ثابت",o:["Retention issue","كسر","تسوس","لثة"],a:0,e:"fit"},
{q:"تقرحات",o:["Pressure","كسر","تآكل","تسوس"],a:0,e:"trauma"},
{q:"فراغات",o:["Design issue","كسر","تآكل","لثة"],a:0,e:"planning"},
{q:"ألم بعد تاج",o:["High occlusion","كسر","تسوس","لثة"],a:0,e:"bite high"},
{q:"كسر خزف",o:["Stress","تسوس","لثة","تآكل"],a:0,e:"fracture"},
{q:"انفصال جسر",o:["Cement failure","كسر","تسوس","لثة"],a:0,e:"loss"},
{q:"عدم راحة",o:["Pressure","كسر","تآكل","تسوس"],a:0,e:"fit issue"},
{q:"احتكاك",o:["Occlusion issue","تسوس","كسر","لثة"],a:0,e:"bite problem"}

];

/* نفس النظام */
function shuffle(q){
let arr=q.o.map((t,i)=>({t,correct:i===q.a}));
for(let i=arr.length-1;i>0;i--){
let j=Math.random()*(i+1)|0;
[arr[i],arr[j]]=[arr[j],arr[i]];
}
return arr;
}

let index=0,score=0,currentOptions=[];

function startExam(){
index=0;score=0;
document.getElementById("start").style.display="none";
document.getElementById("exam").style.display="block";
load();
}

function load(){

if(index>=bank.length){
document.getElementById("exam").style.display="none";
document.getElementById("result").innerHTML=
`<div class="card">النتيجة ${score}/${bank.length}
<br><button class="btn" onclick="location.reload()">إعادة</button></div>`;
return;
}

let q=bank[index];
currentOptions=shuffle(q);

document.getElementById("progressText").innerText=`${index+1}/${bank.length}`;
document.getElementById("score").innerText=score;

let percent=(index/bank.length)*100;
document.getElementById("progressBar").style.width=percent+"%";

document.getElementById("question").innerText=q.q;
document.getElementById("explanation").innerHTML="";

let html="";
currentOptions.forEach((opt,i)=>{
html+=`<button class="btn" onclick="check(${i})">${opt.t}</button>`;
});

document.getElementById("answers").innerHTML=html;
}

function check(i){

let buttons=document.getElementById("answers").querySelectorAll(".btn");
let correctIndex=currentOptions.findIndex(x=>x.correct);

buttons[correctIndex].classList.add("correct");
if(i!==correctIndex)buttons[i].classList.add("wrong");

buttons.forEach(b=>b.disabled=true);

document.getElementById("explanation").innerHTML=
`<div class="explanation">${bank[index].e}</div>`;

if(i===correctIndex) score++;

setTimeout(()=>{index++;load();},1200);
}

</script>

</body>
</html>
