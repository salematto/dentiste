<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دفتر الحالات السريرية</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:#e5e7eb;
line-height:1.8;
}

.container{
padding:20px;
}

.case{
padding:15px;
margin-bottom:15px;
border-bottom:1px solid #334155;
}

.t{
color:#38bdf8;
font-weight:bold;
margin-bottom:5px;
}

.label{
color:#a5b4fc;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<div class="case">
<div class="t">حالة 1</div>
<div><span class="label">الأعراض:</span> ألم شديد مع تسوس عميق</div>
<div><span class="label">التشخيص:</span> التهاب لب غير عكوس</div>
<div><span class="label">العلاج:</span> علاج جذور</div>
</div>

<div class="case">
<div class="t">حالة 2</div>
<div><span class="label">الأعراض:</span> نزف لثة</div>
<div><span class="label">التشخيص:</span> التهاب دواعم سن</div>
<div><span class="label">العلاج:</span> تنظيف عميق</div>
</div>

<div class="case">
<div class="t">حالة 3</div>
<div><span class="label">الأعراض:</span> ألم ضرس عقل</div>
<div><span class="label">التشخيص:</span> انطمار ضرس</div>
<div><span class="label">العلاج:</span> خلع جراحي</div>
</div>

</div>

</body>
</html>
