<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dental Smart Clinical Engine</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f7fb;
color:#0f172a;
}

/* Header */
header{
background:#0f2a4a;
color:white;
padding:18px;
text-align:center;
font-size:20px;
font-weight:bold;
border-bottom:4px solid #f59e0b;
}

/* Container */
.container{
max-width:850px;
margin:auto;
padding:20px;
}

/* Question */
.card{
background:linear-gradient(135deg,#0f2a4a,#1e3a8a);
color:white;
padding:28px;
border-radius:16px;
font-size:22px;
font-weight:600;
min-height:120px;
margin-bottom:15px;
}

/* Options */
.option{
display:block;
width:100%;
margin:12px 0;
padding:16px;
border-radius:14px;
border:1px solid #1f2937;
cursor:pointer;
font-size:16px;
text-align:right;
background:#111827;
color:#f8fafc;
transition:0.2s;
}

.option:hover{
transform:translateY(-2px);
border-color:#f59e0b;
}

/* correct / wrong */
.option.correct{background:#16a34a !important;color:white !important;border:none;}
.option.wrong{background:#dc2626 !important;color:white !important;border:none;}

/* explanation */
#explain{
margin-top:15px;
padding:12px;
background:#e0f2fe;
border-right:5px solid #0ea5e9;
border-radius:10px;
display:none;
}

/* result */
.result{
text-align:center;
font-size:18px;
line-height:2;
padding:20px;
}

footer{
margin-top:40px;
background:#0f2a4a;
color:white;
text-align:center;
padding:16px;
font-size:12px;
border-top:4px solid #f59e0b;
}
</style>
</head>

<body>

<header>🦷 Dental Smart Clinical Engine</header>

<div class="container">

<div id="start">
<button onclick="startExam()" style="padding:14px;width:100%;background:#0f2a4a;color:white;border:none;border-radius:12px;">
ابدأ التدريب الذكي
</button>
</div>

<div id="exam" style="display:none;">

<div class="card" id="question"></div>

<div id="answers"></div>

<div id="explain"></div>

</div>

<div id="result" class="result" style="display:none;"></div>

</div>

<footer>
تصميم وتطوير د. زكريا محمد عطوني
</footer>

<script>

/* =========================
   SMART ENGINE CORE
   ========================= */

const bank = [];
let used = new Set();
let wrongBank = [];
let categoryScore = {};
let currentQ = null;
let wrong = 0;

/* helper */
function add(q,o,a,exp,cat){
bank.push({q,o,a,exp,cat});
categoryScore[cat]=0;
}

/* ---------------- CASES ---------------- */

add("ألم ليلي مع تسوس عميق",
["التهاب لب غير عكوس","حساسية","تآكل","تصبغ"],
0,
"التهاب لب غير عكوس بسبب ضغط داخل الحجرة اللبية.",
"endo");

add("نزف لثة عند التفريش",
["التهاب لثة","تسوس","كسر","تصبغ"],
0,
"التهاب لثة بسبب اللويحة الجرثومية.",
"perio");

add("ضرس عقل مطمور مؤلم",
["انطمار","تسوس","حساسية","تآكل"],
0,
"التهاب حول التاج شائع في الانطمار.",
"surg");

add("كسر سن أمامي",
["كسر تاجي","تسوس","تصبغ","تآكل"],
0,
"رض مباشر يؤدي لكسر تاجي.",
"trauma");

add("ألم عند العض بدون سبب واضح",
["كسر شعري","تسوس","حساسية","تصبغ"],
0,
"كسر شعري غالباً غير مرئي سريرياً.",
"endo");

/* fill to 120 */
const templates=[
["ألم بارد شديد",["حساسية","التهاب لب","تآكل","تصبغ"],0,"حساسية عاجية.","endo"],
["تورم لثوي",["خراج","تسوس","حساسية","تصبغ"],0,"خراج موضعي.","perio"],
["ألم عند الضغط",["التهاب حول الذروة","تسوس","حساسية","تصبغ"],0,"التهاب حول الذروة.","endo"]
];

while(bank.length<120){
let t=templates[bank.length%templates.length];
add(t[0],t[1],t[2],t[3],t[4]);
}

/* ========================= */

function getNextQuestion(){

let pool = bank.filter(q=>!used.has(q.q));

if(pool.length===0) return null;

let q = pool[Math.floor(Math.random()*pool.length)];
used.add(q.q);

return q;
}

function startExam(){

used.clear();
wrongBank=[];
wrong=0;

document.getElementById("start").style.display="none";
document.getElementById("exam").style.display="block";
document.getElementById("result").style.display="none";

load();
}

function load(){

currentQ = getNextQuestion();

if(!currentQ){
end();
return;
}

document.getElementById("question").innerText=currentQ.q;

let html="";
currentQ.o.forEach((opt,idx)=>{
html+=`<button class="option" onclick="check(${idx})">${opt}</button>`;
});

document.getElementById("answers").innerHTML=html;
document.getElementById("explain").style.display="none";
}

function check(x){

let q=currentQ;
let buttons=document.querySelectorAll(".option");

buttons.forEach((b,idx)=>{
b.disabled=true;

if(idx===q.a) b.classList.add("correct");
if(idx===x && x!==q.a) b.classList.add("wrong");
});

if(x!==q.a){
wrong++;
wrongBank.push(q);
categoryScore[q.cat]++;
}

let exp=document.getElementById("explain");
exp.style.display="block";
exp.innerHTML=`
${q.exp}<br><br>
<b>التصنيف:</b> ${q.cat}
`;

setTimeout(()=>load(),900);
}

function end(){

document.getElementById("exam").style.display="none";
document.getElementById("result").style.display="block";

let score = (bank.length - wrong)/bank.length;

let weak = Object.entries(categoryScore)
.sort((a,b)=>b[1]-a[1])[0] || ["none",0];

let level =
score>0.85?"ممتاز 🟢":
score>0.6?"جيد 🟠":
"يحتاج تدريب 🔴";

document.getElementById("result").innerHTML=`
انتهى التدريب 🧠<br><br>
الأخطاء: ${wrong}<br>
التقييم: ${level}<br><br>
أضعف مجال: <b>${weak[0]}</b><br><br>
<button onclick="location.reload()" style="padding:12px;width:100%;background:#0f2a4a;color:white;border:none;border-radius:12px;">
إعادة التدريب
</button>
`;
}

</script>

</body>
</html>
