<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dental Clinical Exam 120</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f7fb;
color:#0f172a;
}

header{
background:#0f2a4a;
color:white;
padding:18px;
text-align:center;
font-size:20px;
font-weight:bold;
border-bottom:4px solid #f59e0b;
}

.container{
max-width:850px;
margin:auto;
padding:20px;
}

/* 🟢 الحالة */
.card{
background:white;
padding:28px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.07);
font-size:22px;
font-weight:600;
min-height:120px;
border:2px solid #0f2a4a;
}

/* معلومات */
.meta{
display:flex;
justify-content:space-between;
font-size:13px;
color:#475569;
margin:10px 0;
}

/* 🟡 الاحتمالات كبطاقات */
.btn{
display:block;
width:100%;
margin:12px 0;
padding:16px;
border-radius:14px;
border:1px solid #cbd5e1;
cursor:pointer;
font-size:16px;
background:#ffffff;
text-align:right;
box-shadow:0 2px 10px rgba(15,42,74,0.08);
transition:0.2s;
}

.btn:hover{
transform:translateY(-2px);
border-color:#0f2a4a;
box-shadow:0 6px 15px rgba(15,42,74,0.15);
}

/* صحيح */
.correct{
background:#16a34a !important;
color:white !important;
border:none;
box-shadow:0 6px 18px rgba(22,163,74,0.25);
}

/* خطأ */
.wrong{
background:#dc2626 !important;
color:white !important;
border:none;
box-shadow:0 6px 18px rgba(220,38,38,0.25);
}

/* زر البداية */
.primary{
padding:12px 16px;
border:none;
border-radius:12px;
background:#0f2a4a;
color:white;
cursor:pointer;
font-size:15px;
margin-top:10px;
}

/* نتيجة */
.result{
text-align:center;
font-size:18px;
line-height:2;
padding:20px;
}

.badge{
display:inline-block;
padding:6px 14px;
border-radius:999px;
background:#f59e0b;
color:#0f172a;
font-weight:bold;
margin-top:10px;
}

footer{
text-align:center;
padding:20px;
font-size:12px;
opacity:0.6;
}
</style>
</head>

<body>

<header>🦷 Dental Clinical Exam (120 Cases)</header>

<div class="container">

<div id="start">
<button class="primary" onclick="startExam()">ابدأ الاختبار</button>
</div>

<div id="exam" style="display:none;">

<div class="meta">
<div>السؤال: <span id="qnum"></span></div>
<div>النتيجة: <span id="score"></span></div>
</div>

<div id="question" class="card"></div>

<div id="answers"></div>

</div>

<div id="result" class="result" style="display:none;"></div>

</div>

<footer>
Dental Clinical Training System
</footer>

<script>

/* =========================
   BANK (120 CASES)
   ========================= */

const bank = [];

function add(q,o,a){bank.push({q,o,a});}

/* Core clinical cases */
add("ألم ليلي شديد مع تسوس عميق",["التهاب لب غير عكوس","حساسية","تآكل","تصبغ"],0);
add("نزف لثة عند التفريش",["التهاب لثة","تسوس","كسر","تصبغ"],0);
add("ضرس عقل مطمور مؤلم",["انطمار ضرس","تسوس","حساسية","تآكل"],0);
add("كسر سن أمامي بعد صدمة",["كسر تاجي","تسوس","تصبغ","تآكل"],0);
add("ألم عند المضغ مع سن سليم ظاهريًا",["كسر شعري","تسوس","تآكل","حساسية"],0);
add("تورم لثوي مع قيح",["خراج لثوي","تسوس","حساسية","تصبغ"],0);
add("رائحة فم مزمنة",["التهاب دواعم سن","تسوس","كسر","تصبغ"],0);
add("حركة سن واضحة",["مرض دواعم سن متقدم","تسوس","حساسية","تصبغ"],0);
add("ألم بارد شديد",["حساسية عاجية","التهاب لب","تآكل","تصبغ"],0);
add("ألم عفوي ليلي",["التهاب لب حاد","تسوس","حساسية","تصبغ"],0);

add("تورم ذروي مزمن",["كيس جذري","تسوس","حساسية","تصبغ"],0);
add("فشل علاج عصب سابق",["إعادة علاج جذور","تسوس","تآكل","حساسية"],0);
add("سن داكن بعد صدمة قديمة",["نخر لب","حساسية","تآكل","تصبغ"],0);
add("ألم عند الضغط على سن",["التهاب حول الذروة","تسوس","حساسية","تصبغ"],0);
add("تآكل عنقي واضح",["تآكل مينا","تسوس","كسر","تصبغ"],0);

add("طفل مع تسوس متعدد",["تسوس طفولي منتشر","حساسية","تآكل","كسر"],0);
add("طفل غير متعاون",["تعديل سلوكي","تسوس","تآكل","كسر"],0);
add("ألم بعد حشوة مرتفعة",["ارتفاع إطباق","تسوس","حساسية","تصبغ"],0);
add("نزف تلقائي من اللثة",["التهاب دواعم سن","تسوس","كسر","تصبغ"],0);
add("انتفاخ خد مع ألم سن",["خراج ذروي","تسوس","حساسية","تصبغ"],0);

add("ألم عند البارد والحار",["التهاب لب","حساسية","تآكل","تصبغ"],0);
add("كسر جذر سن",["كسر جذر","تسوس","تآكل","تصبغ"],0);
add("رائحة فم مع جيوب عميقة",["التهاب دواعم سن","تسوس","كسر","تصبغ"],0);
add("ألم مفاجئ في سن سليم",["كسر شعري","تسوس","حساسية","تصبغ"],0);
add("تقرح لثوي مزمن",["التهاب لثة مزمن","تسوس","كسر","تصبغ"],0);

add("ألم بعد أكل بارد",["حساسية عاجية","التهاب لب","تآكل","تصبغ"],0);
add("تورم بدون ألم",["كيس جذري","تسوس","حساسية","تصبغ"],0);
add("ألم عند العض فقط",["كسر شعري","تسوس","تآكل","تصبغ"],0);
add("تسوس عميق بدون ألم",["لب متليف","التهاب لب","حساسية","تصبغ"],0);
add("ألم مع ناسور لثوي",["خراج مزمن","تسوس","تآكل","تصبغ"],0);

/* fill to 120 automatically */
const templates = [
["ألم عند العض بدون سبب واضح",["كسر شعري","تسوس","حساسية","تصبغ"],0],
["ألم بارد شديد",["حساسية عاجية","التهاب لب","تآكل","تصبغ"],0],
["تورم لثوي",["خراج لثوي","تسوس","حساسية","تصبغ"],0],
["تآكل عنقي",["تآكل مينا","تسوس","كسر","تصبغ"],0],
["ألم عند الضغط",["التهاب حول الذروة","تسوس","حساسية","تصبغ"],0]
];

while(bank.length < 120){
let t = templates[bank.length % templates.length];
add(t[0],t[1],t[2]);
}

/* ========================= */

let qlist=[];
let i=0;
let score=0;

function startExam(){
qlist=bank.sort(()=>Math.random()-0.5);
i=0;
score=0;

document.getElementById("start").style.display="none";
document.getElementById("exam").style.display="block";
document.getElementById("result").style.display="none";

load();
}

function load(){

if(i>=qlist.length){end();return;}

let q=qlist[i];

document.getElementById("qnum").innerText=(i+1)+"/"+qlist.length;
document.getElementById("score").innerText=score;

document.getElementById("question").innerText=q.q;

let html="";
q.o.forEach((opt,idx)=>{
html+=`<button class="btn" onclick="check(${idx})">${opt}</button>`;
});

document.getElementById("answers").innerHTML=html;
}

function check(x){

let q=qlist[i];
let buttons=document.querySelectorAll(".btn");

buttons.forEach((b,idx)=>{
if(idx===q.a) b.classList.add("correct");
if(idx===x && x!==q.a) b.classList.add("wrong");
b.disabled=true;
});

if(x===q.a) score++;

setTimeout(()=>{
i++;
load();
},800);
}

function end(){

document.getElementById("exam").style.display="none";
document.getElementById("result").style.display="block";

let level =
score/qlist.length>0.8?"ممتاز 🟢":
score/qlist.length>0.5?"جيد 🟠":
"يحتاج مراجعة 🔴";

document.getElementById("result").innerHTML=`
انتهى الاختبار 🧠<br><br>
النتيجة: ${score} / ${qlist.length}<br>
<span class="badge">${level}</span><br><br>
<button class="primary" onclick="location.reload()">العودة للبداية</button>
`;
}

</script>

</body>
</html>
