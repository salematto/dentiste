<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dental Smart Training</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f7fb;
color:#0f172a;
}

header{
background:#0f2a4a;
color:white;
padding:18px;
text-align:center;
font-size:20px;
font-weight:bold;
border-bottom:4px solid #f59e0b;
}

.container{
max-width:850px;
margin:auto;
padding:20px;
}

/* question */
.card{
background:white;
padding:28px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.07);
font-size:22px;
font-weight:600;
min-height:120px;
border:2px solid #0f2a4a;
}

/* options */
.btn{
display:block;
width:100%;
margin:12px 0;
padding:16px;
border-radius:14px;
border:1px solid #1f2937;
cursor:pointer;
font-size:16px;
text-align:right;
background:#111827;
color:#f8fafc;
transition:0.2s;
}

.btn:hover{
transform:translateY(-2px);
border-color:#f59e0b;
}

/* correct / wrong */
.correct{background:#16a34a !important;color:white !important;border:none;}
.wrong{background:#dc2626 !important;color:white !important;border:none;}

/* explanation box */
.explain{
margin-top:15px;
padding:12px;
background:#e0f2fe;
border-right:5px solid #0ea5e9;
border-radius:10px;
font-size:14px;
color:#0f172a;
display:none;
}

/* meta */
.meta{
display:flex;
justify-content:space-between;
font-size:13px;
color:#475569;
margin:10px 0;
}

/* result */
.result{
text-align:center;
font-size:18px;
line-height:2;
padding:20px;
}

.badge{
display:inline-block;
padding:6px 14px;
border-radius:999px;
background:#f59e0b;
color:#0f172a;
font-weight:bold;
margin-top:10px;
}

/* footer */
footer{
margin-top:40px;
background:#0f2a4a;
color:white;
text-align:center;
padding:16px;
font-size:12px;
border-top:4px solid #f59e0b;
}
</style>
</head>

<body>

<header>🦷 Dental Smart Clinical Training</header>

<div class="container">

<div id="start">
<button class="btn" style="background:#0f2a4a;" onclick="startExam()">ابدأ التدريب الذكي</button>
</div>

<div id="exam" style="display:none;">

<div class="meta">
<div>السؤال: <span id="qnum"></span></div>
<div>الأخطاء: <span id="wrongCount">0</span></div>
</div>

<div id="question" class="card"></div>

<div id="answers"></div>

<div id="explain" class="explain"></div>

</div>

<div id="result" class="result" style="display:none;"></div>

</div>

<footer>
تصميم وتطوير د. زكريا محمد عطوني
</footer>

<script>

const bank = [];
function add(q,o,a,exp){
bank.push({q,o,a,exp});
}

/* ================= cases ================= */

add("ألم ليلي شديد مع تسوس عميق",
["التهاب لب غير عكوس","حساسية","تآكل","تصبغ"],
0,
"الألم الليلي المستمر مع تسوس عميق يدل غالباً على التهاب لب غير عكوس بسبب ضغط داخل الحجرة اللبية."
);

add("نزف لثة عند التفريش",
["التهاب لثة","تسوس","كسر","تصبغ"],
0,
"النزف عند التفريش علامة مبكرة لالتهاب اللثة بسبب تراكم اللويحة الجرثومية."
);

add("ضرس عقل مطمور مؤلم",
["انطمار ضرس","تسوس","حساسية","تآكل"],
0,
"الألم في ضرس عقل غير بازغ غالباً بسبب التهاب حول التاج."
);

add("كسر سن أمامي",
["كسر تاجي","تسوس","تصبغ","تآكل"],
0,
"الصدمة المباشرة تؤدي غالباً إلى كسر تاجي خصوصاً في الأسنان الأمامية."
);

add("ألم عند المضغ بدون سبب واضح",
["كسر شعري","تسوس","حساسية","تصبغ"],
0,
"الألم عند العض مع غياب تسوس ظاهر يشير غالباً إلى كسر شعري غير مرئي سريرياً."
);

/* fill to 120 */
const templates=[
["ألم بارد شديد",["حساسية عاجية","التهاب لب","تآكل","تصبغ"],0,"حساسية العاج تسبب ألم حاد قصير مع البارد."],
["تورم لثوي",["خراج لثوي","تسوس","حساسية","تصبغ"],0,"التورم الموضعي غالباً يدل على خراج لثوي."],
["ألم عند الضغط",["التهاب حول الذروة","تسوس","حساسية","تصبغ"],0,"الألم عند الضغط علامة على التهاب حول الذروة."],
["تآكل عنقي",["تآكل مينا","تسوس","كسر","تصبغ"],0,"التآكل العنقي يحدث بسبب أحماض أو ضغط ميكانيكي."]
];

while(bank.length<120){
let t=templates[bank.length%templates.length];
add(t[0],t[1],t[2],t[3]);
}

/* ================= logic ================= */

let qlist=[];
let i=0;
let wrong=0;

function startExam(){
qlist=bank.sort(()=>Math.random()-0.5);
i=0;wrong=0;

document.getElementById("start").style.display="none";
document.getElementById("exam").style.display="block";
document.getElementById("result").style.display="none";

load();
}

function load(){
if(i>=qlist.length){end();return;}

let q=qlist[i];

document.getElementById("qnum").innerText=(i+1)+"/"+qlist.length;
document.getElementById("wrongCount").innerText=wrong;

document.getElementById("question").innerText=q.q;

let html="";
q.o.forEach((opt,idx)=>{
html+=`<button class="btn" onclick="check(${idx})">${opt}</button>`;
});

document.getElementById("answers").innerHTML=html;
document.getElementById("explain").style.display="none";
}

function check(x){

let q=qlist[i];
let buttons=document.querySelectorAll(".btn");

buttons.forEach((b,idx)=>{
if(idx===q.a) b.classList.add("correct");
if(idx===x && x!==q.a) b.classList.add("wrong");
b.disabled=true;
});

if(x!==q.a) wrong++;

let exp=document.getElementById("explain");
exp.style.display="block";
exp.innerText=q.exp || "لا يوجد شرح";

setTimeout(()=>{
i++;
load();
},1200);
}

function end(){

document.getElementById("exam").style.display="none";
document.getElementById("result").style.display="block";

let score = ((qlist.length-wrong)/qlist.length);

let level =
score>0.85?"ممتاز 🟢":
score>0.6?"جيد 🟠":
"يحتاج تدريب 🔴";

document.getElementById("result").innerHTML=`
انتهى التدريب 🧠<br><br>
الأخطاء: ${wrong}<br>
التقييم: ${level}<br><br>
<button class="btn" onclick="location.reload()" style="background:#0f2a4a;">إعادة التدريب</button>
`;
}

</script>

</body>
</html>
