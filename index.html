<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSCE Dental Exam</title>

<style>
body{margin:0;font-family:system-ui;background:#0b1220;color:#fff}
header{
background:#0f172a;
padding:16px;
text-align:center;
border-bottom:3px solid #38bdf8;
font-weight:bold
}
.container{max-width:900px;margin:auto;padding:20px}

.card{
background:#111827;
padding:18px;
border-radius:14px;
margin-top:10px;
line-height:1.7;
border-left:4px solid #38bdf8;
}

.btn{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:10px;
background:#1f2937;
color:#fff;
cursor:pointer;
}

.correct{background:#16a34a !important}
.wrong{background:#dc2626 !important}

.meta{display:flex;justify-content:space-between;color:#93c5fd;font-size:13px}

.progress-bar{height:6px;background:#1f2937;border-radius:10px;margin-top:10px}
.progress{height:100%;background:#38bdf8;width:0%}

.explanation{
margin-top:10px;
background:#0f172a;
padding:12px;
border-radius:10px;
border-left:4px solid #facc15
}

footer{
text-align:center;
padding:12px;
color:#64748b;
font-size:13px;
margin-top:20px
}
</style>
</head>

<body>

<header>
🦷 OSCE Dental Exam (Integrated Version)
</header>

<div class="container">

<div id="start">
<button class="btn" onclick="startExam()">ابدأ الامتحان</button>
</div>

<div id="exam" style="display:none">

<div class="meta">
<span id="progressText"></span>
<span id="score"></span>
</div>

<div class="progress-bar">
<div id="progressBar" class="progress"></div>
</div>

<div id="question" class="card"></div>
<div id="answers"></div>
<div id="explanation"></div>

<button class="btn" onclick="restartExam()">إعادة</button>

</div>

<div id="result"></div>

</div>

<footer>OSCE Clinical Training System</footer>

<script>

/* 🟢 BANK مدمج ومصحح سريريًا */
const bank = [
{
q:"مريض 40 سنة، ألم ليلي نابض، يزداد بالحرارة ويستمر بعد إزالة المؤثر، تسوس عميق.",
o:[
"التهاب لب غير عكوس symptomatic irreversible pulpitis",
"حساسية عاجية dentin hypersensitivity",
"التهاب حول الذروة apical periodontitis",
"ألم عضلي myofascial pain"
],
a:0,
e:"Pain + lingering heat response → irreversible pulpitis"
},

{
q:"مريض 28 سنة، ألم حاد عند البارد يختفي خلال ثوانٍ، لا ألم عفوي.",
o:[
"حساسية عاجية dentin hypersensitivity",
"التهاب لب غير عكوس",
"نخر لبّي",
"كسر جذر"
],
a:0,
e:"Short cold pain → hypersensitivity"
},

{
q:"سن غير مؤلم، متغير اللون، اختبار حيوية سلبي، آفة ذروية شعاعياً.",
o:[
"نخر لبّي pulp necrosis",
"التهاب لب عكوس",
"التهاب لثة",
"فرط حساسية"
],
a:0,
e:"Non-vital + periapical lesion"
},

{
q:"ألم عند العض يزداد عند تحرير الضغط، بدون تسوس واضح.",
o:[
"Cracked tooth syndrome",
"التهاب لب",
"خراج لثوي",
"جيوب أنفية"
],
a:0,
e:"Release pain = cracked tooth"
},

{
q:"نزف لثوي عند التفريش دون فقدان عظم.",
o:[
"التهاب لثة gingivitis",
"التهاب دواعم",
"خراج ذروي",
"كيس"
],
a:0,
e:"Bleeding only = gingivitis"
},

{
q:"جيوب 6 ملم + فقدان عظم أفقي.",
o:[
"Periodontitis",
"التهاب لثة",
"حساسية",
"تسوس"
],
a:0,
e:"Attachment loss = periodontitis"
},

{
q:"ألم شديد بعد 48 ساعة من القلع + رائحة كريهة + خلو الخثرة.",
o:[
"Dry socket",
"خراج ذروي",
"كيس",
"Cellulitis"
],
a:0,
e:"Timing + empty socket"
},

{
q:"طفل 5 سنوات، تسوس متعدد + رضاعة ليلية.",
o:[
"Early childhood caries",
"فلوروزس",
"تآكل",
"نقص تنسج"
],
a:0,
e:"ECC pattern"
},

{
q:"تورم لثوي موضعي مع قيح من الجيب.",
o:[
"Periodontal abscess",
"Periapical abscess",
"Fibroma",
"Mucocele"
],
a:0,
e:"Pus from pocket"
},

{
q:"ألم حراري طويل بعد البارد + تسوس عميق.",
o:[
"Symptomatic irreversible pulpitis",
"Reversible pulpitis",
"حساسية",
"Sinus pain"
],
a:0,
e:"Prolonged thermal pain"
}
];

/* 🔒 النظام */
function shuffle(q){
let arr=q.o.map((t,i)=>({t,correct:i===q.a}));
for(let i=arr.length-1;i>0;i--){
let j=Math.random()*(i+1)|0;
[arr[i],arr[j]]=[arr[j],arr[i]];
}
return arr;
}

let index=0,score=0,currentOptions=[];

function startExam(){
index=0;score=0;
document.getElementById("start").style.display="none";
document.getElementById("exam").style.display="block";
load();
}

function restartExam(){
index=0;score=0;
load();
}

function load(){

if(index>=bank.length){
document.getElementById("exam").style.display="none";
document.getElementById("result").innerHTML=
`<div class="card">Score ${score}/${bank.length}
<br><button class="btn" onclick="location.reload()">Restart</button></div>`;
return;
}

let q=bank[index];
currentOptions=shuffle(q);

document.getElementById("progressText").innerText=`Case ${index+1}/${bank.length}`;
document.getElementById("score").innerText=score;

document.getElementById("progressBar").style.width=
((index/bank.length)*100)+"%";

document.getElementById("question").innerText=q.q;
document.getElementById("explanation").innerHTML="";

let html="";
currentOptions.forEach((opt,i)=>{
html+=`<button class="btn" onclick="check(${i})">${opt.t}</button>`;
});

document.getElementById("answers").innerHTML=html;
}

function check(i){

let buttons=document.querySelectorAll(".btn");
let correctIndex=currentOptions.findIndex(x=>x.correct);

buttons[correctIndex].classList.add("correct");
if(i!==correctIndex)buttons[i].classList.add("wrong");

buttons.forEach(b=>b.disabled=true);

document.getElementById("explanation").innerHTML=
`<div class="explanation">${bank[index].e}</div>`;

if(i===correctIndex)score++;

setTimeout(()=>{index++;load();},1000);
}

</script>

</body>
</html>
