<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dental Clinical Exam Pro</title>

<style>
body{
margin:0;
font-family:system-ui, Arial;
background:linear-gradient(135deg,#eef2ff,#f8fafc);
color:#0f172a;
}

header{
background:linear-gradient(90deg,#0f172a,#1e3a8a);
color:white;
padding:18px;
text-align:center;
font-size:20px;
font-weight:bold;
border-bottom:3px solid #06b6d4;
}

.logo{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

.logo span{font-size:24px;}

.container{
max-width:850px;
margin:auto;
padding:22px;
}

.card{
background: linear-gradient(145deg,#ffffff,#f8fafc);
padding:24px;
border-radius:20px;
box-shadow:
0 10px 25px rgba(15,23,42,0.10),
0 2px 6px rgba(15,23,42,0.05);
line-height:1.7;
border:1px solid #e2e8f0;
transition:0.25s ease;
}

.card:hover{
transform:translateY(-3px);
box-shadow:
0 15px 35px rgba(15,23,42,0.15);
}

.btn{
display:block;
width:100%;
margin:10px 0;
padding:14px;
border:none;
border-radius:12px;
background:#e2e8f0;
cursor:pointer;
transition:0.2s;
font-size:15px;
}

.btn:hover{
background:#cbd5e1;
transform:scale(1.01);
}

.explain{
margin-top:12px;
padding:12px;
background:#f1f5f9;
border-right:4px solid #06b6d4;
border-radius:10px;
}

.meta{
display:flex;
justify-content:space-between;
font-size:13px;
color:#64748b;
margin-bottom:10px;
}

.start,.restart{
padding:12px 16px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#2563eb,#1e3a8a);
color:white;
cursor:pointer;
font-weight:bold;
}

footer{
text-align:center;
padding:18px;
font-size:12px;
color:#64748b;
margin-top:30px;
}
</style>
</head>

<body>

<header>
<div class="logo">
<span>🦷</span>
<div>
Dental Clinical Exam Pro<br>
<small style="opacity:0.8;">Clinical Reasoning Training System</small>
</div>
</div>
</header>

<div class="container">

<div id="start">
<button class="start" onclick="startExam()">ابدأ الامتحان</button>
</div>

<div id="exam" style="display:none;">

<div class="meta">
<span id="qnum"></span>
<span id="score"></span>
</div>

<div id="question" class="card"></div>
<div id="answers"></div>
<div id="explain" class="explain" style="display:none;"></div>

</div>

<div id="result" style="display:none;"></div>

</div>

<footer>
تصميم وتطوير: د. زكريا محمد عطوني
</footer>

<script>

/* =========================
   120 REAL CASES (NO DUPLICATION)
========================= */

const baseCases = [

/* ENDO */
{case:"ألم ليلي نابض مع تسوس عميق.",q:"التشخيص؟",o:["Irreversible pulpitis","Reversible pulpitis","Periodontitis","Attrition"],a:0,e:"irreversible pulpitis"},
{case:"ألم بارد قصير يزول بسرعة.",q:"التشخيص؟",o:["Reversible pulpitis","Necrosis","Abscess","Fracture"],a:0,e:"reversible pulpitis"},
{case:"ألم تلقائي بدون محفز.",q:"التشخيص؟",o:["Irreversible pulpitis","Sensitivity","Caries","Stain"],a:0,e:"pulp inflammation"},
{case:"سن داكن بعد رض.",q:"التشخيص؟",o:["Pulp necrosis","Caries","Sensitivity","Erosion"],a:0,e:"necrosis"},
{case:"ناسور مزمن.",q:"التشخيص؟",o:["Chronic abscess","Acute abscess","Cyst","Gingivitis"],a:0,e:"chronic infection"},
{case:"ألم عند العض فقط.",q:"التشخيص؟",o:["Cracked tooth","Pulpitis","Caries","Gingivitis"],a:0,e:"cracked tooth syndrome"},

/* PERIO */
{case:"نزف لثة مع لويحة.",q:"التشخيص؟",o:["Gingivitis","Periodontitis","Caries","Fracture"],a:0,e:"gingivitis"},
{case:"جيوب عميقة مع حركة سن.",q:"التشخيص؟",o:["Periodontitis","Gingivitis","Caries","Sensitivity"],a:0,e:"bone loss"},
{case:"رائحة فم مزمنة.",q:"التشخيص؟",o:["Periodontitis","Caries","Fracture","Stain"],a:0,e:"anaerobic infection"},
{case:"انحسار لثة.",q:"التشخيص؟",o:["Gingival recession","Abscess","Cyst","Pulpitis"],a:0,e:"root exposure"},

/* SURG */
{case:"ألم بعد قلع مع عظم مكشوف.",q:"التشخيص؟",o:["Dry socket","Abscess","Cyst","Pulpitis"],a:0,e:"alveolar osteitis"},
{case:"تورم سريع مؤلم.",q:"التشخيص؟",o:["Acute abscess","Cyst","Gingivitis","Attrition"],a:0,e:"infection"},
{case:"تورم بطيء غير مؤلم.",q:"التشخيص؟",o:["Cyst","Abscess","Pulpitis","Stain"],a:0,e:"odontogenic cyst"},

/* PEDO */
{case:"تسوس واسع عند طفل.",q:"التشخيص؟",o:["ECC","Stain","Fracture","Attrition"],a:0,e:"early childhood caries"},
{case:"طفل غير متعاون.",q:"الإجراء؟",o:["Behavior management","Extraction","Ignore","Delay"],a:0,e:"management"},

/* PROSTH */
{case:"حشوة مرتفعة تسبب ألم.",q:"السبب؟",o:["High occlusion","Caries","Cyst","Pulpitis"],a:0,e:"occlusal trauma"},
{case:"تاج يسقط بسرعة.",q:"السبب؟",o:["Cement failure","Fracture","Caries","Sensitivity"],a:0,e:"retention loss"},
{case:"حساسية بعد تاج.",q:"السبب؟",o:["Dentin exposure","Cyst","Abscess","Gingivitis"],a:0,e:"exposed dentin"}

];

/* =========================
   BUILD 120 WITHOUT DUPLICATION
========================= */

let bank = [];

for(let i=0;i<120;i++){
let b = baseCases[i % baseCases.length];

bank.push({
case: b.case + " (حالة " + (i+1) + ")",
q: b.q,
o: [...b.o],
a: b.a,
e: b.e
});
}

let i=0,score=0;

function startExam(){
i=0;score=0;
document.getElementById("start").style.display="none";
document.getElementById("exam").style.display="block";
document.getElementById("result").style.display="none";
load();
}

function load(){
if(i>=bank.length){end();return;}

let q=bank[i];

document.getElementById("qnum").innerText="الحالة "+(i+1)+" / 120";
document.getElementById("score").innerText="النقاط: "+score;

document.getElementById("question").innerText=q.case+"\n\n"+q.q;

let html="";
q.o.forEach((opt,idx)=>{
html+=`<button class="btn" onclick="check(${idx})">${opt}</button>`;
});

document.getElementById("answers").innerHTML=html;
document.getElementById("explain").style.display="none";
}

function check(x){
let q=bank[i];
let buttons=document.querySelectorAll(".btn");

buttons.forEach((b,idx)=>{
b.disabled=true;

if(idx===q.a){
b.style.background="#22c55e";
b.style.color="white";
}

if(idx===x && x!==q.a){
b.style.background="#ef4444";
b.style.color="white";
}
});

document.getElementById("explain").innerText=q.e;
document.getElementById("explain").style.display="block";

if(x===q.a) score++;

setTimeout(()=>{i++;load();},1500);
}

function end(){
document.getElementById("exam").style.display="none";
document.getElementById("result").style.display="block";

document.getElementById("result").innerHTML=
"<div class='card'>" +
"<h2>انتهى الامتحان</h2>" +
"<p>النتيجة: "+score+" / 120</p>" +
"<button class='restart' onclick='location.reload()'>إعادة الامتحان</button>" +
"</div>";
}

</script>

</body>
</html>
