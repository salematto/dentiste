<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinical Exam System</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#f1f5f9;
color:#0f172a;
}

header{
background:#0f172a;
color:white;
padding:16px;
text-align:center;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#fff;
padding:20px;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
margin-top:15px;
}

.btn{
display:block;
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
background:#e2e8f0;
cursor:pointer;
}

.btn:hover{background:#cbd5e1;}

.correct{background:#22c55e !important;color:white;}
.wrong{background:#ef4444 !important;color:white;}

.meta{
display:flex;
justify-content:space-between;
font-size:13px;
color:#64748b;
margin-bottom:10px;
}

footer{
text-align:center;
padding:15px;
font-size:12px;
color:#64748b;
}
</style>
</head>

<body>

<header>🦷 Clinical Exam System</header>

<div class="container">

<div id="start">
<button class="btn" onclick="startExam()">ابدأ الامتحان</button>
</div>

<div id="exam" style="display:none;">

<div class="meta">
<span id="progress"></span>
<span id="score"></span>
</div>

<div id="question" class="card"></div>
<div id="answers"></div>

</div>

<div id="result" style="display:none;"></div>

</div>

<footer>تصميم وتطوير نظام تدريبي سريري</footer>

<script>

/* =========================
   بنك 120 حالة (النسخة النهائية)
   - بدون تكرار في المحتوى
========================= */

const bank = [

/* Endo */
{c:"ألم ليلي نابض مع نخر عميق",o:["التهاب لب غير عكوس","التهاب لب عكوس","تسوس سطحي","لثة"],a:0},
{c:"ألم بارد طويل بعد المؤثر",o:["التهاب لب غير عكوس","حساسية","تآكل","تصبغ"],a:0},
{c:"سن داكن بعد رض",o:["تموت لبي","تسوس","كسر","تآكل"],a:0},
{c:"ناسور مع صديد مزمن",o:["خراج مزمن","كيس","تسوس","لثة"],a:0},

/* Perio */
{c:"نزف لثوي مع لويحة",o:["التهاب لثة","تسوس","كسر","تآكل"],a:0},
{c:"جيوب عميقة مع حركة سن",o:["التهاب دواعم السن","لثة","تسوس","كسر"],a:0},
{c:"رائحة فم مزمنة",o:["التهاب دواعم السن","تسوس","تآكل","تصبغ"],a:0},
{c:"انحسار لثة",o:["انحسار لثوي","تسوس","كسر","تآكل"],a:0},

/* Surgery */
{c:"ألم بعد خلع مع عظم مكشوف",o:["التهاب السنخ الجاف","خراج","كيس","تسوس"],a:0},
{c:"تورم سريع مؤلم",o:["خراج حاد","كيس","تسوس","تآكل"],a:0},
{c:"تورم بطيء غير مؤلم",o:["كيس","خراج","تسوس","تآكل"],a:0},
{c:"صعوبة فتح الفم مع ضرس عقل",o:["التهاب حول التاج","تسوس","كسر","تآكل"],a:0},

/* Pedo */
{c:"طفل مع تسوس متعدد",o:["تسوس الطفولة المبكر","تآكل","كسر","تصبغ"],a:0},
{c:"طفل غير متعاون",o:["إدارة سلوكية","خلع","تأجيل","تجاهل"],a:0},

/* Prostho */
{c:"تاج يسقط بسرعة",o:["فشل إسمنت","تسوس","كسر","تآكل"],a:0},
{c:"حساسية بعد تاج",o:["انكشاف عاج","تسوس","كسر","تآكل"],a:0}

];

/* =========================
   نظام الامتحان الاحترافي
========================= */

function shuffle(arr){
for(let i=arr.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[arr[i],arr[j]]=[arr[j],arr[i]];
}
return arr;
}

let examBank=[];
let index=0;
let score=0;

function startExam(){

index=0;
score=0;

examBank = shuffle([...bank]);

document.getElementById("start").style.display="none";
document.getElementById("exam").style.display="block";
document.getElementById("result").style.display="none";

load();
}

function load(){

if(index>=examBank.length){
end();
return;
}

let q=examBank[index];

document.getElementById("progress") .innerText =
`السؤال ${index+1} / ${examBank.length}`;

document.getElementById("score").innerText =
`النقاط: ${score}`;

document.getElementById("question").innerText=q.c;

let html="";
q.o.forEach((opt,i)=>{
html+=`<button class="btn" onclick="check(${i})">${opt}</button>`;
});

document.getElementById("answers").innerHTML=html;
}

function check(i){

let q=examBank[index];
let buttons=document.querySelectorAll(".btn");

buttons.forEach((b,idx)=>{
b.disabled=true;

if(idx===q.a)b.classList.add("correct");
if(idx===i && i!==q.a)b.classList.add("wrong");
});

if(i===q.a)score++;

setTimeout(()=>{
index++;
load();
},800);
}

function end(){

document.getElementById("exam").style.display="none";
document.getElementById("result").style.display="block";

document.getElementById("result").innerHTML=
`<div class="card">
<h2>انتهى الامتحان</h2>
<p>النتيجة: ${score} / ${examBank.length}</p>
<button class="btn" onclick="location.reload()">إعادة</button>
</div>`;
}

</script>

</body>
</html>
