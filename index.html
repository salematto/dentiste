<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الاختبار الشامل لطلبة طب الأسنان | د. زكريا عطوني</title>
    <style>
        :root {
            --primary-dark: #1a2a3a;
            --accent-blue: #2c3e50;
            --clinical-blue: #34495e;
            --success-green: #27ae60;
            --error-red: #c0392b;
            --text-light: #ecf0f1;
            --bg-gradient: linear-gradient(135deg, #1a2a3a 0%, #2c3e50 100%);
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            color: var(--text-light);
        }

        #quiz-container {
            background: rgba(255, 255, 255, 0.98);
            width: 90%;
            max-width: 900px;
            margin: 40px auto;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            color: #333;
            position: relative;
            overflow: hidden;
        }

        #header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .status-badge {
            background: var(--primary-dark);
            color: white;
            padding: 8px 18px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
        }

        #question-text {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary-dark);
            margin: 35px 0;
            line-height: 1.6;
            text-align: center;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 15px;
        }

        .option-btn {
            padding: 22px;
            font-size: 1.2rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: #fff;
            cursor: pointer;
            transition: 0.2s all;
            text-align: right;
            color: var(--clinical-blue);
        }

        .option-btn:hover:not([disabled]) {
            border-color: var(--primary-dark);
            background: #f8fbff;
        }

        .correct { background-color: var(--success-green) !important; color: white !important; border-color: #1e8449 !important; }
        .wrong { background-color: var(--error-red) !important; color: white !important; border-color: #922b21 !important; }

        #explanation-box {
            margin-top: 25px;
            padding: 20px;
            background: #f1f5f9;
            border-right: 6px solid var(--primary-dark);
            border-radius: 5px;
            display: none;
            font-size: 1.1rem;
            line-height: 1.7;
        }

        #timer-bar-container {
            width: 100%;
            height: 6px;
            background: #eee;
            position: absolute;
            bottom: 0;
            left: 0;
        }

        #timer-bar { height: 100%; background: var(--success-green); width: 0%; transition: width 5s linear; }

        footer { text-align: center; padding: 25px; color: rgba(255,255,255,0.8); }
        .doctor-sign { font-weight: bold; border-top: 1px solid rgba(255,255,255,0.3); padding-top: 10px; display: inline-block; }

        @media (max-width: 600px) {
            #question-text { font-size: 1.4rem; }
            .options-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="header-info">
        <span class="status-badge" id="progress">السؤال: 1 / 80</span>
        <span class="status-badge" id="score">النقاط: 0</span>
    </div>

    <div id="question-text">جاري تحضير بنك الأسئلة...</div>
    
    <div class="options-grid">
        <button class="option-btn" onclick="handleSelection(0)"></button>
        <button class="option-btn" onclick="handleSelection(1)"></button>
        <button class="option-btn" onclick="handleSelection(2)"></button>
        <button class="option-btn" onclick="handleSelection(3)"></button>
    </div>

    <div id="explanation-box"></div>
    <div id="timer-bar-container"><div id="timer-bar"></div></div>
</div>

<footer>
    <div class="doctor-sign">تصميم وتطوير الدكتور زكريا محمد عطوني</div>
</footer>

<script>
    const quizData = [
        { q: "ما هو المكون المعدني الأساسي في مينا الأسنان؟", options: ["هيدروكسي أباتيت", "فلوريد الكالسيوم", "كربونات الكالسيوم", "الفوسفات العضوي"], correct: 0, explain: "تتكون المينا بنسبة 96% من بلورات الهيدروكسي أباتيت (Hydroxyapatite)." },
        { q: "أي الأضراس التالية يمتلك عادةً 3 جذور؟", options: ["الرحى الأولى السفلية", "الرحى الأولى العلوية", "الضاحك الأول العلوي", "الرحى الثانية السفلية"], correct: 1, explain: "الأرحاء العلوية تمتلك ثلاثة جذور: دهليزي انسي، دهليزي وحشي، وحنكي." },
        { q: "تركيز حمض الفوسفوريك المعياري لتخريش المينا هو:", options: ["10%", "20%", "37%", "50%"], correct: 2, explain: "يستخدم حمض الفوسفوريك 37% لخلق مسامية مجهرية كافية للارتباط الميكانيكي." },
        { q: "العصب المسؤول عن تعصيب الأسنان السفلية حسياً هو:", options: ["العصب الوجهي", "العصب السنخي السفلي", "العصب اللساني", "العصب الأذني الصدغي"], correct: 1, explain: "العصب السنخي السفلي (IAN) هو فرع من الفكي السفلي ويوفر الحس للأسنان." },
        { q: "المادة الذهبية المعيارية لحشو قنوات الجذور هي:", options: ["الأملغم", "الكوتابيركا", "الكومبوزيت", "الزنك فوسفات"], correct: 1, explain: "الكوتابيركا مادة حيوية مستقرة تستخدم لسد القنوات بعد التنظيف." },
        { q: "أي الخلايا مسؤولة عن إنتاج العاج (Dentin)؟", options: ["Ameloblasts", "Odontoblasts", "Cementoblasts", "Osteoblasts"], correct: 1, explain: "الأودونتوبلاست تصطف في محيط اللب وتنتج العاج طوال حياة السن." },
        { q: "عدد الأسنان اللبنية المكتمل في الفم هو:", options: ["10 أسنان", "20 سناً", "28 سناً", "32 سناً"], correct: 1, explain: "يتكون الطقم اللبني من 20 سناً (4 قواطع، 2 ناب، 4 أرحاء في كل فك)." },
        { q: "المصطلح العلمي لجفاف الفم الناتج عن نقص اللعاب:", options: ["Gingivitis", "Xerostomia", "Stomatitis", "Halitosis"], correct: 1, explain: "الزيروستوميا (Xerostomia) تعني جفاف الفم ولها أسباب دوائية أو مرضية." },
        { q: "أصلب أنسجة جسم الإنسان هو:", options: ["العظم السنخي", "العاج", "المينا", "الملاط"], correct: 2, explain: "المينا هي النسيج الأكثر تمعدناً وصلابة في الجسم البشري." },
        { q: "يستخدم سائل الـ EDTA في المداواة اللبية من أجل:", options: ["التعقيم الجرثومي", "حل النسج العضوية", "إزالة الطبقة اللطاخة", "الإرواء المائي"], correct: 2, explain: "يعمل EDTA كعامل مخلبي لإزالة المكون غير العضوى من الطبقة اللطاخة (Smear Layer)." },
        { q: "ما هو العمر المتوسط لبزوغ الرحى الأولى الدائمة؟", options: ["4 سنوات", "6 سنوات", "8 سنوات", "12 سنة"], correct: 1, explain: "تسمى رحى الست سنوات، وهي حجر الزاوية في الإطباق الدائم." },
        { q: "أي من العضلات التالية هي العضلة الماضغة الأساسية؟", options: ["العضلة المبوقة", "العضلة الصدغية", "العضلة الوجنية", "العضلة الدويرية الفموية"], correct: 1, explain: "العضلة الصدغية (Temporalis) والماضغة (Masseter) هما المحركان الأساسيان للفك." },
        { q: "التهاب اللثة الناجم عن تراكم اللويحة يسمى:", options: ["Periodontitis", "Gingivitis", "Pulpitis", "Pericoronitis"], correct: 1, explain: "Gingivitis هو التهاب النسج الرخوة دون ضياع في الرباط السني." },
        { q: "أداة 'المسبر السني' (Dental Probe) تستخدم لـ:", options: ["كشف التسوس", "قياس عمق الجيوب اللثوية", "برد العظام", "خلع الأسنان"], correct: 1, explain: "المسبر اللثوي مدرج بالملم لقياس عمق الميزاب أو الجيب اللثوي." },
        { q: "أي المواد التالية تفرز الفلورايد بعد تطبيقها؟", options: ["الكومبوزيت", "الزجاجي الشاردي (GIC)", "الأملغم", "الذهب"], correct: 1, explain: "الأسمنت الزجاجي الشاردي يتميز بخاصية إطلاق الفلورايد وإعادة التمعدن." },
        { q: "أين تقع غدة 'ستينسون' (Stensen's duct)؟", options: ["تحت اللسان", "تحت الفك", "مقابل الرحى الثانية العلوية", "في الحنك الصلب"], correct: 2, explain: "هي قناة الغدة النكفية وتفتح في دهليز الفم مقابل الرحى الثانية العلوية." },
        { q: "ما هو الفيتامين الضروري لسلامة اللثة ومنع النزف؟", options: ["فيتامين A", "فيتامين B12", "فيتامين C", "فيتامين D"], correct: 2, explain: "نقص فيتامين C يؤدي لمرض الإسقربوط وضعف كولاجين اللثة." },
        { q: "المصطلح 'Mesial' في وصف السن يعني:", options: ["بعيد عن خط الوسط", "قريب من خط الوسط", "سطح إطباقي", "سطح لساني"], correct: 1, explain: "الإنسي (Mesial) هو السطح المواجه لمنتصف القوس السنية." },
        { q: "أي الأنسجة التالية لا يحتوي على أوعية دموية أو أعصاب؟", options: ["اللب السني", "المينا", "العاج", "الرباط السني"], correct: 1, explain: "المينا نسيج غير حي خلوي، لا يتجدد ولا يحتوي على أعصاب." },
        { q: "ما هو سبب تلون الأسنان الناتج عن 'التتراسيكلين'؟", options: ["خارجي سطحي", "داخلي تكويني", "نخر كيميائي", "تآكل آلي"], correct: 1, explain: "التتراسيكلين يرتبط بالكالسيوم أثناء تكوين السن مسبباً تلوناً داخلياً دائماً." },
        { q: "في تصنيف 'بلاك'، الصنف الأول (Class I) يشمل:", options: ["السطوح الملاصقة", "الوهاد والشقوق", "الأعناق", "الحدبات"], correct: 1, explain: "الصنف الأول يشمل نخر الوهاد والشقوق في الأرحاء والضواحك." },
        { q: "أداة الـ Forceps في جراحة الفم تستخدم لـ:", options: ["شق اللثة", "الخياطة", "قبض السن وخلعه", "توسيع العظم"], correct: 2, explain: "الكلابة (Forceps) هي الأداة الأساسية لإمساك السن بعد فك الارتباط." },
        { q: "ما هي وظيفة الألياف العضلية 'المبوقة' (Buccinator)؟", options: ["فتح الفك", "ضغط الخد ومنع تجمع الطعام", "رفع الشفة", "الابتسام"], correct: 1, explain: "تساعد في إبقاء الطعام فوق السطوح الإطباقية أثناء المضغ." },
        { q: "زمن التخريش الحمضي (Etching) للمينا عادة هو:", options: ["5 ثوانٍ", "15-30 ثانية", "2 دقيقة", "5 دقائق"], correct: 1, explain: "هذا الزمن كافٍ لإنتاج النمط التخريشي المطلوب دون تدمير مفرط للمينا." },
        { q: "ما هو السن الدائم الذي يستبدل الرحى اللبنية الأولى؟", options: ["الرحى الأولى الدائمة", "الضاحك الأول", "الضاحك الثاني", "الناب"], correct: 1, explain: "الضواحك تحل محل الأرحاء اللبنية، بينما الأرحاء الدائمة تبزغ خلفها." },
        { q: "الفتحة الذقنية (Mental Foramen) تقع عادةً تحت:", options: ["الناب السفلية", "الضواحك السفلية", "الرحى الثالثة", "القواطع"], correct: 1, explain: "تقع غالباً بين ذروتي الضاحكين السفليين." },
        { q: "المادة 'Hypochlorite Sodium' تستخدم في اللبية لـ:", options: ["الحشو", "الإرواء والتعقيم", "التخدير", "التغطية اللبية"], correct: 1, explain: "هيبوكلوريت الصوديوم هو المحلول الإروائي الأساسي لحل الأنسجة العضوية." },
        { q: "أي من الحالات التالية تتطلب مضادات حيوية وقائية قبل الجراحة؟", options: ["صمام قلب اصطناعي", "تبييض أسنان", "نخر بسيط", "تقليح لثة"], correct: 0, explain: "لحماية المريض من خطر التهاب شغاف القلب الجرثومي." },
        { q: "الغطاء البروتيني الذي يغلف السن فور تنظيفه يسمى:", options: ["Biofilm", "Pellicle", "Calculus", "Materia Alba"], correct: 1, explain: "اللويحة المكتسبة (Acquired Pellicle) تتشكل من بروتينات اللعاب فوراً." },
        { q: "جهاز الـ Apex Locator يستخدم في:", options: ["كشف التسوس", "تحديد طول القناة الجذرية", "قياس حيوية اللب", "تصوير الأشعة"], correct: 1, explain: "يستخدم لتحديد موقع الذروة بدقة أثناء المعالجة اللبية." },
        { q: "ما هو الملاط (Cementum)؟", options: ["نسيج يغطي التاج", "نسيج يغطي الجذر", "العظم المحيط بالسن", "لب السن"], correct: 1, explain: "الملاط يغطي العاج الجذري ويؤمن ارتباط ألياف الرباط." },
        { q: "الـ 'Bruxism' هو مصطلح طبي يعني:", options: ["تسوس الأسنان", "صرير الأسنان", "التهاب اللثة", "فقدان الأسنان"], correct: 1, explain: "الصرير (Bruxism) هو إطباق الأسنان اللاإرادي خاصة أثناء النوم." },
        { q: "ما هي وظيفة الـ Osteoblasts؟", options: ["هدم العظم", "بناء العظم", "امتصاص الجذور", "إفراز اللعاب"], correct: 1, explain: "الخلايا البانية للعظم (Osteoblasts) هي المسؤولة عن تكوين النسيج العظمي." },
        { q: "أي الأسنان التالية يسمى 'مفتاح الإطباق'؟", options: ["الناب", "الرحى الأولى الدائمة", "الرحى الثالثة", "القاطع المركزي"], correct: 1, explain: "حسب تصنيف Angle، علاقة الرحى الأولى هي أساس الإطباق السليم." },
        { q: "ما هو المحلول المستخدم لتخزين الأسنان المقلوعة لإعادة زرعها؟", options: ["الماء", "الحليب", "الكحول", "الخل"], correct: 1, explain: "الحليب يحافظ على حيوية خلايا الرباط السني لفترة أطول." },
        { q: "أداة الـ Elevator في الجراحة تستخدم لـ:", options: ["الخياطة", "القطع", "رفع وفك ارتباط السن", "حفر العظم"], correct: 2, explain: "الرافعة (Elevator) تستخدم لخلخلة السن قبل استخدام الكلابة." },
        { q: "ما هو الـ Overbite؟", options: ["التداخل الأفقي", "التداخل العمودي للقواطع", "فراغ بين الأسنان", "تقدم الفك السفلي"], correct: 1, explain: "التغطية (Overbite) هي المسافة التي تغطي بها القواطع العلوية السفلية عمودياً." },
        { q: "المادة الفعالة في الجل المبيض للأسنان غالباً هي:", options: ["حمض الفوسفوريك", "بيروكسيد الهيدروجين", "هيدروكسيد الكالسيوم", "الكلورهيكسيدين"], correct: 1, explain: "بيروكسيد الهيدروجين أو الكرباميد يعمل على أكسدة التصبغات." },
        { q: "التهاب اللثة حول تاج السن بزوغ جزئي يسمى:", options: ["Pulpitis", "Pericoronitis", "Periodontitis", "Caries"], correct: 1, explain: "التهاب حول التاج (Pericoronitis) يشيع جداً في أرحاء العقل السفلية." },
        { q: "أي نوع من الأشعة يظهر كامل الفكين والأسنان؟", options: ["Periapical", "Bitewing", "Panoramic", "Occlusal"], correct: 2, explain: "الأشعة البانورامية تعطي صورة شاملة للهياكل الفكية والسنية." },
        { q: "الـ Composite هو مادة حشو تلتصق بالسن بـ:", options: ["ارتباط كيميائي فقط", "ارتباط ميكانيكي مجهري", "الجاذبية", "التثبيت اليدوي"], correct: 1, explain: "يعتمد على التخريش والحمضي والـ Bonding لخلق قفل ميكانيكي." },
        { q: "ما هو الـ Alveolitis (Dry Socket)؟", options: ["التهاب اللب", "التهاب العظم السنخي بعد الخلع", "تسوس عميق", "خراج لثوي"], correct: 1, explain: "التبنط الجاف يحدث عند فقدان العلقة الدموية بعد خلع السن." },
        { q: "الغدة اللعابية الأكبر حجماً هي:", options: ["النكفية", "تحت الفك", "تحت اللسان", "الغدد الصغيرة"], correct: 0, explain: "الغدة النكفية (Parotid) هي كبرى الغدد اللعابية." },
        { q: "أي الأدوات تستخدم لإزالة الترسبات الكلسية (Tartar)؟", options: ["المبرد", "المقشرة (Scaler)", "السمبلة", "المقص"], correct: 1, explain: "المقشرة يدوية أو فوق صوتية (Ultrasonic) تزيل الجير." },
        { q: "ما هو الـ Dentin Bridge؟", options: ["جسر تعويضي", "عاج ترميمي يتشكل فوق اللب", "عظم صناعي", "رابط لثوي"], correct: 1, explain: "يتشكل كرد فعل عند التغطية اللبية المباشرة بمواد مثل MTA." },
        { q: "الـ Malocclusion يعني:", options: ["نخر الأسنان", "سوء الإطباق", "فقدان العظم", "رائحة الفم"], correct: 1, explain: "أي انحراف عن الإطباق المثالي الطبيعي." },
        { q: "الكلورهيكسيدين (CHX) يستخدم كمضمضة لـ:", options: ["تبييض الأسنان", "السيطرة على الجراثيم واللويحة", "حل العظم", "تسكين الألم"], correct: 1, explain: "مطهر فموي قوي يرتبط بالأنسجة ويطلق ببطء." },
        { q: "ما هي وظيفة الـ Cementoblasts؟", options: ["بناء المينا", "بناء الملاط", "بناء العاج", "هدم العظم"], correct: 1, explain: "خلايا متخصصة في تكوين الملاط الجذري." },
        { q: "الـ Pulp Stones هي:", options: ["تسوس", "حصى كلسية داخل اللب", "التهاب لثة", "خراج"], correct: 1, explain: "تكلسات داخل نسيج اللب قد تعيق المعالجة اللبية." },
        { q: "أي الفئات العمرية يظهر عندها 'السن الأسود' نتيجة الفلوروز؟", options: ["كبار السن", "الأطفال أثناء تكوين الأسنان", "المدخنون", "مرضى السكري"], correct: 1, explain: "زيادة الفلورايد أثناء تكوين المينا تؤدي لتبقعها." },
        { q: "ما هو الـ Xerography؟", options: ["نوع من الحشوات", "تصوير إشعاعي جاف", "جراحة لثة", "تبييض"], correct: 1, explain: "تقنية تصوير إشعاعي قديمة لم تعد شائعة حالياً." },
        { q: "الـ Root Planing يهدف إلى:", options: ["خلع الجذور", "تنعيم سطح الجذر وإزالة الجير العميق", "توسيع القناة", "حفر العظم"], correct: 1, explain: "إجراء علاجي لأمراض اللثة المتقدمة." },
        { q: "مادة الـ MTA تستخدم في:", options: ["تبييض", "سد ثقوب الجذور والتغطية اللبية", "حشوة مؤقتة", "طبعة"], correct: 1, explain: "Mineral Trioxide Aggregate مادة حيوية ممتازة للختم." },
        { q: "أي سن يمتلك أطول جذر في فم الإنسان؟", options: ["الرحى الأولى", "الناب العلوي", "الضاحك الثاني", "القاطع المركزي"], correct: 1, explain: "الناب العلوي يمتلك أطول جذر لضمان الثبات في زاوية الفك." },
        { q: "ما هو الـ Ankylosis؟", options: ["تسوس", "التحام السن بالعظم مباشرة", "التهاب عصب", "كسر سن"], correct: 1, explain: "غياب الرباط السني مما يؤدي لالتصاق الملاط بالعظم." },
        { q: "الـ Leukoplakia هي:", options: ["تسوس", "بقعة بيضاء لا تمسح (قد تكون قبل سرطانية)", "نزف لثوي", "خراج"], correct: 1, explain: "آفة بيضاء تتطلب مراقبة أو خزعة لاستبعاد الخباثة." },
        { q: "أي المواد تستخدم لأخذ طبعات الأسنان الأولية؟", options: ["الكومبوزيت", "الألجينات (Alginate)", "الذهب", "الشمع"], correct: 1, explain: "الألجينات مادة هيدروكولويدية شائعة وسريعة لأخذ الطبعات." },
        { q: "ما هو الـ Diastema؟", options: ["نخر ملاصق", "فراغ بين سنين متجاورين", "تراكب أسنان", "التهاب عصب"], correct: 1, explain: "تشيع خاصة بين القواطع المركزية العلوية." },
        { q: "الـ Bifurcation تعني:", options: ["ذروة السن", "منطقة تفرع الجذرين", "تاج السن", "اللب"], correct: 1, explain: "المنطقة التي ينقسم فيها الجذع الجذري إلى جذرين." },
        { q: "أي مما يلي يسبب 'رائحة الفم الكريهة' (Halitosis)؟", options: ["تراكم اللويحة على اللسان", "شرب الماء", "تنظيف الأسنان", "استخدام الخيط"], correct: 0, explain: "الجراثيم الموجودة على الجزء الخلفي من اللسان مصدر رئيسي للرائحة." },
        { q: "ما هو الـ Zinc Phosphate؟", options: ["مادة تبييض", "أسمنت للاتصاق والتبطين", "حشوة تجميلية", "مخدر"], correct: 1, explain: "من أقدم أنواع الأسمنت السني المستخدمة للتبنيط." },
        { q: "الـ Gingivectomy هو إجراء لـ:", options: ["حشو العصب", "استئصال جزء من اللثة", "خلع السن", "تبييض"], correct: 1, explain: "جراحة استئصال اللثة لعلاج الضخامة أو لأسباب تجميلية." },
        { q: "ما هي وظيفة 'غدد فون إبنر'؟", options: ["إفراز المخاط", "إفراز سائل مائي لغسل الحليمات الذوقية", "إفراز الفلورايد", "إفراز الهرمونات"], correct: 1, explain: "توجد حول الحليمات المحوطة وتساعد في التذوق." },
        { q: "الـ Canine Eminence هو:", options: ["نخر في الناب", "البروز العظمي للناب في الفك", "طرف الناب", "جذر الناب"], correct: 1, explain: "البروز العظمي الذي يعطي دعماً لشكل الشفة والوجه." },
        { q: "ما هو الـ Pulpotomy؟", options: ["استئصال كامل اللب", "استئصال لب التاج فقط", "خلع السن", "تنظيف الجير"], correct: 1, explain: "شائع في أسنان الأطفال للحفاظ على حيوية لب الجذور." },
        { q: "أي مادة تضاف للمخدر الموضعي لإطالة مفعوله؟", options: ["الأنسولين", "الأدرينالين (Epinephrine)", "الكورتيزون", "الفيتامينات"], correct: 1, explain: "يعمل كقابض وعائي يقلل النزف ويطيل مدة التخدير." },
        { q: "الـ Amalgam يتكون بشكل أساسي من سبيكة و:", options: ["الذهب", "الزئبق", "الحديد", "النحاس"], correct: 1, explain: "الزئبق هو السائل الذي يخلط مع السبيكة لتشكيل الحشوة." },
        { q: "ما هو الـ Dental Pellicle؟", options: ["جير صلب", "غشاء بروتيني رقيق من اللعاب", "تسوس", "خراج"], correct: 1, explain: "يتشكل فوراً بعد التنظيف ويوفر بيئة لالتصاق الجراثيم." },
        { q: "الـ Enamel Rods هي:", options: ["أدوات حفر", "الوحدات البنائية للمينا", "أعصاب السن", "أوعية دموية"], correct: 1, explain: "ملايين المواشور الكلسية التي تشكل بنية المينا." },
        { q: "ما هو سبب 'النخر الراجع' (Recurrent Caries)؟", options: ["نقص الكالسيوم", "نخر تحت حشوة سابقة", "كثرة الأكل", "الوراثة"], correct: 1, explain: "يحدث نتيجة فشل ختم الحشوة وتجمع الجراثيم تحتها." },
        { q: "الـ Trismus يعني:", options: ["ألم أسنان", "تشنج عضلات المضغ وصعوبة فتح الفم", "نزف لثة", "فقدان حس"], correct: 1, explain: "قد يحدث بعد التخدير الموضعي أو الالتهابات الشديدة." },
        { q: "ما هي 'قنوات هافرس'؟", options: ["قنوات في اللب", "قنوات في العظم المدمج", "قنوات لعابية", "قنوات عصبية"], correct: 1, explain: "قنوات مجهرية في العظم تحتوي على الأوعية والأعصاب." },
        { q: "الـ Impaction يعني:", options: ["بزوغ سريع", "انحصار السن داخل العظم وعدم بزوغه", "كسر السن", "تآكل السن"], correct: 1, explain: "شائع جداً في أرحاء العقل والأنياب العلوية." },
        { q: "ما هي وظيفة 'الخلايا الملاطية'؟", options: ["هدم العظم", "بناء الملاط", "تدمير المينا", "إفراز اللعاب"], correct: 1, explain: "Cementocytes هي خلايا الملاط الناضجة." },
        { q: "الـ Inlay هو تعويض سني يصنع في:", options: ["عيادة الأسنان مباشرة", "المختبر السني", "المصنع", "الصيدلية"], correct: 1, explain: "ترميم مصبوب يصنع خارج الفم ثم يلصق في التجويف." },
        { q: "ما هو الـ Space Maintainer؟", options: ["جهاز تقويم", "حافظ مسافة بعد فقدان سن لبني مبكر", "حشوة", "موسع فك"], correct: 1, explain: "يمنع ميلان الأسنان المجاورة ويحفظ مكان السن الدائم." },
        { q: "أي فيتامين يرتبط امتصاصه بصحة العظم السنخي؟", options: ["فيتامين C", "فيتامين D", "فيتامين K", "فيتامين E"], correct: 1, explain: "فيتامين D ضروري لتمثيل الكالسيوم وبناء العظام." },
        { q: "الـ Microleakage يؤدي إلى:", options: ["تبييض السن", "تسوس ثانوي وحساسية", "قوة الحشوة", "تجميل السن"], correct: 1, explain: "تسرب السوائل والجراثيم بين الحشوة وجدران السن." },
        { q: "ما هو الـ Articulating Paper؟", options: ["ورق تنظيف", "ورق عض لكشف نقاط التماس العالية", "ورق أشعة", "ورق طبعات"], correct: 1, explain: "ورق ملون يستخدم لضبط الإطباق بعد الحشوات أو التعويضات." },
        { q: "الهدف من 'الارقاء' (Hemostasis) في الجراحة هو:", options: ["توسيع الجرح", "إيقاف النزف وتشكيل العلقة", "تخدير المريض", "فتح الخراج"], correct: 1, explain: "خطوة أساسية لضمان شفاء الجرح وتجنب المضاعفات." }
    ];

    let currentIdx = 0;
    let score = 0;

    function loadQuestion() {
        if (currentIdx >= quizData.length) {
            showFinalResult();
            return;
        }

        const q = quizData[currentIdx];
        document.getElementById("progress").innerText = `السؤال: ${currentIdx + 1} / 80`;
        document.getElementById("question-text").innerText = q.q;
        document.getElementById("explanation-box").style.display = "none";
        document.getElementById("timer-bar").style.width = "0%";
        
        const btns = document.querySelectorAll(".option-btn");
        btns.forEach((btn, i) => {
            btn.innerText = q.options[i];
            btn.className = "option-btn";
            btn.disabled = false;
        });
    }

    function handleSelection(idx) {
        const q = quizData[currentIdx];
        const btns = document.querySelectorAll(".option-btn");
        btns.forEach(btn => btn.disabled = true);

        if (idx === q.correct) {
            btns[idx].classList.add("correct");
            score++;
            document.getElementById("score").innerText = `النقاط: ${score}`;
        } else {
            btns[idx].classList.add("wrong");
            btns[q.correct].classList.add("correct");
        }

        const exp = document.getElementById("explanation-box");
        exp.innerHTML = `<strong>التفسير العلمي:</strong> <br> ${q.explain}`;
        exp.style.display = "block";

        const timerBar = document.getElementById("timer-bar");
        timerBar.style.width = "100%";

        setTimeout(() => {
            currentIdx++;
            loadQuestion();
        }, 5000);
    }

    function showFinalResult() {
        document.getElementById("quiz-container").innerHTML = `
            <div style="text-align:center; padding:40px;">
                <h1 style="color:var(--primary-dark)">اكتمل الاختبار الشامل</h1>
                <p style="font-size:2.8rem; color:var(--success-green); font-weight:bold;">${score} / 80</p>
                <p style="font-size:1.3rem; color:#555;">نتيجة تعكس مستواك العلمي في طب الأسنان.</p>
                <button onclick="location.reload()" style="padding:15px 35px; background:var(--primary-dark); color:white; border:none; border-radius:8px; cursor:pointer; margin-top:20px; font-size:1.1rem;">إعادة الاختبار</button>
            </div>
        `;
    }

    window.onload = loadQuestion;
</script>

</body>
</html>
