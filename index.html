<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dental Advanced Training</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f7fb;
color:#0f172a;
}

/* 🔵 Header */
header{
background:#0f2a4a;
color:white;
padding:18px;
text-align:center;
font-size:20px;
font-weight:bold;
border-bottom:4px solid #f59e0b;
}

/* container */
.container{
max-width:850px;
margin:auto;
padding:20px;
}

/* 🟦 بطاقة السؤال (متناسقة الآن) */
.card{
background:linear-gradient(135deg,#0f2a4a,#1e3a8a);
color:white;
padding:28px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
font-size:22px;
font-weight:600;
min-height:120px;
margin-bottom:15px;
}

/* meta */
.meta{
display:flex;
justify-content:space-between;
font-size:13px;
color:#475569;
margin:10px 0;
}

/* 🟦 الخيارات */
.btn{
display:block;
width:100%;
margin:12px 0;
padding:16px;
border-radius:14px;
border:1px solid #1f2937;
cursor:pointer;
font-size:16px;
text-align:right;
background:#111827;
color:#f8fafc;
transition:0.2s;
}

.btn:hover{
transform:translateY(-2px);
border-color:#f59e0b;
}

/* ✔ أخضر */
.correct{
background:#16a34a !important;
color:white !important;
border:none;
}

/* ✖ أحمر */
.wrong{
background:#dc2626 !important;
color:white !important;
border:none;
}

/* زر */
.nextBtn{
margin-top:15px;
padding:12px;
width:100%;
border:none;
border-radius:12px;
background:#0f2a4a;
color:white;
cursor:pointer;
font-size:15px;
}

/* تصنيف */
.tag{
display:inline-block;
padding:4px 10px;
border-radius:999px;
font-size:12px;
margin-top:10px;
background:#e5e7eb;
color:#111827;
}

footer{
margin-top:40px;
background:#0f2a4a;
color:white;
text-align:center;
padding:16px;
font-size:12px;
border-top:4px solid #f59e0b;
}

.result{
text-align:center;
font-size:18px;
line-height:2;
padding:20px;
}
</style>
</head>

<body>

<header>🦷 Dental Advanced Training</header>

<div class="container">

<div id="start">
<button class="btn" style="background:#0f2a4a;" onclick="startExam()">ابدأ التدريب</button>
</div>

<div id="exam" style="display:none;">

<div class="meta">
<div>السؤال: <span id="qnum"></span></div>
<div>الأخطاء: <span id="wrongCount"></span></div>
</div>

<div id="question" class="card"></div>

<div id="answers"></div>

<div id="explain" style="display:none;margin-top:15px;padding:12px;background:#e0f2fe;border-right:5px solid #0ea5e9;border-radius:10px;"></div>

</div>

<div id="result" class="result" style="display:none;"></div>

</div>

<footer>
تصميم وتطوير د. زكريا محمد عطوني
</footer>

<script>

const bank=[];
function add(q,o,a,exp){
bank.push({q,o,a,exp});
}

/* cases */
add("ألم ليلي مع تسوس عميق",["التهاب لب غير عكوس","حساسية","تآكل","تصبغ"],0,"التهاب لب غير عكوس بسبب ضغط داخلي.");
add("نزف لثة عند التفريش",["التهاب لثة","تسوس","كسر","تصبغ"],0,"التهاب لثة بسبب اللويحة.");

const templates=[
["ألم بارد شديد",["حساسية","التهاب لب","تآكل","تصبغ"],0,"حساسية عاجية."],
["تورم لثوي",["خراج","تسوس","حساسية","تصبغ"],0,"خراج موضعي."],
["ألم عند الضغط",["التهاب حول الذروة","تسوس","حساسية","تصبغ"],0,"التهاب حول الذروة."]
];

while(bank.length<120){
let t=templates[bank.length%templates.length];
add(t[0],t[1],t[2],t[3]);
}

let qlist=[];
let i=0;
let wrong=0;

function startExam(){
qlist=bank.sort(()=>Math.random()-0.5);
i=0;wrong=0;

document.getElementById("start").style.display="none";
document.getElementById("exam").style.display="block";
document.getElementById("result").style.display="none";

load();
}

function load(){
if(i>=qlist.length){end();return;}

let q=qlist[i];

document.getElementById("qnum").innerText=(i+1)+"/"+qlist.length;
document.getElementById("wrongCount").innerText=wrong;

document.getElementById("question").innerText=q.q;

let html="";
q.o.forEach((opt,idx)=>{
html+=`<button class="btn" onclick="check(${idx})">${opt}</button>`;
});

document.getElementById("answers").innerHTML=html;
document.getElementById("explain").style.display="none";
}

function check(x){

let q=qlist[i];
let buttons=document.querySelectorAll(".btn");

buttons.forEach((b,idx)=>{
b.disabled=true;
if(idx===q.a) b.classList.add("correct");
if(idx===x && x!==q.a) b.classList.add("wrong");
});

if(x!==q.a) wrong++;

document.getElementById("explain").style.display="block";
document.getElementById("explain").innerText=q.exp;

setTimeout(()=>{
i++;
load();
},1000);
}

function end(){

document.getElementById("exam").style.display="none";
document.getElementById("result").style.display="block";

let score=(qlist.length-wrong)/qlist.length;

let level=
score>0.85?"ممتاز 🟢":
score>0.6?"جيد 🟠":
"يحتاج تدريب 🔴";

document.getElementById("result").innerHTML=`
انتهى التدريب 🧠<br><br>
الأخطاء: ${wrong}<br>
التقييم: ${level}<br><br>
<button class="btn" onclick="location.reload()" style="background:#0f2a4a;">إعادة التدريب</button>
`;
}

</script>

</body>
</html>
