<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dental Clinical Exam</title>

<style>
body{margin:0;font-family:system-ui;background:#0b1220;color:#fff}
header{background:#0f172a;padding:16px;text-align:center;border-bottom:3px solid #facc15;font-weight:bold}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:#111827;padding:18px;border-radius:14px;margin-top:10px;border-left:4px solid #38bdf8}
.btn{display:block;width:100%;padding:12px;margin:8px 0;border:none;border-radius:10px;background:#1f2937;color:white;cursor:pointer}
.correct{background:#16a34a !important}
.wrong{background:#dc2626 !important}
.meta{display:flex;justify-content:space-between;color:#93c5fd;font-size:13px}
.explanation{margin-top:10px;padding:12px;border-radius:10px;background:#0f172a;border-left:4px solid #facc15;color:#e2e8f0;font-size:14px}
</style>
</head>

<body>

<header>🦷 Clinical Dental Exam (Validated)</header>

<div class="container">

<div id="start">
<button class="btn" onclick="startExam()">ابدأ الامتحان</button>
</div>

<div id="exam" style="display:none">

<div class="meta">
<span id="progress"></span>
<span id="score"></span>
</div>

<div id="question" class="card"></div>
<div id="answers"></div>
<div id="explanation"></div>

</div>

<div id="result" style="display:none"></div>

</div>

<script>

/* 🔴 بنك صحيح علميًا */
const bank = [

{
q:"ألم ليلي نابض يوقظ المريض مع استمرار الألم بعد البارد",
o:["التهاب لب غير عكوس","التهاب لب عكوس","حساسية عاجية","تموت لبي"],
a:0,
e:"الألم الليلي المستمر بعد إزالة المنبه يدل على irreversible pulpitis"
},

{
q:"ألم حاد عند البارد يزول فور إزالة المؤثر",
o:["حساسية عاجية","التهاب لب غير عكوس","خراج ذروي","تموت لبي"],
a:0,
e:"الألم السريع الزائل سمة الحساسية العاجية"
},

{
q:"سن غير مستجيب لاختبار الحيوية مع شفافية ذروية شعاعيًا",
o:["تموت لبي","التهاب لب عكوس","حساسية","كسر"],
a:0,
e:"عدم الاستجابة + آفة ذروية = necrotic pulp"
},

{
q:"ألم عند العض مع ألم عند تحرير الضغط",
o:["كسر شعري في السن","التهاب لثة","تسوس سطحي","حساسية"],
a:0,
e:"cracked tooth syndrome يظهر بهذه الصورة"
},

{
q:"نزف لثوي مع لويحة دون فقدان عظم",
o:["التهاب لثة","التهاب دواعم","خراج","كيس"],
a:0,
e:"gingivitis لا يترافق مع فقدان عظم"
},

{
q:"جيوب عميقة مع فقدان عظم شعاعيًا",
o:["التهاب دواعم السن","التهاب لثة","تسوس","حساسية"],
a:0,
e:"periodontitis يتميز بفقدان عظم"
},

{
q:"تورم مؤلم حاد مع حرارة موضعية",
o:["خراج ذروي حاد","كيس جذري","ورم حميد","تآكل"],
a:0,
e:"acute apical abscess"
},

{
q:"تورم بطيء غير مؤلم مع حدود واضحة شعاعيًا",
o:["كيس جذري","خراج","تسوس","التهاب لثة"],
a:0,
e:"radicular cyst"
},

{
q:"ألم شديد بعد القلع مع غياب الخثرة",
o:["التهاب السنخ الجاف","خراج","كيس","ورم"],
a:0,
e:"dry socket"
},

{
q:"تسوس منتشر في أسنان طفل رضيع",
o:["تسوس الطفولة المبكر","تآكل","كسر","تصبغ"],
a:0,
e:"early childhood caries"
}

];

/* خلط الخيارات */
function shuffle(q){
let arr=q.o.map((t,i)=>({t,correct:i===q.a}));
for(let i=arr.length-1;i>0;i--){
let j=Math.random()*(i+1)|0;
[arr[i],arr[j]]=[arr[j],arr[i]];
}
return arr;
}

let i=0,score=0;

function startExam(){
i=0;score=0;
document.getElementById("start").style.display="none";
document.getElementById("exam").style.display="block";
load();
}

function load(){

if(i>=bank.length){
document.getElementById("exam").style.display="none";
document.getElementById("result").style.display="block";

document.getElementById("result").innerHTML=
`<div class="card">النتيجة ${score}/${bank.length}<br>
<button class="btn" onclick="location.reload()">إعادة</button></div>`;
return;
}

let q=bank[i];
let s=shuffle(q);

document.getElementById("progress").innerText=`${i+1}/${bank.length}`;
document.getElementById("score").innerText=`${score}`;
document.getElementById("question").innerText=q.q;
document.getElementById("explanation").innerHTML="";

let html="";
s.forEach((o,idx)=>{
html+=`<button class="btn" onclick="check(${idx})">${o.t}</button>`;
});

document.getElementById("answers").innerHTML=html;

window.correctIndex=s.findIndex(x=>x.correct);
window.exp=q.e;
}

function check(x){

let btns=document.querySelectorAll(".btn");
btns.forEach(b=>b.disabled=true);

btns[window.correctIndex].classList.add("correct");
if(x!==window.correctIndex)btns[x].classList.add("wrong");

document.getElementById("explanation").innerHTML=
`<div class="explanation">${window.exp}</div>`;

if(x===window.correctIndex)score++;

setTimeout(()=>{i++;load();},1500);
}

</script>

</body>
</html>
