<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مدرب طب الأسنان</title>

<style>
body{
margin:0;
font-family: Arial, sans-serif;
background:#0b1220;
color:#e5e7eb;
}

header{
background:#111827;
padding:18px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.sub{
font-size:12px;
opacity:0.7;
margin-top:5px;
}

.container{
display:grid;
gap:12px;
padding:15px;
}

.card{
background:#1f2937;
padding:16px;
border-radius:12px;
cursor:pointer;
transition:0.2s;
}

.card:hover{
background:#374151;
}

.page{
display:none;
padding:15px;
}

button{
margin-top:15px;
padding:10px;
border:none;
border-radius:8px;
background:#38bdf8;
font-weight:bold;
cursor:pointer;
}

footer{
text-align:center;
padding:15px;
font-size:12px;
opacity:0.6;
margin-top:30px;
}
</style>
</head>

<body>

<header>
🦷 مدرب طب الأسنان التفاعلي
<div class="sub">بنك حالات سريرية للتدريب والمراجعة</div>
</header>

<div id="home" class="container">

<div class="card" onclick="openCase('endo')">علاج الجذور</div>
<div class="card" onclick="openCase('peri')">أمراض اللثة</div>
<div class="card" onclick="openCase('surg')">الجراحة الفموية</div>
<div class="card" onclick="openCase('rest')">الترميم</div>
<div class="card" onclick="openCase('ped')">أسنان الأطفال</div>
<div class="card" onclick="openCase('prosth')">التعويضات</div>

</div>

<div id="page" class="page">

<h2 id="title"></h2>
<p id="content"></p>

<button onclick="back()">رجوع</button>

</div>

<footer>
تصميم وتطوير: الدكتور زكريا محمد عطوني - سوريا
</footer>

<script>

const cases = {
endo:[
"ألم شديد مع تسوس عميق → التهاب لب غير عكوس → علاج جذور",
"ألم تلقائي مع تورم → خراج حاد → تصريف + علاج جذور",
"أداة مكسورة أثناء العلاج → محاولة استخراج أو تجاوز"
],
peri:[
"نزف لثة + جيوب 5mm → التهاب لثة مزمن → تنظيف عميق",
"حركة سن درجة 2 → مرض لثوي متقدم → خطة علاج صيانة",
"رائحة فم + ترسبات → التهاب لثة مزمن"
],
surg:[
"ضرس عقل مطمور → خلع جراحي",
"تورم + ألم + صعوبة فتح الفم → التهاب حاد → مضادات وتصريف",
"كيسة فكية → استئصال جراحي"
],
rest:[
"كسر سن أمامي → حشوة كومبوزيت",
"تسوس واسع → تاج كامل",
"فشل ترميم قديم → إعادة ترميم"
],
ped:[
"تسوس أطفال → بتر لبي",
"طفل غير متعاون → تعديل سلوك",
"تسوس مبكر → فلورايد + سدادات"
],
prosth:[
"فقد أسنان → طقم جزئي",
"فقد كامل → طقم كامل",
"خطة زراعة → تقييم وزراعة"
]
};

function openCase(type){
document.getElementById('home').style.display="none";
document.getElementById('page').style.display="block";

let list = cases[type];
let random = list[Math.floor(Math.random()*list.length)];

document.getElementById('title').innerText=type;
document.getElementById('content').innerText=random;
}

function back(){
document.getElementById('home').style.display="grid";
document.getElementById('page').style.display="none";
}

</script>

</body>
</html>
