<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinical Exam System Pro</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#f1f5f9;
color:#0f172a;
}

header{
background:#0f172a;
color:white;
padding:16px;
text-align:center;
font-size:18px;
font-weight:bold;
}

.container{
max-width:850px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:14px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
margin-top:15px;
}

.btn{
display:block;
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
background:#e2e8f0;
cursor:pointer;
}

.btn:hover{background:#cbd5e1;}

.correct{background:#22c55e !important;color:white;}
.wrong{background:#ef4444 !important;color:white;}

.meta{
display:flex;
justify-content:space-between;
font-size:13px;
color:#64748b;
margin-bottom:10px;
}

footer{
text-align:center;
padding:15px;
font-size:12px;
color:#64748b;
}
</style>
</head>

<body>

<header>🦷 Clinical Exam System PRO</header>

<div class="container">

<div id="start">
<button class="btn" onclick="startExam()">ابدأ الامتحان</button>
</div>

<div id="exam" style="display:none;">

<div class="meta">
<span id="progress"></span>
<span id="score"></span>
</div>

<div id="question" class="card"></div>
<div id="answers"></div>

</div>

<div id="result" style="display:none;"></div>

</div>

<footer>تصميم وتطوير: نظام امتحان سريري احترافي</footer>

<script>

/* =========================
   120 Case Bank (مختصر هنا لكن قابل للتوسيع الكامل)
========================= */

const bank = [
{c:"ألم ليلي نابض مع نخر عميق",o:["التهاب لب غير عكوس","حساسية","تآكل","لثة"],a:0},
{c:"ألم بارد قصير",o:["التهاب لب عكوس","خراج","كسر","تصبغ"],a:0},
{c:"تورم مع ناسور",o:["خراج مزمن","كيس","تسوس","تآكل"],a:0},
{c:"ألم عند العض",o:["كسر شعري","التهاب لب","تسوس","حساسية"],a:0},

/* (هنا يتم إدراج باقي 120 حالة بنفس النمط) */
];

/* =========================
   Shuffle كامل للبنك (بدون تكرار)
========================= */

function shuffle(array){
for(let i=array.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[array[i],array[j]]=[array[j],array[i]];
}
return array;
}

let examBank = [];
let index = 0;
let score = 0;
let wrongAnswers = [];

function startExam(){

// إعادة ضبط
index=0;
score=0;
wrongAnswers=[];

// نسخ + خلط البنك بالكامل
examBank = shuffle([...bank]);

document.getElementById("start").style.display="none";
document.getElementById("exam").style.display="block";
document.getElementById("result").style.display="none";

loadQuestion();
}

function loadQuestion(){

if(index>=examBank.length){
return showResult();
}

let q = examBank[index];

document.getElementById("progress").innerText =
`السؤال ${index+1} / ${examBank.length}`;

document.getElementById("score").innerText =
`النقاط: ${score}`;

document.getElementById("question").innerHTML =
q.c;

let html="";
q.o.forEach((opt,i)=>{
html+=`<button class="btn" onclick="check(${i})">${opt}</button>`;
});

document.getElementById("answers").innerHTML=html;
}

function check(selected){

let q = examBank[index];
let buttons=document.querySelectorAll(".btn");

buttons.forEach((b,i)=>{
b.disabled=true;

if(i===q.a) b.classList.add("correct");
if(i===selected && selected!==q.a) b.classList.add("wrong");
});

if(selected===q.a){
score++;
}else{
wrongAnswers.push(q);
}

setTimeout(()=>{
index++;
loadQuestion();
},900);
}

function showResult(){

document.getElementById("exam").style.display="none";
document.getElementById("result").style.display="block";

let html=`
<div class="card">
<h2>انتهى الامتحان</h2>
<p>النتيجة: ${score} / ${examBank.length}</p>
<button class="btn" onclick="location.reload()">إعادة الامتحان</button>
</div>
`;

if(wrongAnswers.length>0){
html+=`<div class="card"><h3>الأخطاء</h3>`;
wrongAnswers.forEach(q=>{
html+=`<p>• ${q.c}</p>`;
});
html+=`</div>`;
}

document.getElementById("result").innerHTML=html;
}

</script>

</body>
</html>
