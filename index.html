<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dental Clinical Exam</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f8fafc;
color:#0f172a;
}

header{
background:#0f172a;
color:white;
padding:18px;
font-size:20px;
text-align:center;
font-weight:bold;
}

.container{
max-width:800px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:24px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.06);
font-size:18px;
min-height:110px;
}

.meta{
display:flex;
justify-content:space-between;
font-size:13px;
color:#475569;
margin:10px 0;
}

.btn{
display:block;
width:100%;
margin:10px 0;
padding:14px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:15px;
background:#e2e8f0;
transition:0.2s;
}

.btn:hover{
background:#cbd5e1;
}

.correct{
background:#16a34a !important;
color:white !important;
}

.wrong{
background:#ef4444 !important;
color:white !important;
}

.start{
padding:14px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.result{
text-align:center;
font-size:18px;
padding:20px;
line-height:2;
}

.badge{
display:inline-block;
padding:6px 14px;
border-radius:999px;
background:#0f172a;
color:white;
margin-top:10px;
}

footer{
text-align:center;
padding:20px;
font-size:12px;
opacity:0.6;
}
</style>
</head>

<body>

<header>🦷 Dental Clinical Exam Pro</header>

<div class="container">

<div id="start">
<button class="start" onclick="startExam()">ابدأ الاختبار</button>
</div>

<div id="exam" style="display:none;">

<div class="meta">
<div>السؤال: <span id="qnum"></span></div>
<div>النتيجة: <span id="score"></span></div>
</div>

<div id="question" class="card"></div>

<div id="answers"></div>

</div>

<div id="result" class="result" style="display:none;"></div>

</div>

<footer>
تصميم وتطوير: د. زكريا عطوني - سوريا
</footer>

<script>

/* 60 حالة سريرية منظمة */
const bank = [

{q:"ألم ليلي شديد مع تسوس عميق",o:["التهاب لب غير عكوس","حساسية","تآكل","تصبغ"],a:0},
{q:"نزف لثة عند التفريش",o:["التهاب لثة","تسوس","كسر","تصبغ"],a:0},
{q:"ضرس عقل مطمور مؤلم",o:["انطمار ضرس","تسوس","حساسية","تآكل"],a:0},
{q:"كسر سن أمامي بعد صدمة",o:["كسر تاجي","تسوس","تصبغ","تآكل"],a:0},
{q:"ألم عند المضغ مع سن سليم ظاهريًا",o:["كسر شعري","تسوس","تآكل","حساسية"],a:0},
{q:"تورم لثوي مع قيح",o:["خراج لثوي","تسوس","حساسية","تصبغ"],a:0},
{q:"رائحة فم مزمنة",o:["التهاب دواعم سن","تسوس","كسر","تصبغ"],a:0},
{q:"حركة سن واضحة",o:["مرض لثوي متقدم","تسوس","حساسية","تصبغ"],a:0},
{q:"ألم بارد شديد",o:["حساسية عاجية","التهاب لب","تآكل","تصبغ"],a:0},
{q:"ألم عفوي ليلي",o:["التهاب لب حاد","تسوس","حساسية","تصبغ"],a:0},

{q:"تورم ذروي مزمن",o:["كيس جذري","تسوس","حساسية","تصبغ"],a:0},
{q:"فشل علاج عصب سابق",o:["إعادة علاج جذور","تسوس","تآكل","حساسية"],a:0},
{q:"سن داكن بعد صدمة قديمة",o:["نخر لب","حساسية","تآكل","تصبغ"],a:0},
{q:"ألم عند الضغط على سن",o:["التهاب حول الذروة","تسوس","حساسية","تصبغ"],a:0},
{q:"تآكل عنقي واضح",o:["تآكل مينا","تسوس","كسر","تصبغ"],a:0},

{q:"طفل مع تسوس متعدد",o:["تسوس طفولي منتشر","حساسية","تآكل","كسر"],a:0},
{q:"طفل غير متعاون",o:["تعديل سلوكي","تسوس","تآكل","كسر"],a:0},
{q:"ألم بعد حشوة مرتفعة",o:["ارتفاع إطباق","تسوس","حساسية","تصبغ"],a:0},
{q:"نزف تلقائي من اللثة",o:["التهاب دواعم سن","تسوس","كسر","تصبغ"],a:0},
{q:"انتفاخ خد مع ألم سن",o:["خراج ذروي","تسوس","حساسية","تصبغ"],a:0},

{q:"ألم عند البارد والحار",o:["التهاب لب","حساسية","تآكل","تصبغ"],a:0},
{q:"كسر جذر سن",o:["كسر جذر","تسوس","تآكل","تصبغ"],a:0},
{q:"رائحة فم مع جيوب عميقة",o:["التهاب دواعم سن","تسوس","كسر","تصبغ"],a:0},
{q:"ألم مفاجئ في سن سليم",o:["كسر شعري","تسوس","حساسية","تصبغ"],a:0},
{q:"تقرح لثوي مزمن",o:["التهاب لثة مزمن","تسوس","كسر","تصبغ"],a:0},

{q:"ألم بعد أكل بارد",o:["حساسية عاجية","التهاب لب","تآكل","تصبغ"],a:0},
{q:"تورم بدون ألم",o:["كيس جذري","تسوس","حساسية","تصبغ"],a:0},
{q:"ألم عند العض فقط",o:["كسر شعري","تسوس","تآكل","تصبغ"],a:0},
{q:"تسوس عميق بدون ألم",o:["لب متليف","التهاب لب","حساسية","تصبغ"],a:0},
{q:"ألم مع ناسور لثوي",o:["خراج مزمن","تسوس","تآكل","تصبغ"],a:0}

];

let qlist=[];
let i=0;
let score=0;

function startExam(){
qlist=bank.sort(()=>Math.random()-0.5);
i=0;score=0;

document.getElementById("start").style.display="none";
document.getElementById("exam").style.display="block";
document.getElementById("result").style.display="none";

load();
}

function load(){

if(i>=qlist.length){
end();
return;
}

let q=qlist[i];

document.getElementById("qnum").innerText=(i+1)+"/"+qlist.length;
document.getElementById("score").innerText=score;

document.getElementById("question").innerText=q.q;

let html="";
q.o.forEach((opt,idx)=>{
html+=`<button class="btn" onclick="check(${idx})">${opt}</button>`;
});

document.getElementById("answers").innerHTML=html;
}

function check(x){

let q=qlist[i];
let buttons=document.querySelectorAll(".btn");

buttons.forEach((b,idx)=>{
if(idx===q.a) b.classList.add("correct");
if(idx===x && x!==q.a) b.classList.add("wrong");
b.disabled=true;
});

if(x===q.a) score++;

setTimeout(()=>{
i++;
load();
},900);
}

function end(){

document.getElementById("exam").style.display="none";
document.getElementById("result").style.display="block";

let level =
score/qlist.length>0.8?"ممتاز 🟢":
score/qlist.length>0.5?"جيد 🟠":
"يحتاج تحسين 🔴";

document.getElementById("result").innerHTML=
"انتهى الاختبار 🧠<br><br>"+
"النتيجة: "+score+" / "+qlist.length+
"<br><span class='badge'>"+level+"</span>";
}

</script>

</body>
</html>
