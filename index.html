<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinical Exam</title>

<style>
body{margin:0;font-family:system-ui;background:#0b1220;color:#fff}
header{padding:16px;text-align:center;background:#111827}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:#111827;padding:20px;border-radius:14px;margin-top:10px}
.btn{display:block;width:100%;padding:12px;margin:8px 0;border:0;border-radius:10px;background:#1f2937;color:white;cursor:pointer}
.correct{background:#16a34a !important}
.wrong{background:#dc2626 !important}
.meta{display:flex;justify-content:space-between;color:#93c5fd;font-size:13px}
footer{text-align:center;color:#64748b;padding:15px;font-size:12px}
</style>
</head>

<body>

<header>🦷 Clinical Exam</header>

<div class="container">

<div id="start">
<button class="btn" onclick="startExam()">ابدأ</button>
</div>

<div id="exam" style="display:none">

<div class="meta">
<span id="progress"></span>
<span id="score"></span>
</div>

<div id="question" class="card"></div>
<div id="answers"></div>

</div>

<div id="result" style="display:none"></div>

</div>

<footer>Exam System</footer>

<script>

/* بنك بسيط للتأكد من التشغيل أولاً */
const bank = [
{c:"ألم ليلي مع نخر",o:["لب غير عكوس","لب عكوس","تسوس","لثة"],a:0},
{c:"نزف لثوي",o:["التهاب لثة","كسر","تسوس","تآكل"],a:0},
{c:"تورم حاد",o:["خراج","كيس","تسوس","تآكل"],a:0},
{c:"ألم عند العض",o:["كسر شعري","تسوس","لثة","تصبغ"],a:0}
];

function shuffle(a){
for(let i=a.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[a[i],a[j]]=[a[j],a[i]];
}
return a;
}

let exam=[],i=0,score=0;

function startExam(){
i=0;score=0;
exam=shuffle([...bank]);

document.getElementById("start").style.display="none";
document.getElementById("exam").style.display="block";

load();
}

function load(){

if(i>=exam.length){
document.getElementById("exam").style.display="none";
document.getElementById("result").style.display="block";
document.getElementById("result").innerHTML=
`<div class="card">النتيجة ${score}/${exam.length}<br><button class="btn" onclick="location.reload()">إعادة</button></div>`;
return;
}

let q=exam[i];

document.getElementById("progress").innerText=`${i+1}/${exam.length}`;
document.getElementById("score").innerText=`نقاط: ${score}`;
document.getElementById("question").innerText=q.c;

let html="";
q.o.forEach((o,idx)=>{
html+=`<button class="btn" onclick="check(${idx})">${o}</button>`;
});

document.getElementById("answers").innerHTML=html;
}

function check(x){

let q=exam[i];
let btns=document.querySelectorAll(".btn");

btns.forEach((b,idx)=>{
b.disabled=true;
if(idx===q.a)b.classList.add("correct");
if(idx===x&&x!==q.a)b.classList.add("wrong");
});

if(x===q.a)score++;

setTimeout(()=>{i++;load();},600);
}

</script>

</body>
</html>
