<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dental Trainer</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#0f172a;
    color:#e2e8f0;
}

header{
    padding:20px;
    text-align:center;
    background:#1e293b;
    font-size:22px;
    font-weight:bold;
}

.container{
    padding:15px;
    display:grid;
    gap:12px;
}

.card{
    background:#1e293b;
    padding:15px;
    border-radius:12px;
    cursor:pointer;
    transition:0.2s;
}

.card:hover{
    transform:scale(1.02);
    background:#334155;
}

.hidden{
    display:none;
}

button{
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#38bdf8;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

.back{
    background:#ef4444;
    color:white;
}
</style>
</head>

<body>

<header>🦷 Dental Trainer Pro</header>

<div class="container" id="menu">

<div class="card" onclick="openCase('endo')">
Endodontics (علاج الجذور)
</div>

<div class="card" onclick="openCase('peri')">
Periodontology (اللثة)
</div>

<div class="card" onclick="openCase('surg')">
Oral Surgery (الجراحة)
</div>

<div class="card" onclick="openCase('rest')">
Restorative (الترميم)
</div>

</div>

<div class="container hidden" id="caseBox">

<h3 id="title"></h3>

<p id="content"></p>

<button class="back" onclick="back()">رجوع</button>

</div>

<script>

const cases = {
endo:{
title:"Endodontics",
content:"Case 1: Pain on biting + deep caries → Diagnosis: irreversible pulpitis → Treatment: RCT"
},
peri:{
title:"Periodontology",
content:"Case 2: Bleeding gums + pocket depth 6mm → Diagnosis: chronic periodontitis → Scaling + root planing"
},
surg:{
title:"Oral Surgery",
content:"Case 3: impacted 3rd molar → surgical extraction indicated"
},
rest:{
title:"Restorative",
content:"Case 4: fractured tooth → composite restoration or crown"
}
}

function openCase(type){
document.getElementById('menu').classList.add('hidden');
document.getElementById('caseBox').classList.remove('hidden');
document.getElementById('title').innerText = cases[type].title;
document.getElementById('content').innerText = cases[type].content;
}

function back(){
document.getElementById('menu').classList.remove('hidden');
document.getElementById('caseBox').classList.add('hidden');
}

</script>

</body>
</html>
