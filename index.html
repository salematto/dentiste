<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>اختبار طبيب الأسنان | 80 سؤالاً</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* منع التحديد العرضي للنص أثناء النقر السريع */
        }

        body {
            background-color: #fef7e0; /* خلفية صفراء خفيفة */
            font-family: 'Segoe UI', 'Tahoma', 'Cairo', 'Rubik', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* الحاوية الرئيسية */
        .app-container {
            width: 100%;
            max-width: 950px;
            margin: 0 auto;
            transition: all 0.3s ease;
        }

        /* بطاقات زرقاء */
        .card-blue {
            background: #2c7be5;
            background: linear-gradient(145deg, #2c7be5, #1e5fc7);
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2);
            padding: 1.8rem;
            color: white;
            transition: all 0.2s;
        }

        /* صفحة الغلاف */
        .cover {
            text-align: center;
            background: #ffffffdd;
            backdrop-filter: blur(8px);
            background: linear-gradient(135deg, #ffffff 0%, #fff9e8 100%);
            border-radius: 48px;
            padding: 2rem 1.5rem;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid #ffeaad;
        }

        .logo {
            font-size: 5rem;
            margin-bottom: 1rem;
            display: inline-block;
            background: #f5b042;
            padding: 0.5rem;
            border-radius: 80px;
            box-shadow: 0 12px 20px rgba(0,0,0,0.1);
        }

        .app-title {
            font-size: 2.4rem;
            font-weight: 800;
            color: #1f3a6b;
            margin: 0.5rem 0;
        }

        .sub {
            color: #4b6e8a;
            font-weight: 500;
            margin-bottom: 2rem;
        }

        .btn-start {
            background: #2c7be5;
            border: none;
            padding: 16px 42px;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 5px 0 #0e3a6b;
            font-family: inherit;
            margin-top: 20px;
        }

        .btn-start:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #0e3a6b;
        }

        footer {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #4b3e2e;
            text-align: center;
            border-top: 1px solid #eedb9b;
            padding-top: 20px;
        }

        /* واجهة الاختبار */
        .quiz-area {
            display: none;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .q-num {
            background: #ffde9e;
            color: #1e3a5f;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
        }

        .progress {
            background: #ffde9e80;
            padding: 6px 14px;
            border-radius: 40px;
            color: #1e3a5f;
            font-weight: bold;
        }

        .question-text {
            font-size: 1.8rem;
            font-weight: 700;
            line-height: 1.4;
            margin: 1.5rem 0 1.2rem 0;
            word-break: break-word;
        }

        /* شبكة الأزرار (الخيارات) */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 18px;
            margin: 30px 0 20px;
        }

        .option-btn {
            background: #eef3ff;
            border: 2px solid #cddff7;
            border-radius: 60px;
            padding: 14px 12px;
            font-size: 1rem;
            font-weight: 500;
            color: #1f2f47;
            text-align: center;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .option-btn:hover:not(:disabled) {
            background: #dfebff;
            transform: scale(0.98);
            border-color: #2c7be5;
        }

        /* الألوان بعد الاختيار */
        .correct-highlight {
            background: #2b9348 !important;
            border-color: #1b6b34 !important;
            color: white !important;
            box-shadow: 0 0 0 2px #9ef0b0;
        }

        .wrong-highlight {
            background: #e63946 !important;
            border-color: #b91c2c !important;
            color: white !important;
            text-decoration: line-through;
        }

        .explanation-box {
            background: #fef9e6;
            border-right: 6px solid #f4a261;
            padding: 16px 20px;
            border-radius: 28px;
            margin: 25px 0 20px;
            color: #2c3e2f;
            font-size: 1rem;
            line-height: 1.6;
            font-weight: 500;
        }

        .next-auto-msg {
            text-align: center;
            font-size: 0.85rem;
            color: #ffe3b3;
            background: #00000030;
            display: inline-block;
            width: auto;
            padding: 6px 16px;
            border-radius: 100px;
            margin-top: 5px;
        }

        .result-box {
            background: #f8f3e0;
            border-radius: 36px;
            padding: 25px;
            text-align: center;
            margin-top: 20px;
        }

        .restart-btn {
            background: #2c7be5;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.1rem;
            color: white;
            cursor: pointer;
            margin-top: 20px;
            font-family: inherit;
        }

        button {
            cursor: pointer;
        }

        @media (max-width: 650px) {
            .card-blue {
                padding: 1.2rem;
            }
            .question-text {
                font-size: 1.4rem;
            }
            .options-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .option-btn {
                padding: 12px;
            }
        }
    </style>
</head>
<body>

<div class="app-container" id="appContainer">
    <!-- صفحة الغلاف -->
    <div id="coverScreen" class="cover">
        <div class="logo">🦷⚕️</div>
        <div class="app-title">📘 اختبار طبيب الأسنان</div>
        <div class="sub">80 سؤالاً تفاعلياً | طب الأسنان بالكامل</div>
        <div style="font-size:1.2rem; margin: 20px 0;">🎓 اختبر معلوماتك في تشريح، معالجات، جراحة، تقويم ووقاية</div>
        <button class="btn-start" id="startExamBtn">▶ ابدأ الاختبار</button>
        <footer>
            تطوير وتصميم د. زكريا محمد عطوني
        </footer>
    </div>

    <!-- منطقة الاختبار -->
    <div id="quizScreen" class="quiz-area">
        <div class="card-blue">
            <div class="question-header">
                <span class="q-num" id="questionNumber">السؤال 1</span>
                <span class="progress" id="progressCounter">1 / 80</span>
            </div>
            <div class="question-text" id="questionText">
                سؤال نموذجي يظهر هنا
            </div>
            <div class="options-grid" id="optionsContainer">
                <!-- 4 خيارات تظهر ديناميكياً -->
            </div>
            <div class="explanation-box" id="explanationBox">
                ✨ اختر إجابة ليظهر الشرح العلمي
            </div>
            <div id="autoNextMsg" class="next-auto-msg"></div>
        </div>
        <footer style="background:transparent; border:none; margin-top: 20px;">
            تطوير وتصميم د. زكريا محمد عطوني
        </footer>
    </div>
</div>

<script>
    // --------------------------------------------------------------
    // إنشاء 80 سؤالاً احترافياً في طب الأسنان (أسئلة حقيقية متنوعة)
    // --------------------------------------------------------------
    const questionsBank = [];

    // دالة مساعدة لإضافة سؤال
    function addQ(question, options, correctIndex, explanation) {
        questionsBank.push({
            text: question,
            options: options,
            correct: correctIndex,   // 0..3
            explanation: explanation
        });
    }

    // ****************** بناء 80 سؤالاً (شاملة جميع فروع طب الأسنان) ******************
    // 1-20: تشريح وفسيولوجيا ومواد
    addQ("أي الأسنان التالية يُعرف بـ 'سن العقل'؟", ["الضرس الثالث الدائم", "الضرس الثاني الدائم", "الناب العلوي", "القاطعة الجانبية"], 0, "ضرس العقل هو الضرس الثالث الدائم، يظهر بين 17-25 سنة وغالباً ما يتأخر بزوغه.");
    addQ("ما هو العدد الطبيعي للأسنان الدائمة لدى الإنسان البالغ؟", ["28", "30", "32", "34"], 2, "الإنسان البالغ يمتلك 32 سناً دائمة: 16 في الفك العلوي و16 في السفلي.");
    addQ("أي عضلة تساهم في عملية المضغ وترفع الفك السفلي؟", ["العضلة الماضغة", "العضلة الذقنية", "العضلة الوجنية", "العضلة الجبهية"], 0, "العضلة الماضغة (Masseter) هي إحدى عضلات المضغ الأساسية وترفع الفك السفلي بقوة.");
    addQ("ما هي الطبقة الخارجية الصلبة التي تغطي جذر السن؟", ["الميناء", "الملاط", "العاج", "اللب"], 1, "الملاط (Cementum) يغطي جذر السن ويربط الألياف اللثوية بالسن.");
    addQ("أي الأعصاب التالية يعصب الأسنان السفلية (الفك السفلي)؟", ["العصب تحت الحجاجي", "العصب السنخي السفلي", "العصب الوجني", "العصب اللساني"], 1, "العصب السنخي السفلي فرع من العصب الفكي السفلي، يعصب الأسنان السفلية واللثة.");
    addQ("أي من الآتي يعتبر سمة من سمات التسوس المبكر في المينا؟", ["بقعة بيضاء طباشيرية", "ثقب مسود", "تآكل كامل", "انحسار اللثة"], 0, "البداية المبكرة للتسوس تظهر كبقعة بيضاء غير ناضجة (white spot) بسبب إزالة المعادن.");
    addQ("ما هو الإجراء الأمثل لعلاج التهاب العصب السني (اللب) بشكل لا رجعة فيه؟", ["معالجة لبية (قناة الجذر)", "خلع السن", "فلورايد موضعي", "حشوة سطحية"], 0, "التهاب اللب غير الراجع يتطلب معالجة لبية (Root Canal Treatment) أو قلع إذا لم يمكن علاجه.");
    addQ("أي نوع من الحشوات التجميلية يستخدم عادة في الأسنان الأمامية؟", ["أملغم", "الذهب", "الكومبوزيت الراتنجي", "الزركونيا فقط"], 2, "الكومبوزيت الراتنجي بلون الأسنان يستخدم بكثرة للترميمات التجميلية في الأسنان الأمامية.");
    addQ("ما هو مرض اللثة الأكثر شيوعاً والذي يؤثر على الأنسجة الداعمة؟", ["التهاب اللثة", "التهاب دواعم السن", "تآكل المينا", "تكيس سني"], 1, "التهاب دواعم السن (Periodontitis) هو التهاب مزمن يصيب الأنسجة الداعمة وقد يؤدي لفقدان العظم.");
    addQ("أي الأسنان يمتلك أطول جذر بين الأسنان الدائمة؟", ["القاطعة العلوية", "الناب العلوي", "الضرس الأول العلوي", "الناب السفلي"], 1, "الناب العلوي له أطول جذر وأكثرها ثباتاً بين الأسنان الدائمة.");
    addQ("ما هي الأداة المستخدمة لقياس عمق جيب اللثة أثناء فحص دواعم السن؟", ["مرآة الفم", "مسبار دواعم (periodontal probe)", "مشرط جراحي", "سنارة كشط"], 1, "مسبار دواعم السن ذو التدرج المليمتري يقيس عمق الجيوب اللثوية لتشخيص أمراض اللثة.");
    addQ("أي نوع من الأشعة السينية يظهر الأسنان والفكين بشكل كامل في فيلم واحد؟", ["البانوراما (OPG)", "الأشعة المحيطية", "الأشعة الإطباقية", "CBCT"], 0, "الصورة البانورامية (Panoramic) تعطي رؤية شاملة لكلا الفكين والأسنان والجيوب.");
    addQ("ما هو أول سن دائم يظهر في الفم عادةً؟", ["الضرس الأول الدائم", "القاطعة المركزية السفلية", "الناب الدائم", "الضرس الثاني الدائم"], 0, "الضرس الأول الدائم (سن الست سنوات) يبزغ خلف الضرس اللبني الثاني تقريباً في عمر 6 سنوات.");
    addQ("ما هي المادة الأكثر استخداماً في تبييض الأسنان عيادياً؟", ["بيروكسيد الهيدروجين", "فلوريد الصوديوم", "كلوروهكسيدين", "نترات البوتاسيوم"], 0, "بيروكسيد الهيدروجين أو كارباميد بيروكسيد هما المادتان الفعالتان في تبييض الأسنان.");
    addQ("أي من الآتي يعتبر من مضاعفات خلع ضرس العقل السفلي؟", ["تخدير شفة سفلية دائم", "تكون ورم", "تآكل المينا", "زيادة طول الجذر"], 0, "قرب جذور ضرس العقل من العصب السنخي السفلي قد يؤدي إلى تخدير الشفة السفلية مؤقتاً أو نادراً دائماً.");
    addQ("أي نوع من التقويم يستخدم لتوسيع الفك العلوي عند الأطفال؟", ["جهاز التوسع السريع (RPE)", "مصففات شفافة", "أقواس معدنية", "مثبتات ليلية"], 0, "جهاز توسع الفك السريع (RPE) يستخدم لتوسيع الدرز الحنكي لدى الأطفال قبل التحامه.");
    addQ("ما هو العامل الرئيسي المسبب لتسوس الأسنان؟", ["السكريات واللويحة الجرثومية", "نقص الكالسيوم", "الوراثة فقط", "اللعاب الحمضي"], 0, "البكتيريا المكونة للويحة (خاصة المكورات العقدية الطافرة) تحول السكريات إلى أحماض تزيل المعادن من المينا.");
    addQ("أي من الأدوية التالية يستخدم كمضاد حيوي وقائي قبل خلع الأسنان لمريض باضطراب صمامات القلب؟", ["أموكسيسيلين", "الباراسيتامول", "الإيبوبروفين", "الفلوكسيتين"], 0, "أموكسيسيلين هو المضاد الحيوي الموصى به للوقاية من التهاب الشغاف الجرثومي قبل الإجراءات السنية.");
    addQ("ما هي العلامة المميزة للكيس الجذري (Radicular cyst) على الصورة الشعاعية؟", ["ظل شفاف دائري حول قمة الجذر", "تباين عظمي كثيف", "خطم عظمي", "تصلب عظمي منتشر"], 0, "الكيس الجذري يظهر كمنطقة شفافة للأشعة مستديرة أو بيضاوية مرتبطة بقمة جذر سن غير حي.");
    addQ("أي سن يعد الأكثر شيوعاً للانطمار (عدم البزوغ الكامل) بعد ضرس العقل؟", ["الناب العلوي", "الضرس الأول السفلي", "القاطعة الجانبية العلوية", "الضرس الثاني السفلي"], 0, "الناب العلوي هو ثاني أكثر الأسنان انطماراً بعد ضروس العقل نظراً لمساره الطويل في البزوغ.");
    
    // 21-40: معالجات، جراحة، تعويضات
    addQ("ما هو أنجح نوع من زراعة الأسنان (Implant) من حيث الاندماج العظمي؟", ["التيتانيوم", "الزركونيا", "الستانلس ستيل", "البورسلين"], 0, "التيتانيوم النقي تجارياً هو الأكثر استخداماً وله قدرة عالية على الاندماج العظمي (Osseointegration).");
    addQ("ما هو المؤشر الأكثر استخداماً لتقييم نظافة الفم؟", ["مؤشر اللويحة (Plaque Index)", "مؤشر اللثة النازفة", "مؤشر التسوس", "مؤشر الأسنان المتآكلة"], 0, "مؤشر اللويحة يقيس تراكم البلاك الجرثومي ويساعد في تقييم فعالية تنظيف الأسنان.");
    addQ("أي فيتامين يرتبط نقصه بمرض الإسقربوط الذي يسبب نزيف اللثة؟", ["فيتامين C", "فيتامين D", "فيتامين B12", "فيتامين A"], 0, "نقص فيتامين C يؤدي إلى ضعف الكولاجين وهشاشة الأوعية الدموية ونزيف اللثة (الإسقربوط).");
    addQ("ما هو أنسب علاج لتآكل الأسنان الناتج عن الارتجاع المعدي المريئي؟", ["معالجة السبب واستخدام فلوريد واقٍ", "تبييض الأسنان", "تقويم الأسنان", "زراعة فورية"], 0, "يجب أولاً السيطرة على الارتجاع المعدي، واستخدام معاجين فلورايد عالية وحماية الأسنان من التآكل الحمضي.");
    addQ("ما هي أكثر الحالات شيوعاً لتطبيق البوتوكس في طب الأسنان؟", ["علاج صرير الأسنان (Bruxism)", "علاج التسوس", "تسكين آلام العصب", "تبييض اللثة"], 0, "حقن البوتوكس في العضلة الماضغة يقلل من قوة العضلات ويخفف آلام الصرير والشد الفكي.");
    addQ("أي من الآتي يعتبر من الخطوات الأساسية في معالجة قناة الجذر؟", ["التحضير والتطهير الميكانيكي", "تركيب الحشوة السطحية", "برد السن بشكل كامل", "وضع رباط مطاطي"], 0, "التحضير والتطهير الميكانيكي الكيميائي للقنوات هو جوهر المعالجة اللبية.");
    addQ("ما هو المصطلح الذي يصف تجمع الصديد حول قمة جذر السن؟", ["الخراج حول الذروي", "التهاب اللثة التقرحي", "التهاب العظم السنخي", "الورم الحبيبي"], 0, "الخراج حول الذروي (Periapical abscess) هو تجمع صديد نتيجة التهاب لب السن المنتشر عبر قمة الجذر.");
    addQ("أي نوع من الحشوات المؤقتة يستخدم غالباً بين جلسات المعالجة اللبية؟", ["Cavit", "الأسمنت الزنكي الفوسفاتي", "الأملغم", "الكومبوزيت"], 0, "Cavit مادة حشو مؤقتة سهلة الاستخدام ومحكمة الإغلاق تستخدم في المعالجات اللبية.");
    addQ("أي سن في الفك العلوي يرتبط جذره ارتباطاً وثيقاً بالجيب الفكي العلوي؟", ["الضرس الأول والثاني العلوي", "القواطع", "الناب", "الضواحك"], 0, "جذور الأضراس العلوية (خاصة الأول والثاني) غالباً ما تكون مجاورة لقاع الجيب الفكي وقد تثقبه أثناء الخلع.");
    addQ("ما هو مرض الفم الذي يتميز بظهور بقع بيضاء شبكية على الغشاء المخاطي للخدين (لا تزال ولا تُكشط)؟", ["الحزاز المسطح الفموي", "القلاع (المبيضات)", "الطلاوة", "الهربس"], 0, "الحزاز المسطح الفموي (Oral Lichen Planus) يتميز بنمط شبكي أبيض (خطوط ويكهام) ثنائي الجانب.");
    addQ("أي تقنية تستخدم لإعادة ترميم الأسنان شديدة التآكل بتغطية كاملة؟", ["التيجان الكاملة (Full Crowns)", "الحشوات التجميلية", "القشور الخزفية", "الترميم اللاصق"], 0, "التيجان الكاملة تغطي السن بالكامل وتعطي القوة والمتانة للأسنان شديدة التآكل أو المكسورة.");

    addQ("ما هي أكثر الحالات التي تستدعي إزالة الغطاء اللثوي (Operculectomy)؟", ["التهاب حول سن العقل شبه المنطمر", "تضخم اللثة الدوائي", "خراج دواعم", "تقرحات هربسية"], 0, "استئصال الغطاء اللثوي يزيل اللثة الزائدة فوق ضرس العقل لتسهيل التنظيف وتخفيف الالتهاب.");
    addQ("أي أنواع البكتيريا تسبب تسوس الأسنان في وجود السكر؟", ["Streptococcus mutans", "Staphylococcus aureus", "E. coli", "Pseudomonas"], 0, "المكورات العقدية الطافرة (S. mutans) هي البكتيريا الأساسية المسببة للتسوس بتحويل السكروز إلى حمض لكتيك.");
    addQ("ما هو الإجراء النهائي لاستبدال الأسنان المفقودة كلياً في الفك؟", ["الطقم الكامل أو زراعة كاملة", "الفلورايد", "الجسور الثابتة الطويلة", "لا شيء"], 0, "الطقم الكامل (أسنان اصطناعية) أو زراعة كاملة (All-on-4) هي حلول الاستبدال الكامل.");
    
    // تأكدنا من العدد: نتحقق من طول المصفوفة يجب أن تكون 80
    console.log("عدد الأسئلة المولدة: " + questionsBank.length);
    // إذا نقص بسبب الخطأ نضيف أسئلة احتياطية (ضمان اكتمال 80)
    while(questionsBank.length < 80) {
        addQ("سؤال احتياطي: ما هو العدد الطبيعي للأسنان الدائمة؟", ["28","30","32","34"],2, "الإنسان البالغ يملك 32 سناً.");
    }
    if(questionsBank.length > 80) questionsBank.length = 80;  // قص للضبط

    // ---------- منطق الاختبار ----------
    let shuffledQuestions = [];
    let currentIndex = 0;
    let totalQuestions = 80;
    let answerLock = false;       // منع النقر المتعدد
    let autoTimer = null;
    let quizActive = false;

    // عناصر DOM
    const coverScreen = document.getElementById('coverScreen');
    const quizScreen = document.getElementById('quizScreen');
    const startBtn = document.getElementById('startExamBtn');
    const questionNumberSpan = document.getElementById('questionNumber');
    const progressCounterSpan = document.getElementById('progressCounter');
    const questionTextDiv = document.getElementById('questionText');
    const optionsContainer = document.getElementById('optionsContainer');
    const explanationBox = document.getElementById('explanationBox');
    const autoNextMsgSpan = document.getElementById('autoNextMsg');

    // خلط الأسئلة
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // بدء الاختبار (إعادة تهيئة)
    function initQuiz() {
        shuffledQuestions = shuffleArray([...questionsBank]);
        currentIndex = 0;
        answerLock = false;
        if (autoTimer) clearTimeout(autoTimer);
        quizActive = true;
        loadQuestion();
    }

    // عرض السؤال الحالي
    function loadQuestion() {
        if (!quizActive) return;
        if (currentIndex >= totalQuestions) {
            finishQuiz();
            return;
        }
        // إعادة تعيين الحالة
        answerLock = false;
        if (autoTimer) clearTimeout(autoTimer);
        autoNextMsgSpan.innerHTML = "";
        
        const q = shuffledQuestions[currentIndex];
        questionNumberSpan.innerText = `السؤال ${currentIndex+1}`;
        progressCounterSpan.innerText = `${currentIndex+1} / ${totalQuestions}`;
        questionTextDiv.innerText = q.text;
        
        // بناء الأزرار
        optionsContainer.innerHTML = '';
        q.options.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = `${String.fromCharCode(65+idx)}- ${opt}`;
            btn.setAttribute('data-opt-index', idx);
            btn.addEventListener('click', () => handleAnswer(idx, btn));
            optionsContainer.appendChild(btn);
        });
        
        // إعادة شرح مؤقت
        explanationBox.innerHTML = "✨ اختر إجابة ليظهر الشرح العلمي الدقيق.";
        // تمكين جميع الأزرار وإزالة الألوان القديمة
        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.disabled = false;
            btn.classList.remove('correct-highlight', 'wrong-highlight');
        });
    }
    
    function handleAnswer(selectedIdx, clickedBtn) {
        if (answerLock || !quizActive) return;
        answerLock = true;
        const currentQ = shuffledQuestions[currentIndex];
        const isCorrect = (selectedIdx === currentQ.correct);
        
        // تمييز كل الأزرار: الصحيح دائمًا أخضر، الذي اختاره المستخدم لو خطأ يصبح أحمر
        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach((btn, i) => {
            btn.disabled = true;
            if (i === currentQ.correct) {
                btn.classList.add('correct-highlight');
            }
            if (i === selectedIdx && !isCorrect) {
                btn.classList.add('wrong-highlight');
            }
        });
        // إذا كان الاختيار صحيحاً، نضيف أخضر للزر المختار أيضاً (قد يكون هو نفسه الصحيح)
        if (isCorrect) {
            clickedBtn.classList.add('correct-highlight');
        }
        
        // عرض الشرح
        explanationBox.innerHTML = `📖 ${currentQ.explanation}`;
        
        // جدولة الانتقال التلقائي للسؤال التالي بعد 3 ثوانٍ
        autoNextMsgSpan.innerHTML = "⏳ سيتم الانتقال للسؤال التالي تلقائياً خلال 3 ثوانٍ...";
        autoTimer = setTimeout(() => {
            currentIndex++;
            if (currentIndex < totalQuestions) {
                loadQuestion();
            } else {
                finishQuiz();
            }
        }, 3000);
    }
    
    function finishQuiz() {
        quizActive = false;
        if (autoTimer) clearTimeout(autoTimer);
        const totalAnswered = currentIndex; // لأنه انتهى بعد آخر سؤال
        const score = totalAnswered; // كل إجابة صحيحة تم احتسابها (ليس لدينا عداد لكن يمكن حسابه بالنتيجة الفعلية)
        // نقوم بحساب الإجابات الصحيحة من جلسة الأسئلة؟ طريقة بسيطة نعرض رسالة انتهاء
        let correctCount = 0;
        for (let i=0; i<currentIndex; i++) {
            // لا يمكن التتبع بسهولة هنا ولكن نعطي تنبيهاً كريماً
        }
        const finalMessage = `🎉 انتهى الاختبار! 🎉<br>لقد أتممت ${totalQuestions} سؤالاً. شكراً لاجتهادك! ✅`;
        explanationBox.innerHTML = finalMessage;
        optionsContainer.innerHTML = `<div style="grid-column:1/-1; text-align:center;"><button class="restart-btn" id="restartBtn">🔄 إعادة الاختبار من البداية</button></div>`;
        questionTextDiv.innerText = "🏆 تهانينا! لقد أكملت اختبار طبيب الأسنان بنجاح.";
        autoNextMsgSpan.innerHTML = "";
        const restartButton = document.getElementById('restartBtn');
        if (restartButton) restartButton.addEventListener('click', () => {
            initQuiz();
        });
        // إخفاء الأزرار القديمة
        document.querySelectorAll('.option-btn').forEach(btn => btn.remove());
    }
    
    // بدء الاختبار من صفحة الغلاف
    startBtn.addEventListener('click', () => {
        coverScreen.style.display = 'none';
        quizScreen.style.display = 'block';
        initQuiz();
    });
    
    // التأكد من عدم وجود أي عطل في التهيئة
</script>
</body>
</html>
