<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinical Dental Exam</title>

<style>
body{margin:0;font-family:Arial;background:#eef2f7;color:#0f172a;}
header{background:#0f172a;color:white;padding:16px;text-align:center;font-size:18px;}
.container{max-width:850px;margin:auto;padding:20px;}

.card{
background:white;
padding:20px;
border-radius:14px;
box-shadow:0 6px 20px rgba(0,0,0,0.05);
line-height:1.7;
}

.btn{
display:block;width:100%;margin:8px 0;padding:12px;
border:none;border-radius:10px;background:#e2e8f0;cursor:pointer;
}

.correct{background:#22c55e;color:white;}
.wrong{background:#ef4444;color:white;}

.meta{
display:flex;justify-content:space-between;
font-size:13px;color:#64748b;margin-bottom:10px;
}

.explain{
margin-top:10px;
padding:10px;
background:#f8fafc;
border-right:4px solid #06b6d4;
}

.start,.restart{
padding:12px;border:none;border-radius:10px;
background:#2563eb;color:white;cursor:pointer;
}
</style>
</head>

<body>

<header>🦷 امتحان سريري لطب الأسنان</header>

<div class="container">

<div id="start">
<button class="start" onclick="startExam()">ابدأ الامتحان</button>
</div>

<div id="exam" style="display:none;">
<div class="meta">
<span id="qnum"></span>
<span id="score"></span>
</div>

<div id="question" class="card"></div>
<div id="answers"></div>
<div id="explain" class="explain" style="display:none;"></div>
</div>

<div id="result" style="display:none;"></div>

</div>

<script>

const baseCases = [

{
case:`مريض عمره 35 سنة يشكو من ألم ليلي نابض في الرحى السفلية،
الألم عفوي ويزداد عند الاستلقاء، ولا يزول بالمسكنات.
الفحص يظهر تسوس عميق.`,
q:"ما التشخيص الأرجح؟",
o:["التهاب لب غير عكوس","حساسية","التهاب لثة","تآكل"],
a:0,
e:"الألم الليلي العفوي يدل على التهاب لب غير عكوس."
},

{
case:`مريض يشكو من ألم حاد عند شرب الماء البارد يزول مباشرة،
لا يوجد ألم عفوي.`,
q:"ما الحالة؟",
o:["حساسية عاجية","التهاب لب","خراج","كسر"],
a:0,
e:"ألم سريع الزوال يدل على لب حي."
},

{
case:`مريض لديه تورم مع ناسور يفرغ قيحًا.`,
q:"التشخيص؟",
o:["خراج مزمن","خراج حاد","التهاب لثة","حساسية"],
a:0,
e:"وجود ناسور = خراج مزمن."
},

{
case:`ألم عند العض فقط بدون ألم حراري.`,
q:"ما السبب المحتمل؟",
o:["كسر شعري","تسوس","حساسية","لثة"],
a:0,
e:"cracked tooth syndrome."
},

{
case:`نزف لثة مع جيوب عميقة.`,
q:"التشخيص؟",
o:["التهاب دواعم سن","تسوس","كسر","تصبغ"],
a:0,
e:"periodontitis."
},

{
case:`سن داكن بعد ضربة قبل أشهر.`,
q:"التشخيص؟",
o:["تموت لبي","تسوس","حساسية","تآكل"],
a:0,
e:"تموت اللب بعد الرض يؤدي لتغير اللون."
}

];

let bank=[];

for(let i=0;i<120;i++){
let b = baseCases[i % baseCases.length];

bank.push({
case: b.case + " (حالة رقم "+(i+1)+")",
q: b.q,
o: b.o,
a: b.a,
e: b.e
});
}

let i=0,score=0;

function startExam(){
i=0;score=0;
document.getElementById("start").style.display="none";
document.getElementById("exam").style.display="block";
document.getElementById("result").style.display="none";
load();
}

function load(){
if(i>=bank.length){end();return;}

let q=bank[i];

document.getElementById("qnum").innerText="الحالة "+(i+1)+" / 120";
document.getElementById("score").innerText="النقاط: "+score;

document.getElementById("question").innerText=q.case+"\n\n"+q.q;

let html="";
q.o.forEach((opt,idx)=>{
html+=`<button class="btn" onclick="check(${idx})">${opt}</button>`;
});

document.getElementById("answers").innerHTML=html;
document.getElementById("explain").style.display="none";
}

function check(x){
let q=bank[i];
let buttons=document.querySelectorAll(".btn");

buttons.forEach((b,idx)=>{
if(idx===q.a) b.classList.add("correct");
if(idx===x && x!==q.a) b.classList.add("wrong");
b.disabled=true;
});

document.getElementById("explain").innerText=q.e;
document.getElementById("explain").style.display="block";

if(x===q.a) score++;

setTimeout(()=>{i++;load();},2000);
}

function end(){
document.getElementById("exam").style.display="none";
document.getElementById("result").style.display="block";

document.getElementById("result").innerHTML=
"انتهى الامتحان السريري<br><br>"+
"النتيجة: "+score+" / 120"+
"<br><button class='restart' onclick='startExam()'>إعادة</button>";
}

</script>

</body>
</html>
