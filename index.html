<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dental Clinical Exam Pro</title>

<style>
body{
margin:0;
font-family:system-ui, Arial;
background:linear-gradient(135deg,#eef2ff,#f8fafc);
color:#0f172a;
}

header{
background:linear-gradient(90deg,#0f172a,#1e3a8a);
color:white;
padding:18px;
text-align:center;
font-size:20px;
font-weight:bold;
border-bottom:3px solid #06b6d4;
}

.logo{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

.logo span{font-size:24px;}

.container{
max-width:850px;
margin:auto;
padding:22px;
}

.card{
background: linear-gradient(145deg,#ffffff,#f8fafc);
padding:24px;
border-radius:20px;
box-shadow:
0 10px 25px rgba(15,23,42,0.10),
0 2px 6px rgba(15,23,42,0.05);
line-height:1.7;
border:1px solid #e2e8f0;
transition:0.25s ease;
}

.card:hover{
transform:translateY(-3px);
box-shadow:
0 15px 35px rgba(15,23,42,0.15);
}

.btn{
display:block;
width:100%;
margin:10px 0;
padding:14px;
border:none;
border-radius:12px;
background:#e2e8f0;
cursor:pointer;
transition:0.2s;
font-size:15px;
}

.btn:hover{
background:#cbd5e1;
transform:scale(1.01);
}

.explain{
margin-top:12px;
padding:12px;
background:#f1f5f9;
border-right:4px solid #06b6d4;
border-radius:10px;
}

.meta{
display:flex;
justify-content:space-between;
font-size:13px;
color:#64748b;
margin-bottom:10px;
}

.start,.restart{
padding:12px 16px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#2563eb,#1e3a8a);
color:white;
cursor:pointer;
font-weight:bold;
}

footer{
text-align:center;
padding:18px;
font-size:12px;
color:#64748b;
margin-top:30px;
}
</style>
</head>

<body>

<header>
<div class="logo">
<span>🦷</span>
<div>
Dental Clinical Exam Pro<br>
<small style="opacity:0.8;">Clinical Reasoning Training System</small>
</div>
</div>
</header>

<div class="container">

<div id="start">
<button class="start" onclick="startExam()">ابدأ الامتحان</button>
</div>

<div id="exam" style="display:none;">

<div class="meta">
<span id="qnum"></span>
<span id="score"></span>
</div>

<div id="question" class="card"></div>
<div id="answers"></div>
<div id="explain" class="explain" style="display:none;"></div>

</div>

<div id="result" style="display:none;"></div>

</div>

<footer>
تصميم وتطوير: د. زكريا محمد عطوني
</footer>

<script>

const baseCases = [
{
case:`مريض 35 سنة يعاني ألم ليلي نابض يزداد بالاستلقاء مع تسوس عميق.`,
q:"التشخيص الأرجح؟",
o:["التهاب لب غير عكوس","حساسية عاجية","التهاب لثة","تآكل"],
a:0,
e:"الألم الليلي العفوي يدل على التهاب لب غير عكوس."
},
{
case:`ألم بارد يزول خلال ثوانٍ دون ألم عفوي.`,
q:"التشخيص؟",
o:["حساسية عاجية","التهاب لب","خراج","كسر"],
a:0,
e:"ألم سريع الزوال يدل على لب حي مع تعرض عاجي."
},
{
case:`تورم مع ناسور يفرغ قيحًا.`,
q:"التشخيص؟",
o:["خراج مزمن","خراج حاد","التهاب لثة","حساسية"],
a:0,
e:"وجود ناسور = خراج مزمن."
},
{
case:`ألم عند العض فقط بدون محفزات حرارية.`,
q:"السبب؟",
o:["كسر شعري","تسوس","حساسية","لثة"],
a:0,
e:"cracked tooth syndrome."
},
{
case:`نزف لثة مع جيوب عميقة.`,
q:"التشخيص؟",
o:["التهاب دواعم سن","تسوس","كسر","تصبغ"],
a:0,
e:"periodontitis."
},
{
case:`سن داكن بعد رض سابق.`,
q:"التشخيص؟",
o:["تموت لبي","تسوس","حساسية","تآكل"],
a:0,
e:"تموت اللب بعد الصدمة."
}
];

let bank=[];
for(let i=0;i<120;i++){
let b = baseCases[i % baseCases.length];

bank.push({
case: b.case + " (حالة " + (i+1) + ")",
q: b.q,
o: b.o,
a: b.a,
e: b.e
});
}

let i=0,score=0;

function startExam(){
i=0;score=0;
document.getElementById("start").style.display="none";
document.getElementById("exam").style.display="block";
document.getElementById("result").style.display="none";
load();
}

function load(){
if(i>=bank.length){end();return;}

let q = bank[i];

document.getElementById("qnum").innerText="الحالة "+(i+1)+" / 120";
document.getElementById("score").innerText="النقاط: "+score;

document.getElementById("question").innerText=q.case+"\n\n"+q.q;

let html="";
q.o.forEach((opt,idx)=>{
html+=`<button class="btn" onclick="check(${idx})">${opt}</button>`;
});

document.getElementById("answers").innerHTML=html;
document.getElementById("explain").style.display="none";
}

function check(x){
let q = bank[i];
let buttons=document.querySelectorAll(".btn");

buttons.forEach((b,idx)=>{
b.disabled = true;

if(idx === q.a){
b.style.background = "#22c55e";
b.style.color = "white";
}

if(idx === x && x !== q.a){
b.style.background = "#ef4444";
b.style.color = "white";
}
});

document.getElementById("explain").innerText = q.e;
document.getElementById("explain").style.display = "block";

if(x === q.a) score++;

setTimeout(()=>{i++;load();},1800);
}

function end(){
document.getElementById("exam").style.display="none";
document.getElementById("result").style.display="block";

document.getElementById("result").innerHTML=
"<div class='card'>" +
"<h2>انتهى الامتحان</h2>" +
"<p>النتيجة: " + score + " / 120</p>" +
"<button class='restart' onclick='location.reload()'>إعادة الامتحان</button>" +
"</div>";
}

</script>

</body>
</html>
