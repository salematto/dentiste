<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>امتحان طب الأسنان</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0b1220,#111827);
color:#e5e7eb;
text-align:center;
}

header{
padding:20px;
font-size:20px;
font-weight:bold;
background:rgba(0,0,0,0.3);
backdrop-filter: blur(6px);
border-bottom:1px solid #1f2937;
}

.container{
max-width:720px;
margin:auto;
padding:20px;
}

.card{
background:#1f2937;
padding:22px;
border-radius:16px;
font-size:18px;
min-height:100px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.meta{
margin:12px 0;
font-size:13px;
opacity:0.8;
display:flex;
justify-content:space-between;
}

.btn{
display:block;
margin:10px auto;
padding:14px;
width:100%;
border:none;
border-radius:12px;
cursor:pointer;
font-size:15px;
background:#374151;
color:white;
transition:0.2s;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.btn:hover{
transform:scale(1.02);
background:#4b5563;
}

.correct{
background:#16a34a !important;
box-shadow:0 0 10px #16a34a66;
}

.wrong{
background:#dc2626 !important;
box-shadow:0 0 10px #dc262666;
}

.start{
padding:14px;
border:none;
border-radius:12px;
background:#38bdf8;
font-weight:bold;
cursor:pointer;
font-size:16px;
}

.result{
font-size:18px;
padding:20px;
line-height:2;
}

.badge{
display:inline-block;
padding:6px 12px;
border-radius:999px;
background:#111827;
margin-top:10px;
font-size:14px;
}

footer{
margin-top:30px;
padding:15px;
font-size:12px;
opacity:0.6;
}
</style>
</head>

<body>

<header>🦷 Dental Clinical Exam</header>

<div class="container">

<div id="start">
<button class="start" onclick="startExam()">ابدأ الاختبار</button>
</div>

<div id="exam" style="display:none;">

<div class="meta">
<div>السؤال: <span id="qnum"></span></div>
<div>النتيجة: <span id="score"></span></div>
</div>

<div id="question" class="card"></div>

<div id="answers"></div>

</div>

<div id="result" class="result" style="display:none;"></div>

</div>

<footer>
تصميم وتطوير: د. زكريا عطوني - سوريا
</footer>

<script>

const bank = [
{q:"ألم شديد مع تسوس عميق",o:["التهاب لب غير عكوس","تسوس سطحي","حساسية","تآكل"],a:0},
{q:"نزف لثة",o:["التهاب دواعم سن","تسوس","كسر","تصبغ"],a:0},
{q:"ضرس عقل مطمور",o:["انطمار","حساسية","تسوس","تآكل"],a:0},
{q:"كسر سن أمامي",o:["كسر تاجي","تسوس","تصبغ","تآكل"],a:0},
{q:"ألم ليلي شديد",o:["التهاب لب","تسوس","حساسية","تصبغ"],a:0},
{q:"تورم مع قيح",o:["خراج","تسوس","تآكل","حساسية"],a:0},
{q:"رائحة فم مزمنة",o:["التهاب لثة","تسوس","كسر","تآكل"],a:0},
{q:"حركة سن",o:["مرض لثوي","تسوس","حساسية","تصبغ"],a:0},
{q:"ألم عند المضغ",o:["التهاب لب","تسوس","تآكل","حساسية"],a:0},
{q:"ألم بارد",o:["حساسية","التهاب لب","تسوس","كسر"],a:0}
];

let qlist=[];
let i=0;
let score=0;

function startExam(){
qlist=bank.sort(()=>Math.random()-0.5);
i=0;score=0;

document.getElementById("start").style.display="none";
document.getElementById("exam").style.display="block";
document.getElementById("result").style.display="none";

load();
}

function load(){

if(i>=qlist.length){
end();
return;
}

let q=qlist[i];

document.getElementById("qnum").innerText=(i+1)+"/"+qlist.length;
document.getElementById("score").innerText=score;

document.getElementById("question").innerText=q.q;

let html="";
q.o.forEach((opt,idx)=>{
html+=`<button class="btn" onclick="check(${idx})">${opt}</button>`;
});

document.getElementById("answers").innerHTML=html;
}

function check(x){

let q=qlist[i];
let buttons=document.querySelectorAll(".btn");

buttons.forEach((b,idx)=>{
if(idx===q.a) b.classList.add("correct");
if(idx===x && x!==q.a) b.classList.add("wrong");
b.disabled=true;
});

if(x===q.a) score++;

setTimeout(()=>{
i++;
load();
},900);
}

function end(){

document.getElementById("exam").style.display="none";
document.getElementById("result").style.display="block";

let level =
score/qlist.length>0.8?"ممتاز 🟢":
score/qlist.length>0.5?"جيد 🟠":
"يحتاج تحسين 🔴";

document.getElementById("result").innerHTML=
"انتهى الاختبار 🧠<br><br>"+
"النتيجة: "+score+" / "+qlist.length+
"<br><span class='badge'>"+level+"</span>";
}

</script>

</body>
</html>
