<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dental Exam Pro</title>

<style>
body{margin:0;font-family:Arial;background:#f1f5f9;color:#0f172a;}
header{background:#0f172a;color:white;padding:18px;text-align:center;font-size:20px;}
.container{max-width:820px;margin:auto;padding:20px;}

.card{background:white;padding:24px;border-radius:16px;box-shadow:0 8px 25px rgba(0,0,0,0.05);}

.btn{display:block;width:100%;margin:10px 0;padding:14px;border:none;border-radius:12px;background:#e2e8f0;cursor:pointer;}
.btn:hover{background:#cbd5e1;}

.correct{background:#22c55e !important;color:white;}
.wrong{background:#ef4444 !important;color:white;}

.explain{
margin-top:15px;
padding:12px;
background:#f8fafc;
border-right:4px solid #06b6d4;
}

.start{padding:14px;border:none;border-radius:12px;background:#2563eb;color:white;cursor:pointer;}
.restart{padding:12px;margin-top:15px;border:none;background:#0f172a;color:white;border-radius:10px;}

.meta{display:flex;justify-content:space-between;font-size:13px;color:#64748b;margin-bottom:10px;}
</style>
</head>

<body>

<header>🦷 بنك أسئلة طب الأسنان (120 حالة)</header>

<div class="container">

<div id="start">
<button class="start" onclick="startExam()">ابدأ</button>
</div>

<div id="exam" style="display:none;">
<div class="meta">
<span id="qnum"></span>
<span id="score"></span>
</div>

<div id="question" class="card"></div>
<div id="answers"></div>
<div id="explain" class="explain" style="display:none;"></div>
</div>

<div id="result" style="display:none;"></div>

</div>

<script>

// بنك منظم (أنماط حقيقية)
const patterns = [
["ألم ليلي نابض","التهاب لب غير عكوس","ضغط داخل اللب"],
["ألم بارد سريع","حساسية عاجية","تعرض عاجي"],
["تورم مع ناسور","خراج مزمن","تصريف قيحي"],
["ألم عند العض","كسر شعري","cracked tooth"],
["نزف لثة","التهاب لثة","plaque"],
["جيوب عميقة","التهاب دواعم سن","bone loss"],
["ضرس عقل مطمور","انطمار","impaction"],
["تورم بدون ألم","كيس جذري","chronic lesion"],
["طفل تسوس متعدد","ECC","سكري"],
["ألم بعد حشوة","ارتفاع إطباق","bite high"]
];

// توليد 120 حالة
let bank=[];
for(let i=1;i<=120;i++){
let p=patterns[Math.floor(Math.random()*patterns.length)];
bank.push({
id:i,
q:p[0],
o:[p[1],"تسوس","تآكل","تصبغ"],
a:0,
e:p[2]
});
}

let i=0,score=0;

function startExam(){
i=0;score=0;
document.getElementById("start").style.display="none";
document.getElementById("exam").style.display="block";
document.getElementById("result").style.display="none";
load();
}

function load(){
if(i>=bank.length){end();return;}

let q=bank[i];

document.getElementById("qnum").innerText="السؤال "+(i+1)+" / 120";
document.getElementById("score").innerText="النقاط: "+score;

document.getElementById("question").innerText=q.q;

let html="";
q.o.forEach((opt,idx)=>{
html+=`<button class="btn" onclick="check(${idx})">${opt}</button>`;
});
document.getElementById("answers").innerHTML=html;
document.getElementById("explain").style.display="none";
}

function check(x){
let q=bank[i];
let buttons=document.querySelectorAll(".btn");

buttons.forEach((b,idx)=>{
if(idx===q.a) b.classList.add("correct");
if(idx===x && x!==q.a) b.classList.add("wrong");
b.disabled=true;
});

document.getElementById("explain").innerText=q.e;
document.getElementById("explain").style.display="block";

if(x===q.a) score++;

setTimeout(()=>{i++;load();},1500);
}

function end(){
document.getElementById("exam").style.display="none";
document.getElementById("result").style.display="block";

document.getElementById("result").innerHTML=
"انتهى الاختبار<br><br>"+
"النتيجة: "+score+" / 120"+
"<br><button class='restart' onclick='startExam()'>إعادة</button>";
}

</script>

</body>
</html>
