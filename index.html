<div class="meta">
<span id="progressText"></span>
<span id="score"></span>
</div>

<div class="progress-bar"><div id="progressBar" class="progress"></div></div>

<div id="question" class="card"></div>
<div id="answers"></div>
<div id="explanation"></div>

<button class="btn" onclick="restartExam()">إعادة</button>

</div>

<div id="result"></div>

</div>

<footer>OSCE Training System</footer>

<script>

/* 🟢 بنك حالات فعلي (ليس فارغ) */
const bank = [
{
q:"مريض 40 سنة يعاني من ألم ليلي نابض يزداد مع الحرارة ويستمر بعد زوال المؤثر.",
o:[
"التهاب لب غير عكوس (تموت لبي)",
"حساسية عاجية",
"التهاب لثة",
"كسر سن"
],
a:0,
e:"ألم مستمر بعد الحرارة = التهاب لب غير عكوس"
},
{
q:"ألم حاد مع البارد يختفي فورًا بدون ألم عفوي.",
o:[
"حساسية عاجية",
"تموت لبي",
"خراج",
"التهاب دواعم"
],
a:0,
e:"ألم قصير مع البارد = حساسية عاجية"
},
{
q:"سن غير حي مع آفة ذروية شعاعياً.",
o:[
"تموت لبي مع التهاب حول الذروة",
"حساسية",
"تسوس",
"التهاب لثة"
],
a:0,
e:"غياب الحيوية + آفة ذروية"
},
{
q:"ألم عند العض يزداد عند تحرير الضغط.",
o:[
"كسر شعري في السن",
"التهاب لثة",
"حساسية",
"تآكل"
],
a:0,
e:"release pain = cracked tooth"
},
{
q:"نزف لثوي دون فقدان عظم.",
o:[
"التهاب لثة",
"التهاب دواعم",
"خراج",
"كيس"
],
a:0,
e:"بدون فقدان عظم = gingivitis"
}
];

let index=0,score=0,currentOptions=[];

function shuffle(q){
let arr=q.o.map((t,i)=>({t,correct:i===q.a}));
for(let i=arr.length-1;i>0;i--){
let j=Math.random()*(i+1)|0;
[arr[i],arr[j]]=[arr[j],arr[i]];
}
return arr;
}

function startExam(){
index=0;score=0;
document.getElementById("start").style.display="none";
document.getElementById("exam").style.display="block";
load();
}

function restartExam(){
index=0;score=0;
load();
}

function load(){

if(index>=bank.length){
document.getElementById("exam").style.display="none";
document.getElementById("result").innerHTML=
`<div class="card">النتيجة ${score}/${bank.length}
<br><button class="btn" onclick="location.reload()">إعادة</button></div>`;
return;
}

let q=bank[index];
currentOptions=shuffle(q);

document.getElementById("progressText").innerText=`${index+1}/${bank.length}`;
document.getElementById("score").innerText=score;

document.getElementById("progressBar").style.width=
((index/bank.length)*100)+"%";

document.getElementById("question").innerText=q.q;
document.getElementById("explanation").innerHTML="";

let html="";
currentOptions.forEach((opt,i)=>{
html+=`<button class="btn answer-btn" onclick="check(${i})">${opt.t}</button>`;
});

document.getElementById("answers").innerHTML=html;
}

function check(i){

let buttons=document.querySelectorAll(".answer-btn");
let correctIndex=currentOptions.findIndex(x=>x.correct);

buttons.forEach(b=>b.disabled=true);

buttons[correctIndex].classList.add("correct");
if(i!==correctIndex)buttons[i].classList.add("wrong");

document.getElementById("explanation").innerHTML=
`<div class="explanation">${bank[index].e}</div>`;

if(i===correctIndex)score++;

setTimeout(()=>{index++;load();},900);
}

</script>

</body>
</html>
