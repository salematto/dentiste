<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مدرب طب الأسنان</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:#e5e7eb;
text-align:center;
}

header{
background:#111827;
padding:18px;
font-size:20px;
font-weight:bold;
}

.container{
padding:20px;
max-width:650px;
margin:auto;
}

.case{
background:#1f2937;
padding:20px;
border-radius:12px;
margin-bottom:15px;
font-size:18px;
min-height:80px;
}

.btn{
display:block;
margin:10px auto;
padding:12px;
width:100%;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
background:#374151;
color:white;
}

.correct{background:#16a34a !important;}
.wrong{background:#dc2626 !important;}

.info{
margin-top:10px;
opacity:0.7;
font-size:14px;
}

footer{
margin-top:30px;
padding:15px;
font-size:12px;
opacity:0.6;
}
</style>
</head>

<body>

<header>🦷 مدرب الحالات السريرية</header>

<div class="container">

<div id="question" class="case"></div>

<div id="answers"></div>

<div class="info" id="info">اختر الإجابة… الانتقال تلقائي بعد 3 ثواني</div>

</div>

<footer>
تصميم وتطوير: د. زكريا عطوني - سوريا
</footer>

<script>

const data = [

{q:"ألم شديد مع تسوس عميق",o:["التهاب لب غير عكوس","التهاب لثة بسيط","تآكل مينا","حساسية عاجية","صدمة إطباق"],a:0},
{q:"نزف لثة مع جيوب عميقة",o:["التهاب دواعم سن مزمن","تسوس سطحي","كسر تاجي","تآكل","التهاب لثة بسيط"],a:0},
{q:"ضرس عقل مطمور",o:["انطمار ضرس عقل","التهاب جيوب","كسر جذر","تسوس عنقي","خراج"],a:0},
{q:"طفل مع تسوس منتشر",o:["تسوس طفولي منتشر","حساسية عاجية","تآكل","كسر تاج","صدمة إطباق"],a:0},
{q:"كسر سن أمامي",o:["كسر تاجي","التهاب لثة","خراج","تصبغ","تآكل"],a:0},
{q:"ألم عند المضغ + سن داكن",o:["نخر لب","التهاب جيوب","حساسية","تآكل","كسر جذر"],a:0},
{q:"تورم لثوي + قيح",o:["خراج لثوي","تسوس سطحي","تآكل","حساسية","تصبغ"],a:0},
{q:"حركة سن واضحة",o:["مرض لثوي متقدم","تسوس بسيط","تآكل","كسر تاج","حساسية"],a:0},
{q:"ألم مفاجئ ليلي",o:["التهاب لب حاد","تسوس سطحي","التهاب لثة","تصبغ","تآكل"],a:0},
{q:"رائحة فم مزمنة",o:["التهاب لثة مزمن","تسوس بسيط","حساسية","كسر","تآكل"],a:0},
{q:"سن متغير اللون بعد صدمة",o:["نخر لب","حساسية","تآكل","التهاب لثة","تصبغ"],a:0},
{q:"ألم عند البارد",o:["حساسية عاجية","التهاب لب","خراج","كسر جذر","تسوس عميق"],a:0},
{q:"انتفاخ خفيف حول سن",o:["خراج ذروي","تسوس سطحي","تآكل","حساسية","تصبغ"],a:0},
{q:"ألم بعد حشوة قديمة",o:["ارتفاع إطباق","التهاب لثة","تآكل","كسر","تصبغ"],a:0},
{q:"نزف تلقائي من اللثة",o:["التهاب دواعم سن","تسوس","تآكل","حساسية","تصبغ"],a:0}

];

let current=0;
let lock=false;

function loadQ(){

if(current>=data.length){
document.getElementById("question").innerText="انتهى الاختبار 🧠";
document.getElementById("answers").innerHTML="";
document.getElementById("info").innerText="";
return;
}

lock=false;

let q=data[current];

document.getElementById("question").innerText=q.q;

let html="";
q.o.forEach((opt,i)=>{
html+=`<button class="btn" onclick="check(${i})">${opt}</button>`;
});

document.getElementById("answers").innerHTML=html;
document.getElementById("info").innerText="اختر الإجابة… الانتقال خلال 3 ثواني";
}

function check(i){

if(lock) return;
lock=true;

let buttons=document.querySelectorAll(".btn");
let correct=data[current].a;

buttons.forEach((b,idx)=>{
if(idx===correct) b.classList.add("correct");
if(idx===i && i!==correct) b.classList.add("wrong");
b.disabled=true;
});

setTimeout(()=>{
current++;
loadQ();
},3000);
}

loadQ();

</script>

</body>
</html>
