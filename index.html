<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSCE Dental Stable</title>

<style>
body{margin:0;font-family:system-ui;background:#0b1220;color:#fff}
header{
background:#0f172a;
padding:16px;
text-align:center;
border-bottom:3px solid #38bdf8;
font-weight:bold
}
.container{max-width:900px;margin:auto;padding:20px}

.card{
background:#111827;
padding:18px;
border-radius:14px;
margin-top:10px;
line-height:1.7;
}

.btn{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:10px;
background:#1f2937;
color:#fff;
cursor:pointer;
}

.answer-btn{width:100%}

.correct{background:#16a34a !important}
.wrong{background:#dc2626 !important}

.meta{
display:flex;
justify-content:space-between;
color:#93c5fd;
font-size:13px
}

.progress-bar{
height:6px;
background:#1f2937;
border-radius:10px;
margin-top:10px;
overflow:hidden
}

.progress{
height:100%;
background:#38bdf8;
width:0%
}

.explanation{
margin-top:10px;
background:#0f172a;
padding:12px;
border-radius:10px;
border-left:4px solid #facc15
}

footer{
text-align:center;
padding:12px;
color:#64748b;
font-size:13px
}
</style>
</head>

<body>

<header>🦷 OSCE Dental Stable System</header>

<div class="container">

<div id="start">
<button class="btn" onclick="startExam()">ابدأ الامتحان</button>
</div>

<div id="exam" style="display:none">

<div class="meta">
<span id="progressText"></span>
<span id="score"></span>
</div>

<div class="progress-bar">
<div id="progressBar" class="progress"></div>
</div>

<div id="question" class="card"></div>

<div id="answers"></div>

<div id="explanation"></div>

<button class="btn" onclick="restartExam()">إعادة</button>

</div>

<div id="result"></div>

</div>

<footer>Dental OSCE Training System</footer>

<script>

/* 🟢 BANK مصحح سريرياً + مصطلحات دقيقة */
const bank = [
{
q:"مريض 40 سنة، ألم ليلي نابض يزداد مع الحرارة ويستمر بعد زوال المؤثر.",
o:[
"Symptomatic irreversible pulpitis",
"Dentin hypersensitivity",
"Apical periodontitis",
"Myofascial pain"
],
a:0,
e:"Pain + lingering heat response → Symptomatic irreversible pulpitis"
},
{
q:"ألم حاد مع البارد يختفي فوراً بدون ألم عفوي.",
o:[
"Dentin hypersensitivity",
"Pulp necrosis",
"Periapical abscess",
"Root fracture"
],
a:0,
e:"Short sharp cold pain → hypersensitivity"
},
{
q:"سن غير حي (Pulp necrosis) مع آفة ذروية شعاعياً.",
o:[
"Pulp necrosis with apical periodontitis",
"Reversible pulpitis",
"Gingivitis",
"Erosion"
],
a:0,
e:"Non-vital tooth + radiolucency"
},
{
q:"ألم عند العض يزداد عند تحرير الضغط.",
o:[
"Cracked tooth syndrome",
"Gingivitis",
"Early caries",
"Sinusitis"
],
a:0,
e:"Release pain → cracked tooth"
},
{
q:"نزف لثوي دون فقدان عظم.",
o:[
"Plaque-induced gingivitis",
"Periodontitis",
"Periapical infection",
"Cyst"
],
a:0,
e:"Bleeding without attachment loss"
},
{
q:"جيوب 6mm مع فقدان عظم.",
o:[
"Periodontitis",
"Gingivitis",
"Hypersensitivity",
"Caries"
],
a:0,
e:"Attachment loss = periodontitis"
},
{
q:"ألم بعد 48 ساعة من القلع + رائحة كريهة + خلو الخثرة.",
o:[
"Alveolar osteitis (dry socket)",
"Periapical abscess",
"Cyst",
"Cellulitis"
],
a:0,
e:"Classic dry socket presentation"
},
{
q:"طفل 5 سنوات، تسوس منتشر + رضاعة ليلية.",
o:[
"Early childhood caries",
"Fluorosis",
"Erosion",
"Amelogenesis imperfecta"
],
a:0,
e:"ECC pattern"
},
{
q:"تورم لثوي مع قيح من الجيب.",
o:[
"Periodontal abscess",
"Periapical abscess",
"Fibroma",
"Mucocele"
],
a:0,
e:"Pus from periodontal pocket"
},
{
q:"ألم حراري طويل بعد البارد + تسوس عميق.",
o:[
"Symptomatic irreversible pulpitis",
"Reversible pulpitis",
"Dentin hypersensitivity",
"Sinus pain"
],
a:0,
e:"Lingering thermal pain"
}
];

/* 🔒 shuffle ثابت */
function shuffle(q){
let arr=q.o.map((t,i)=>({t,correct:i===q.a}));
for(let i=arr.length-1;i>0;i--){
let j=Math.random()*(i+1)|0;
[arr[i],arr[j]]=[arr[j],arr[i]];
}
return arr;
}

let index=0,score=0,currentOptions=[];

function startExam(){
index=0;score=0;
document.getElementById("start").style.display="none";
document.getElementById("exam").style.display="block";
load();
}

function restartExam(){
index=0;score=0;
load();
}

function load(){

if(index>=bank.length){
document.getElementById("exam").style.display="none";
document.getElementById("result").innerHTML=
`<div class="card">Score ${score}/${bank.length}
<br><button class="btn" onclick="location.reload()">Restart</button></div>`;
return;
}

let q=bank[index];
currentOptions=shuffle(q);

document.getElementById("progressText").innerText=`Case ${index+1}/${bank.length}`;
document.getElementById("score").innerText=score;

document.getElementById("progressBar").style.width=
((index/bank.length)*100)+"%";

document.getElementById("question").innerText=q.q;
document.getElementById("explanation").innerHTML="";

let html="";
currentOptions.forEach((opt,i)=>{
html+=`<button class="btn answer-btn" onclick="check(${i})">${opt.t}</button>`;
});

document.getElementById("answers").innerHTML=html;
}

function check(i){

let buttons=document.querySelectorAll(".answer-btn");

let correctIndex=currentOptions.findIndex(x=>x.correct);

buttons.forEach(b=>b.disabled=true);

buttons[correctIndex].classList.add("correct");
if(i!==correctIndex)buttons[i].classList.add("wrong");

document.getElementById("explanation").innerHTML=
`<div class="explanation">${bank[index].e}</div>`;

if(i===correctIndex)score++;

setTimeout(()=>{index++;load();},900);
}

</script>

</body>
</html>
