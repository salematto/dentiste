<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار طب الأسنان الشامل | د. زكريا عطوني</title>
    <style>
        :root {
            /* هوية لونية طبية عصرية - أزرق غامق ورمادي احترافي */
            --primary-dark: #1a2a3a;
            --accent-blue: #2c3e50;
            --clinical-blue: #34495e;
            --success-green: #27ae60;
            --error-red: #c0392b;
            --text-light: #ecf0f1;
            --bg-gradient: linear-gradient(135deg, #1a2a3a 0%, #2c3e50 100%);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            color: var(--text-light);
        }

        #quiz-container {
            background: rgba(255, 255, 255, 0.98);
            width: 90%;
            max-width: 850px;
            margin: auto;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            color: #333;
            position: relative;
            overflow: hidden;
        }

        #header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid #eee;
        }

        .status-badge {
            background: var(--primary-dark);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        #question-text {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--primary-dark);
            margin: 30px 0;
            line-height: 1.5;
            text-align: center;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
        }

        .option-btn {
            padding: 20px;
            font-size: 1.25rem;
            border: 2px solid #dcdde1;
            border-radius: 8px;
            background: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            color: var(--clinical-blue);
            text-align: right;
        }

        .option-btn:hover:not([disabled]) {
            background: #f8f9fa;
            border-color: var(--primary-dark);
            transform: scale(1.02);
        }

        /* تلوين الإجابات حسب الطلب */
        .correct { 
            background-color: var(--success-green) !important; 
            color: white !important; 
            border-color: #1e8449 !important; 
        }
        
        .wrong { 
            background-color: var(--error-red) !important; 
            color: white !important; 
            border-color: #922b21 !important; 
        }

        #explanation-box {
            margin-top: 25px;
            padding: 20px;
            background: #f1f2f6;
            border-right: 6px solid var(--primary-dark);
            border-radius: 4px;
            display: none;
            font-size: 1.15rem;
            line-height: 1.7;
            color: #2f3640;
        }

        #timer-bar-container {
            width: 100%;
            height: 6px;
            background: #eee;
            position: absolute;
            bottom: 0;
            left: 0;
        }

        #timer-bar {
            height: 100%;
            background: var(--success-green);
            width: 0%;
            transition: width 5s linear;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: rgba(255,255,255,0.7);
            font-size: 1rem;
            letter-spacing: 0.5px;
        }

        .doctor-name {
            color: #fff;
            font-weight: bold;
            border-top: 1px solid rgba(255,255,255,0.2);
            display: inline-block;
            padding-top: 10px;
            margin-top: 10px;
        }

        @media (max-width: 600px) {
            #question-text { font-size: 1.5rem; }
            #quiz-container { padding: 20px; }
            .option-btn { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div id="quiz-container">
        <div id="header-info">
            <span class="status-badge" id="progress">السؤال: 1 / 80</span>
            <span class="status-badge" id="score">النقاط: 0</span>
        </div>

        <div id="question-text">جاري تحميل الأسئلة...</div>
        
        <div class="options-grid">
            <button class="option-btn" onclick="handleSelection(0)"></button>
            <button class="option-btn" onclick="handleSelection(1)"></button>
            <button class="option-btn" onclick="handleSelection(2)"></button>
            <button class="option-btn" onclick="handleSelection(3)"></button>
        </div>

        <div id="explanation-box"></div>

        <div id="timer-bar-container">
            <div id="timer-bar"></div>
        </div>
    </div>

    <footer>
        <div class="doctor-name">تصميم وتطوير الدكتور زكريا محمد عطوني</div>
    </footer>

    <script>
        // مصفوفة الأسئلة (سيتم ملء 80 سؤالاً)
        const quizData = [
            { q: "ما هو المكون المعدني الأساسي في مينا الأسنان؟", options: ["هيدروكسي أباتيت", "فلوريد الكالسيوم", "كربونات الكالسيوم", "الفوسفات العضوي"], correct: 0, explain: "تتكون المينا بنسبة 96% من بلورات الهيدروكسي أباتيت، وهي أصلب مادة في جسم الإنسان." },
            { q: "أي الأضراس التالية يمتلك عادةً 3 جذور؟", options: ["الرحى الأولى السفلية", "الرحى الأولى العلوية", "الضاحك الأول العلوي", "الرحى الثانية السفلية"], correct: 1, explain: "الأرحاء العلوية تمتلك عادةً ثلاثة جذور: دهليزي انسي، دهليزي وحشي، وحنكي." },
            { q: "ما هو تركيز حمض الفوسفوريك المعياري للتخريش؟", options: ["10%", "20%", "37%", "50%"], correct: 2, explain: "يستخدم حمض الفوسفوريك 37% لخلق مسامية كافية في المينا للارتباط الميكانيكي." },
            { q: "أي عصب يغذي الإحساس في الأسنان السفلية؟", options: ["العصب الوجهي", "العصب السنخي السفلي", "العصب اللساني", "العصب تحت الحجاج"], correct: 1, explain: "العصب السنخي السفلي (IAN) هو الفرع المسؤول عن تعصيب كامل الأسنان السفلية." },
            { q: "المادة المستخدمة لحشو قنوات الجذور نهائياً هي:", options: ["الأملغم", "الكوتابيركا", "الكومبوزيت", "الإسمنت الفوسفاتي"], correct: 1, explain: "تعتبر الكوتابيركا المادة الأكثر شيوعاً نظراً لحيويتها وقدرتها على سد القنوات." }
        ];

        // تكملة الـ 80 سؤالاً آلياً
        for(let i = 5; i < 80; i++) {
            quizData.push({
                q: `سؤال طب أسنان رقم ${i+1} (بانتظار المحتوى العلمي)`,
                options: ["إجابة صحيحة", "خيار بديل 1", "خيار بديل 2", "خيار بديل 3"],
                correct: 0,
                explain: `هذا الشرح مخصص للسؤال رقم ${i+1} لتعزيز فهم الطالب للمعلومة.`
            });
        }

        let currentIdx = 0;
        let score = 0;

        function loadQuestion() {
            if (currentIdx >= quizData.length) {
                showFinalResult();
                return;
            }

            const q = quizData[currentIdx];
            document.getElementById("progress").innerText = `السؤال: ${currentIdx + 1} / 80`;
            document.getElementById("question-text").innerText = q.q;
            document.getElementById("explanation-box").style.display = "none";
            document.getElementById("timer-bar").style.width = "0%";
            
            const btns = document.querySelectorAll(".option-btn");
            btns.forEach((btn, i) => {
                btn.innerText = q.options[i];
                btn.className = "option-btn";
                btn.disabled = false;
            });
        }

        function handleSelection(idx) {
            const q = quizData[currentIdx];
            const btns = document.querySelectorAll(".option-btn");
            
            btns.forEach(btn => btn.disabled = true);

            if (idx === q.correct) {
                btns[idx].classList.add("correct");
                score++;
                document.getElementById("score").innerText = `النقاط: ${score}`;
            } else {
                btns[idx].classList.add("wrong");
                btns[q.correct].classList.add("correct");
            }

            const exp = document.getElementById("explanation-box");
            exp.innerHTML = `<strong>التفسير العلمي:</strong> <br> ${q.explain}`;
            exp.style.display = "block";

            // تحريك شريط الوقت لمدة 5 ثوانٍ قبل الانتقال الآلي
            const timerBar = document.getElementById("timer-bar");
            timerBar.style.width = "100%";

            setTimeout(() => {
                currentIdx++;
                loadQuestion();
            }, 5000);
        }

        function showFinalResult() {
            document.getElementById("quiz-container").innerHTML = `
                <div style="text-align:center; padding:40px;">
                    <h1 style="color:var(--primary-dark)">تم إنهاء الاختبار</h1>
                    <p style="font-size:2.5rem; color:var(--success-green); font-weight:bold;">${score} / 80</p>
                    <p style="font-size:1.2rem; color:#666;">شكراً لك دكتور، نتمنى لك التوفيق.</p>
                    <button onclick="location.reload()" style="padding:15px 30px; background:var(--primary-dark); color:white; border:none; border-radius:8px; cursor:pointer; margin-top:20px;">إعادة المحاولة</button>
                </div>
            `;
        }

        window.onload = loadQuestion;
    </script>
</body>
</html>
