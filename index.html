<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dental AI Trainer</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:#e5e7eb;
}

header{
background:#111827;
padding:20px;
text-align:center;
font-size:20px;
font-weight:bold;
letter-spacing:1px;
}

.logo{
font-size:14px;
opacity:0.7;
margin-top:5px;
}

.container{
display:grid;
gap:12px;
padding:15px;
}

.card{
background:#1f2937;
padding:15px;
border-radius:12px;
cursor:pointer;
transition:0.2s;
}

.card:hover{
background:#374151;
transform:scale(1.02);
}

.page{
display:none;
padding:15px;
}

button{
margin-top:15px;
padding:10px;
border:none;
border-radius:8px;
background:#38bdf8;
font-weight:bold;
cursor:pointer;
}

footer{
text-align:center;
padding:15px;
font-size:12px;
opacity:0.6;
margin-top:30px;
}
</style>
</head>

<body>

<header>
🦷 Dental AI Trainer
<div class="logo">Clinical Learning System</div>
</header>

<div id="home" class="container">

<div class="card" onclick="openCase('endo')">Endodontics</div>
<div class="card" onclick="openCase('peri')">Periodontology</div>
<div class="card" onclick="openCase('surg')">Oral Surgery</div>
<div class="card" onclick="openCase('rest')">Restorative</div>
<div class="card" onclick="openCase('ped')">Pediatric Dentistry</div>
<div class="card" onclick="openCase('prosth')">Prosthodontics</div>

</div>

<div id="page" class="page">

<h2 id="title"></h2>
<p id="content"></p>

<button onclick="back()">رجوع</button>

</div>

<footer>
تصميم وتطوير: الدكتور زكريا محمد عطوني - سوريا
</footer>

<script>

const cases = {

endo:[
"Severe pain + deep caries → irreversible pulpitis → RCT",
"Spontaneous pain + swelling → acute apical abscess → drainage + RCT",
"Broken file during RCT → bypass or retrieval"
],

peri:[
"Bleeding gums + pocket 5mm → chronic periodontitis → scaling",
"Mobility grade II → advanced periodontitis → maintenance",
"Halitosis + calculus → periodontal disease"
],

surg:[
"Impacted 3rd molar → surgical extraction",
"Facial swelling + trismus → infection → drainage + antibiotics",
"Cystic lesion → surgical enucleation"
],

rest:[
"Fractured cusp → composite restoration",
"Extensive decay → full crown",
"Old restoration failure → replacement"
],

ped:[
"Child caries → pulpotomy",
"Anxious child → behavior management",
"Early caries → fluoride + sealants"
],

prosth:[
"Missing teeth → partial denture",
"Edentulous jaw → complete denture",
"Implant case → implant planning"
]

}

function openCase(type){
document.getElementById('home').style.display="none";
document.getElementById('page').style.display="block";

let list = cases[type];
let random = list[Math.floor(Math.random()*list.length)];

document.getElementById('title').innerText=type.toUpperCase();
document.getElementById('content').innerText=random;
}

function back(){
document.getElementById('home').style.display="grid";
document.getElementById('page').style.display="none";
}

</script>

</body>
</html>
