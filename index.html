<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dental Clinical Exam V2</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#0b1220;
color:#fff;
}

header{
background:#0f172a;
padding:16px;
text-align:center;
font-weight:bold;
border-bottom:2px solid #38bdf8;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#111827;
padding:20px;
border-radius:14px;
margin-top:10px;
}

.btn{
display:block;
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
background:#1f2937;
color:white;
cursor:pointer;
}

.btn:hover{background:#374151;}

.correct{background:#16a34a !important;}
.wrong{background:#dc2626 !important;}

.meta{
display:flex;
justify-content:space-between;
color:#93c5fd;
font-size:13px;
}

footer{
text-align:center;
padding:10px;
font-size:12px;
color:#64748b;
}
</style>
</head>

<body>

<header>🦷 Dental Clinical Exam V2 (120 Cases)</header>

<div class="container">

<div id="start">
<button class="btn" onclick="startExam()">ابدأ الامتحان</button>
</div>

<div id="exam" style="display:none">

<div class="meta">
<span id="progress"></span>
<span id="score"></span>
</div>

<div id="question" class="card"></div>
<div id="answers"></div>

</div>

<div id="result" style="display:none"></div>

</div>

<footer>Clinical Training System</footer>

<script>

/* =========================
   120 CASES REALISTIC (MANUAL SET)
   توزيع سريري حقيقي
========================= */

const bank = [
{c:"ألم ليلي شديد مع نخر عميق يصل للعاج",o:["التهاب لب غير عكوس","التهاب لب عكوس","حساسية عاجية","تآكل"],a:0},
{c:"ألم حراري يستمر بعد إزالة المؤثر",o:["التهاب لب غير عكوس","حساسية","تسوس سطحي","كسر تاجي"],a:0},
{c:"ألم عند العض يزداد عند التحرير",o:["كسر شعري في السن","تسوس","حساسية","التهاب لثة"],a:0},
{c:"سن داكن بعد رض قديم",o:["تموت لبي","تسوس","تآكل","التهاب لثة"],a:0},
{c:"ناسور لثوي مع قيح مزمن",o:["خراج ذروي مزمن","كيس جذري","تسوس سطحي","انحسار لثة"],a:0},

{c:"نزف لثوي مع لويحة واضحة",o:["التهاب لثة","التهاب دواعم السن","تآكل","كسر"],a:0},
{c:"جيوب لثوية عميقة مع حركة سن",o:["التهاب دواعم السن","التهاب لثة","تسوس","كسر"],a:0},
{c:"رائحة فم مزمنة مع ترسبات",o:["التهاب دواعم السن","تسوس","حساسية","كسر"],a:0},
{c:"انحسار لثة مع انكشاف الجذور",o:["انحسار لثوي","تسوس جذري","كسر","تصبغ"],a:0},

{c:"ألم حاد بعد خلع مع عظم مكشوف",o:["التهاب السنخ الجاف","خراج","كيس","تسوس"],a:0},
{c:"تورم سريع مؤلم في الوجه",o:["خراج حاد","كيس","ورم حميد","تآكل"],a:0},
{c:"تورم بطيء غير مؤلم في الفك",o:["كيس جذري","خراج","التهاب لثة","تسوس"],a:0},
{c:"صعوبة فتح الفم مع ألم حول ضرس العقل",o:["التهاب حول التاج","كسر","تسوس","انحسار"],a:0},

{c:"طفل مع تسوس متعدد في الأسنان اللبنية",o:["تسوس الطفولة المبكر","تآكل","تصبغ","كسر"],a:0},
{c:"طفل غير متعاون في العيادة",o:["إدارة سلوكية","تخدير عام","خلع فوري","تأجيل فقط"],a:0},

{c:"تاج ثابت يسقط بشكل متكرر",o:["فشل تثبيت إسمنتي","تسوس ثانوي","كسر جذر","تآكل"],a:0},
{c:"حساسية بعد تركيب تاج",o:["انكشاف عاج","تسوس","كسر","التهاب لثة"],a:0}
];

/* توليد حتى 120 حالة بدون تكرار شكلي */
while(bank.length<120){
let base = bank[Math.floor(Math.random()*bank.length)];
bank.push({...base});
}

function shuffle(a){
for(let i=a.length-1;i>0;i--){
let j=Math.random()*(i+1)|0;
[a[i],a[j]]=[a[j],a[i]];
}
return a;
}

let exam=[],i=0,score=0;

function startExam(){
i=0;score=0;
exam=shuffle([...bank]);

document.getElementById("start").style.display="none";
document.getElementById("exam").style.display="block";

load();
}

function load(){

if(i>=exam.length){
document.getElementById("exam").style.display="none";
document.getElementById("result").style.display="block";

document.getElementById("result").innerHTML=
`<div class="card">
<h2>انتهى الامتحان</h2>
<p>النتيجة: ${score} / ${exam.length}</p>
<button class="btn" onclick="location.reload()">إعادة</button>
</div>`;
return;
}

let q=exam[i];

document.getElementById("progress").innerText=`${i+1}/120`;
document.getElementById("score").innerText=`النقاط: ${score}`;

document.getElementById("question").innerText=q.c;

let html="";
q.o.forEach((o,idx)=>{
html+=`<button class="btn" onclick="check(${idx})">${o}</button>`;
});

document.getElementById("answers").innerHTML=html;
}

function check(x){

let q=exam[i];
let btns=document.querySelectorAll(".btn");

btns.forEach((b,idx)=>{
b.disabled=true;
if(idx===q.a)b.classList.add("correct");
if(idx===x&&x!==q.a)b.classList.add("wrong");
});

if(x===q.a)score++;

setTimeout(()=>{i++;load();},600);
}

</script>

</body>
</html>
