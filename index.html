<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dental Trainer Pro</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eef2ff;
color:#0f172a;
text-align:center;
}

header{
background:#1e3a8a;
color:white;
padding:18px;
font-size:20px;
font-weight:bold;
border-bottom:4px solid #facc15;
}

.container{
max-width:800px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:24px;
border-radius:16px;
box-shadow:0 10px 20px rgba(0,0,0,0.08);
font-size:18px;
min-height:120px;
}

.meta{
display:flex;
justify-content:space-between;
font-size:13px;
margin:10px 0;
color:#475569;
}

.btn{
display:block;
width:100%;
margin:10px 0;
padding:14px;
border-radius:12px;
border:1px solid #cbd5e1;
background:#f8fafc;
cursor:pointer;
font-size:15px;
}

.btn:hover{background:#e2e8f0;}

.correct{background:#22c55e;color:white;}
.wrong{background:#ef4444;color:white;}

.explain{
margin-top:15px;
padding:15px;
background:#fef9c3;
border-radius:10px;
text-align:right;
font-size:14px;
line-height:1.8;
}

.start{
padding:14px;
background:#1e3a8a;
color:white;
border:none;
border-radius:12px;
cursor:pointer;
font-size:16px;
}

.next{
margin-top:10px;
background:#facc15;
border:none;
padding:10px;
border-radius:10px;
cursor:pointer;
}

footer{
margin-top:30px;
padding:15px;
font-size:12px;
opacity:0.7;
}
</style>
</head>

<body>

<header>🦷 Dental Clinical Trainer</header>

<div class="container">

<div id="start">
<button class="start" onclick="startExam()">ابدأ</button>
</div>

<div id="exam" style="display:none;">
<div class="meta">
<div>السؤال <span id="qnum"></span></div>
<div>النتيجة <span id="score"></span></div>
</div>

<div id="question" class="card"></div>
<div id="answers"></div>
</div>

<div id="result"></div>

</div>

<footer>د. زكريا عطوني</footer>

<script>

const bank = [

{
q:"ألم نابض ليلي يوقظ المريض + تسوس عميق",
o:["التهاب لب غير عكوس","حساسية","تآكل","تصبغ"],
a:0,
exp:"الألم الليلي النابض الذي يوقظ المريض علامة قوية على irreversible pulpitis. الحساسية تكون قصيرة وغير عفوية."
},

{
q:"ألم مع البارد يزول فورًا",
o:["حساسية عاجية","التهاب لب","خراج","كسر"],
a:0,
exp:"استجابة سريعة تزول فورًا = dentin hypersensitivity. التهاب اللب يستمر بعد إزالة المحرض."
},

{
q:"ألم عند العض فقط بدون تسوس واضح",
o:["Cracked tooth","حساسية","تصبغ","تآكل"],
a:0,
exp:"الألم عند الضغط فقط مع غياب أعراض أخرى يشير إلى crack. لا يوجد محفز حراري."
},

{
q:"تورم + قيح + ألم",
o:["خراج","تآكل","تصبغ","حساسية"],
a:0,
exp:"وجود pus = infection. هذه حالة خراج وليست حالة لبية فقط."
},

{
q:"ألم بعد علاج عصب سابق",
o:["فشل علاج جذور","حساسية","تآكل","تصبغ"],
a:0,
exp:"الألم بعد RCT غالبًا سببه missed canal أو infection متبقي."
},

{
q:"سن داكن بعد صدمة",
o:["نخر لب","حساسية","تآكل","تصبغ"],
a:0,
exp:"التغير اللوني بعد trauma يدل غالبًا على pulp necrosis."
},

{
q:"نزف لثة + جيوب",
o:["التهاب دواعم سن","تسوس","كسر","تصبغ"],
a:0,
exp:"وجود periodontal pockets يميز periodontitis وليس gingivitis فقط."
},

{
q:"ألم مستمر بعد إزالة البارد",
o:["التهاب لب","حساسية","تآكل","تصبغ"],
a:0,
exp:"استمرار الألم بعد إزالة المحرض = pulpitis وليس hypersensitivity."
},

{
q:"ألم مع ناسور",
o:["خراج مزمن","حساسية","تآكل","تصبغ"],
a:0,
exp:"sinus tract يدل على chronic abscess."
},

{
q:"ألم مفاجئ في سن سليم",
o:["Crack","حساسية","تآكل","تصبغ"],
a:0,
exp:"الألم المفاجئ في سن بدون تسوس غالبًا crack."
}

];

let qlist=[];
let i=0;
let score=0;
let lock=false;

function startExam(){
qlist=bank.sort(()=>Math.random()-0.5);
i=0; score=0;

document.getElementById("start").style.display="none";
document.getElementById("exam").style.display="block";

load();
}

function load(){

lock=false;

if(i>=qlist.length){
end();
return;
}

let q=qlist[i];

document.getElementById("qnum").innerText=(i+1)+"/"+qlist.length;
document.getElementById("score").innerText=score;

document.getElementById("question").innerText=q.q;

let html="";
q.o.forEach((opt,idx)=>{
html+=`<button class="btn" onclick="check(${idx})">${opt}</button>`;
});

document.getElementById("answers").innerHTML=html;
}

function check(x){

if(lock) return;
lock=true;

let q=qlist[i];
let buttons=document.querySelectorAll(".btn");

buttons.forEach((b,idx)=>{
if(idx===q.a) b.classList.add("correct");
if(idx===x && x!==q.a) b.classList.add("wrong");
b.disabled=true;
});

if(x===q.a) score++;

document.getElementById("answers").innerHTML += `
<div class="explain">
<b>التفسير السريري:</b><br>${q.exp}
<br><br>
<button class="next" onclick="nextQ()">التالي</button>
</div>
`;
}

function nextQ(){
i++;
load();
}

function end(){

document.getElementById("exam").style.display="none";

document.getElementById("result").innerHTML=
"<h2>انتهى الاختبار</h2>"+
"النتيجة: "+score+"/"+qlist.length;
}

</script>

</body>
</html>
