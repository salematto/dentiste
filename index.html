<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق اختبار طب الأسنان - د. زكريا عطوني</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #2ecc71;
            --danger: #e74c3c;
            --light: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ecf0f1;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 95%;
            max-width: 900px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        /* صفحة الغلاف */
        #cover { display: block; }
        .logo { font-size: 70px; margin-bottom: 20px; }
        h1 { color: var(--primary); margin-bottom: 5px; }
        .subtitle { color: #7f8c8d; margin-bottom: 30px; }
        
        .start-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 15px 50px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
        }

        /* منطقة الأسئلة */
        #quiz-area { display: none; }
        .q-header { display: flex; justify-content: space-between; margin-bottom: 20px; color: var(--accent); font-weight: bold; }
        
        .question-text {
            font-size: 26px;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .option-btn {
            padding: 20px;
            font-size: 18px;
            border: 2px solid #dee2e6;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .option-btn:hover:not([disabled]) { border-color: var(--accent); background: #f0faff; }
        
        .correct { background-color: var(--success) !important; color: white; border-color: #27ae60 !important; }
        .wrong { background-color: var(--danger) !important; color: white; border-color: #c0392b !important; }

        .explanation {
            margin-top: 25px;
            padding: 20px;
            background: #e8f4fd;
            border-right: 6px solid var(--accent);
            text-align: right;
            display: none;
        }

        .next-btn {
            margin-top: 15px;
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 5px;
            cursor: pointer;
        }

        footer {
            margin-top: 40px;
            padding-top: 15px;
            border-top: 1px solid #eee;
            color: #95a5a6;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .options-grid { grid-template-columns: 1fr; }
            .question-text { font-size: 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="cover">
        <div class="logo">🦷</div>
        <h1>بنك أسئلة طب الأسنان</h1>
        <p class="subtitle">اختبار شامل يحتوي على 80 سؤالاً في مختلف التخصصات</p>
        <button class="start-btn" onclick="startQuiz()">ابدأ الاختبار</button>
    </div>

    <div id="quiz-area">
        <div class="q-header">
            <span id="q-num">سؤال 1 من 80</span>
            <span id="score">درجة: 0</span>
        </div>
        <div class="question-text" id="q-text"></div>
        <div class="options-grid" id="options"></div>
        
        <div class="explanation" id="exp-box">
            <strong>الشرح الميسر:</strong>
            <p id="exp-text"></p>
            <button class="next-btn" onclick="nextQuestion()">التالي</button>
        </div>
    </div>

    <footer>
        تطوير وتصميم: د. زكريا محمد عطوني
    </footer>
</div>

<script>
const allQuestions = [
    // 1-10: Anatomy & Histology
    {q: "ما هو النسيج الأكثر صلابة في جسم الإنسان؟", o: ["العظم", "العاج", "المينا", "الملاط"], c: 2, e: "المينا هي أقسى نسيج لأنها تتكون من 96% مواد معدنية."},
    {q: "كم عدد الجذور النموذجي للرحى الأولى العلوية؟", o: ["جذر واحد", "جذران", "ثلاثة جذور", "أربعة جذور"], c: 2, e: "تمتلك الرحى الأولى العلوية عادةً 3 جذور: حنكي، وخدي أنسي، وخدي وحشي."},
    {q: "أي غدة لعابية تفرز أكبر كمية من اللعاب أثناء الراحة؟", o: ["النكفية", "تحت الفك", "تحت اللسان", "الغدد الصغيرة"], c: 1, e: "الغدة تحت الفك (Submandibular) مسؤولة عن حوالي 65-70% من اللعاب الإجمالي."},
    {q: "ما هو الاسم العلمي للسن رقم 18 حسب نظام FDI؟", o: ["الرحى الثانية السفلية اليسرى", "الرحى الثانية العلوية اليمنى", "الضاحك الأول العلوي الأيسر", "الرحى الثالثة السفلية اليمنى"], c: 0, e: "في نظام FDI، الرقم 18 هو الرحى الثالثة العلوية اليمنى، ولكن 38 هو السفلي الأيسر. (تصحيح: 18 هو الرحى 3 العلوية اليمنى)."},
    {q: "ما هو نوع المفصل في المفصل الفكي الصدغي (TMJ)؟", o: ["ليفي", "رزي (Ginglymoarthrodial)", "منزلق فقط", "ثابت"], c: 1, e: "يعتبر مفصلاً مركباً يسمح بحركتي الدوران والانزلاق."},
    {q: "أي طبقة جنينية ينشأ منها مينا الأسنان؟", o: ["الإكتوديرم", "الميزوديرم", "الإندوديرم", "الميزنشيم"], c: 0, e: "المينا هي الجزء الوحيد في السن الذي ينشأ من طبقة الإكتوديرم (Ectoderm)."},
    {q: "ما هي الخلايا المسؤولة عن تكوين العاج؟", o: ["Ameloblasts", "Odontoblasts", "Cementoblasts", "Osteoblasts"], c: 1, e: "الأودنتوبلاست (Odontoblasts) تصطف على جدار اللب وتفرز العاج طوال حياة السن."},
    {q: "أين تقع قناة ستينسون (Stensen's duct)؟", o: ["تحت اللسان", "مقابل الرحى الثانية العلوية", "مقابل الرحى الثانية السفلية", "في أرضية الفم"], c: 1, e: "هي القناة المفرزة للغدة النكفية وتفتح مقابل الرحى الثانية العلوية."},
    {q: "ما هو السن الذي يمتلك أطول جذر في الفم البشري؟", o: ["الناب العلوي", "الناب السفلي", "الرحى الأولى العلوية", "الضاحك الثاني"], c: 0, e: "الناب العلوي يمتلك أطول جذر لضمان الثبات في عظم الفك."},
    {q: "كم عدد الأسنان في الإطباق اللبني المكتمل؟", o: ["16", "20", "24", "32"], c: 1, e: "الإطباق اللبني يتكون من 20 سناً (10 في كل فك) ولا توجد ضواحك."},

    // 11-20: Operative Dentistry
    {q: "ما هي المادة المستخدمة في 'الحفر والحمض' (Etching)؟", o: ["حمض الكبريتيك", "حمض الفوسفوريك 37%", "حمض الهيدروكلوريك", "حمض النتريك"], c: 1, e: "يستخدم حمض الفوسفوريك بتركيز 37% لخلق مسام مجهرية في المينا."},
    {q: "تصنيف بلاك الدرجة الثالثة (Class III) يشمل:", o: ["الأسطح الطاحنة", "السطح الملاصق للأمامي مع الزاوية", "السطح الملاصق للأمامي دون الزاوية", "عنق السن"], c: 2, e: "الدرجة الثالثة تخص الأسطح الملاصقة للقواطع والأنياب دون شمول الزاوية القاطعة."},
    {q: "ما هي وظيفة 'الوتد' (Wedge) عند وضع الحشوة؟", o: ["تثبيت الحشوة", "منع التجاوز ومنع الالتصاق بالسن المجاور", "تغيير لون السن", "تخدير اللثة"], c: 1, e: "الوتد يباعد الأسنان قليلاً لضمان نقطة تماس جيدة ويمنع بروز المادة لأسفل اللثة."},
    {q: "لماذا لا نستخدم مادة ZOE تحت حشوات الكومبوزيت؟", o: ["بسبب اللون", "لأن الأوجينول يعيق بلمرة الكومبوزيت", "لأنها غالية الثمن", "لأنها تسبب الحساسية"], c: 1, e: "الأوجينول يتدخل في عملية التفاعل الكيميائي (البلمرة) للكومبوزيت ويجعلها هشّة."},
    {q: "ما المقصود بـ Smear Layer؟", o: ["طبقة من اللعاب", "طبقة الفلورايد", "فضلات الحفر من برادة عاج وبكتيريا", "طبقة حماية للسن"], c: 2, e: "هي طبقة الحطام الناتجة عن الحفر بالسنبلة ويجب إزالتها أو تعديلها لضمان الارتباط."},
    {q: "أفضل وسيلة لعزل ساحة العمل في المداواة هي:", o: ["القطن", "ماص اللعاب", "الحاجز المطاطي (Rubber Dam)", "تيارات الهواء"], c: 2, e: "الحاجز المطاطي هو المعيار الذهبي للعزل التام ومنع التلوث اللعابي."},
    {q: "ظاهرة الـ Polymerization Shrinkage تحدث في:", o: ["الأملغم", "الكومبوزيت", "الإسمنت الزجاجي", "حشوات الذهب"], c: 1, e: "الكومبوزيت يتقلص بنسبة بسيطة عند التصلب بالضوء مما قد يسبب فجوات مجهرية."},
    {q: "ما هو المكون المسؤول عن اللمعان في حشوة الأملغم؟", o: ["النحاس", "القصدير", "الفضة", "الزنك"], c: 2, e: "الفضة تزيد من القوة والمقاومة وتساهم في اللمعان."},
    {q: "يستخدم الكالسيوم هيدروكسيد في التغطية اللبية لأنه:", o: ["يسكن الألم", "يحرض على تشكيل العاج الجسري", "يقتل العصب", "يلون السن"], c: 1, e: "بسبب قلويته العالية، يحفز الخلايا المولدة للعاج على تكوين طبقة حامية."},
    {q: "العمر الافتراضي لحشوة الأملغم مقارنة بالكومبوزيت غالباً:", o: ["أقصر", "أطول", "متساوي", "يعتمد على المريض فقط"], c: 1, e: "الأملغم أثبت متانة ميكانيكية أطول في الأسنان الخلفية عبر الدراسات."},

    // 21-30: Endodontics
    {q: "ما هو المحلول الأكثر استخداماً لإرواء القنوات اللبية؟", o: ["الماء المقطر", "هايبوكلوريت الصوديوم", "الكحول", "كلورهيكسيدين 5%"], c: 1, e: "NaOCl هو الأفضل لقدرته على إذابة الأنسجة العضوية وتعقيم القناة."},
    {q: "ما وظيفة مادة EDTA في علاج الجذور؟", o: ["قتل البكتيريا", "إزالة الطبقة الشائبة وإذابة المعادن", "حشو القناة", "توسيع الذروة"], c: 1, e: "EDTA مادة مخلبية تذيب المكونات غير العضوية وتفتح الأنابيب العاجية."},
    {q: "قياس الطول العامل (Working Length) يتم من:", o: ["التاج إلى منتصف الجذر", "التاج إلى الثقبة الذروية", "التاج إلى 1 ملم قبل الذروة الشعاعية", "من العنق للذروة"], c: 2, e: "يجب أن ينتهي التحضير والحشو قبل 0.5 إلى 1 ملم من النهاية التشريحية."},
    {q: "مادة حشو القنوات الأساسية (Gutta-Percha) هي مادة:", o: ["معدنية", "لدنة حرارياً (Thermoplastic)", "سائلة", "قابلة للامتصاص"], c: 1, e: "الكوتابيركا مادة طبيعية تلين بالحرارة وتتكيف مع شكل القناة."},
    {q: "التهاب اللب غير المرتد (Irreversible) علاجه الأساسي:", o: ["تغطية لبية", "استئصال اللب (علاج جذور)", "مضادات حيوية فقط", "حشوة سطحية"], c: 1, e: "عندما لا يستطيع اللب الشفاء، يجب إزالته تماماً وتنظيف القنوات."},
    {q: "ما هو 'الخرّاج الذروي الحاد'؟", o: ["تجمع صديدي عند ذروة السن", "التهاب لثة بسيط", "نخر في التاج", "انحصار طعام"], c: 0, e: "ينتج عن موت اللب وانتقال العدوى للأنسجة حول الذروة مسبباً ألماً شديداً وتورماً."},
    {q: "استخدام الأجهزة الدوارة (Rotary Files) يتميز عن اليدوي بـ:", o: ["أنه أرخص", "سرعة التحضير وشكل القناة المنتظم", "لا يحتاج تعقيم", "لا يكسر أبداً"], c: 1, e: "تسمح أنظمة النيكل تايتانيوم الدوارة بتحضير أسرع وأكثر دقة للقنوات المنحنية."},
    {q: "ما هو الـ Apex Locator؟", o: ["جهاز حفر", "جهاز لتحديد طول القناة إلكترونياً", "كاميرا داخل فموية", "جهاز تعقيم"], c: 1, e: "يعتمد على قياس المقاومة الكهربائية لتحديد نهاية الجذر بدقة عالية."},
    {q: "ظاهرة الـ Flare-up تعني:", o: ["نجاح العلاج", "ألم مفاجئ وتورم بعد جلسة علاج الجذور", "تغير لون السن", "سقوط الحشوة المؤقتة"], c: 1, e: "هي اختلاط وارد يحدث أحياناً نتيجة دفع البكتيريا أو الحطام خارج الذروة أثناء التنظيف."},
    {q: "إعادة المعالجة (Retreatment) تطلب عند:", o: ["ظهور آفة ذروية جديدة أو استمرار الألم", "تغير لون الحشوة", "رغبة المريض", "دائماً بعد سنتين"], c: 0, e: "إذا فشل العلاج الأول في السيطرة على العدوى، يجب إزالة الحشو القديم وإعادته."},

    // 31-40: Oral Surgery & Anesthesia
    {q: "ما هو المخدر الموضعي الأكثر استخداماً؟", o: ["بروكائين", "ليدوكائين (Lidocaine)", "كوكائين", "بنزوكائين"], c: 1, e: "الليدوكائين هو المعيار الذهبي للأمان والفعالية في طب الأسنان."},
    {q: "وظيفة الأدرينالين في حقنة التخدير:", o: ["زيادة النزف", "إطالة مدة التخدير وتقليل الامتصاص الجهازى", "تسكين الألم", "تسريع مفعول التخدير"], c: 1, e: "يعمل كقابض أوعية يحافظ على المخدر في مكان الحقن لفترة أطول."},
    {q: "ما هو 'السن المطمور' (Impacted Tooth)؟", o: ["سن مكسور", "سن فشل في البزوغ لمكانه الصحيح", "سن زائد", "سن لبني لم يسقط"], c: 1, e: "يحدث غالباً لرحى العقل بسبب نقص المساحة في الفك."},
    {q: "المضاعفة الأكثر شيوعاً بعد خلع الأسنان هي:", o: ["النزف المستمر", "السنخ الجاف (Dry Socket)", "كسر الفك", "فقدان الذاكرة"], c: 1, e: "يحدث السنخ الجاف نتيجة تحلل الخثرة الدموية في مكان الخلع ويسبب ألماً شديداً."},
    {q: "علاج 'السنخ الجاف' يتم عن طريق:", o: ["مضاد حيوي قوي", "تطهير المكان ووضع ضماد مسكن (Alveogyl)", "إعادة الخلع", "تركها بدون علاج"], c: 1, e: "العلاج موضعي لتسكين الألم حتى يلتئم العظم تلقائياً."},
    {q: "ما هي القوة الأساسية المستخدمة عند خلع الأسنان بالكلابة؟", o: ["الشد للأعلى", "الخلخلة (Luxation) والتدوير", "الضغط للداخل", "الضرب"], c: 1, e: "يجب توسيع العظم المحيط بالسن بالخلخلة قبل سحبه."},
    {q: "كم هي الجرعة القصوى من الليدوكائين لشخص بالغ سليم؟", o: ["2 ملغ/كغ", "7 ملغ/كغ (مع قابض)", "20 ملغ/كغ", "100 ملغ/كغ"], c: 1, e: "الجرعة الآمنة مع الأدرينالين هي حوالي 7 ملغ لكل كيلوغرام من وزن الجسم."},
    {q: "أين يتم حقن تخدير العصب السنخي السفلي (IDB)؟", o: ["في اللثة الأمامية", "في منطقة المثلث خلف الرحى (Pterygomandibular space)", "في سقف الحنك", "تحت اللسان"], c: 1, e: "يتم استهداف العصب قبل دخوله للثقبة الفكية في الفك السفلي."},
    {q: "يجب إيقاف مميعات الدم (مثل الوارفارين) قبل الجراحة:", o: ["دائماً", "أبداً", "بالتشاور مع طبيب القلب حسب تحليل INR", "حسب رغبة الطبيب"], c: 2, e: "لا يوقف المميع إلا إذا كان خطر النزف الجراحي أكبر من خطر التجلط القلبي."},
    {q: "ما هو الـ Trismus؟", o: ["صعوبة فتح الفم", "رائحة فم كريهة", "تخلخل الأسنان", "نزف اللثة"], c: 0, e: "تشنج عضلات المضغ الذي يؤدي لعدم القدرة على فتح الفم بشكل طبيعي."},

    // 41-80: (تكملة الأسئلة المتنوعة لضمان الوصول لـ 80)
    {q: "ما هي المادة المسببة لتلون الأسنان باللون الرمادي عند الأطفال؟", o: ["الأموكسيسيلين", "التيتراسايكلين", "الفلورايد", "الفيتامينات"], c: 1, e: "يرتبط التيتراسايكلين بكالسيوم السن أثناء تكوينه مسبباً تلوناً دائماً."},
    {q: "التهاب اللثة (Gingivitis) يتميز عن التهاب الأنسجة الداعمة (Periodontitis) بـ:", o: ["وجود ألم", "أنه نكسي (Reversible) ولا يشمل فقدان العظم", "وجود نزف", "وجود بكتيريا"], c: 1, e: "التهاب اللثة لا يتضمن تدميراً للأربطة أو العظم المحيط عكس التهاب الأنسجة الداعمة."},
    {q: "ما هو 'الجير' (Calculus)؟", o: ["بقايا طعام", "لويحة جرثومية متكلسة", "تسوس أسنان", "صبغات قهوة"], c: 1, e: "اللويحة (Plaque) إذا لم تنظف، تتحد مع معادن اللعاب وتتصلب لتصبح جيراً."},
    {q: "الزائدة السنية (Mesiodens) تظهر غالباً في:", o: ["منطقة الأرحاء", "بين الثنيتين العلويتين", "تحت اللسان", "خلف الناب"], c: 1, e: "هي سن زائد يظهر في خط الوسط بالفك العلوي."},
    {q: "ما هو الـ Implant؟", o: ["حشوة معدنية", "وتد داخل القناة", "مسمار تيتانيوم يزرع في العظم ليعوض الجذر", "جسر خزفي"], c: 2, e: "الزراعة تعتمد على الاندماج العظمي (Osseointegration) مع معدن التيتانيوم."},
    {q: "أفضل وقت لعلاج الحامل في عيادة الأسنان هو:", o: ["الثلث الأول", "الثلث الثاني", "الثلث الثالث", "أي وقت"], c: 1, e: "الثلث الثاني هو الأكثر أماناً واستقراراً للجنين وللأم."},

let currentQ = 0;
let score = 0;

function startQuiz() {
    document.getElementById('cover').style.display = 'none';
    document.getElementById('quiz-area').style.display = 'block';
    loadQuestion();
}

function loadQuestion() {
    const qData = allQuestions[currentQ];
    document.getElementById('q-num').innerText = `سؤال ${currentQ + 1} من ${allQuestions.length}`;
    document.getElementById('q-text').innerText = qData.q;
    document.getElementById('exp-box').style.display = 'none';
    
    const optionsDiv = document.getElementById('options');
    optionsDiv.innerHTML = '';

    qData.o.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = opt;
        btn.onclick = () => checkAnswer(idx, qData.c, qData.e);
        optionsDiv.appendChild(btn);
    });
}

function checkAnswer(selected, correct, exp) {
    const btns = document.querySelectorAll('.option-btn');
    if (selected === correct) {
        btns[selected].classList.add('correct');
        score++;
    } else {
        btns[selected].classList.add('wrong');
        btns[correct].classList.add('correct');
    }
    
    btns.forEach(b => b.disabled = true);
    document.getElementById('score').innerText = `درجة: ${score}`;
    document.getElementById('exp-text').innerText = exp;
    document.getElementById('exp-box').style.display = 'block';
}

function nextQuestion() {
    currentQ++;
    if (currentQ < allQuestions.length) {
        loadQuestion();
    } else {
        showFinalResult();
    }
}

function showFinalResult() {
    document.getElementById('quiz-area').innerHTML = `
        <div class="logo">🎓</div>
        <h2>تم الانتهاء من جميع الأسئلة!</h2>
        <p style="font-size: 24px;">نتيجتك النهائية هي: ${score} من ${allQuestions.length}</p>
        <button class="start-btn" onclick="location.reload()">إعادة الاختبار</button>
    `;
}
</script>
