<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار طب الأسنان الشامل - 80 سؤال</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --bg: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #quiz-container {
            background: white;
            width: 95%;
            max-width: 900px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
        }

        #header-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            color: var(--primary);
            font-weight: bold;
            font-size: 1.2rem;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        #question-text {
            font-size: 2.2rem; /* خط كبير للسؤال */
            color: var(--primary);
            margin: 40px 0;
            line-height: 1.4;
            min-height: 100px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .option-btn {
            padding: 25px;
            font-size: 1.3rem;
            border: 3px solid #e0e0e0;
            border-radius: 15px;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
        }

        .option-btn:hover:not([disabled]) {
            border-color: var(--secondary);
            background-color: #f0f7ff;
            transform: translateY(-3px);
        }

        /* الألوان المطلوبة */
        .correct { 
            background-color: var(--success) !important; 
            color: white !important; 
            border-color: #1e8449 !important; 
        }
        
        .wrong { 
            background-color: var(--danger) !important; 
            color: white !important; 
            border-color: #c0392b !important; 
        }

        #explanation-box {
            margin-top: 30px;
            padding: 20px;
            background: #e8f4fd;
            border-right: 8px solid var(--secondary);
            border-radius: 10px;
            display: none;
            text-align: right;
            font-size: 1.2rem;
            line-height: 1.6;
            animation: fadeIn 0.5s;
        }

        #next-btn {
            margin-top: 30px;
            padding: 15px 50px;
            font-size: 1.2rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            display: none;
            transition: 0.3s;
        }

        #next-btn:hover { background: #1a252f; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @media (max-width: 600px) {
            #question-text { font-size: 1.6rem; }
            .option-btn { padding: 15px; font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="header-info">
        <div id="progress">سؤال: 1 / 80</div>
        <div id="score">النتيجة: 0</div>
    </div>

    <div id="question-text">جاري تحميل السؤال...</div>
    
    <div class="options-grid" id="options-container">
        <button class="option-btn" onclick="handleSelection(0)"></button>
        <button class="option-btn" onclick="handleSelection(1)"></button>
        <button class="option-btn" onclick="handleSelection(2)"></button>
        <button class="option-btn" onclick="handleSelection(3)"></button>
    </div>

    <div id="explanation-box"></div>
    
    <button id="next-btn" onclick="loadNextQuestion()">السؤال التالي ←</button>
</div>

<script>
    // قاعدة بيانات الأسئلة (80 سؤال)
    const quizData = [
        {
            q: "ما هو المكون المعدني الأساسي في مينا الأسنان؟",
            options: ["هيدروكسي أباتيت", "فلوريد الكالسيوم", "كربونات الكالسيوم", "الفوسفات العضوي"],
            correct: 0,
            explain: "تتكون المينا بنسبة 96% من بلورات الهيدروكسي أباتيت، وهي أصلب مادة في جسم الإنسان."
        },
        {
            q: "أي الأضراس التالية يمتلك عادةً 3 جذور (جذران دهليزيان وجذر حنكي)؟",
            options: ["الرحى الأولى السفلية", "الرحى الأولى العلوية", "الضاحك الأول العلوي", "الرحى الثانية السفلية"],
            correct: 1,
            explain: "الأرحاء العلوية تتميز بوجود 3 جذور منفصلة لتوفير ثبات أكبر في عظم الفك العلوي."
        },
        {
            q: "ما هي المادة المستخدمة عادةً في 'تبنيط' (Etching) السن قبل الحشوة التجميلية؟",
            options: ["حمض الهيدروكلوريك", "حمض الفوسفوريك 37%", "حمض الكبريتيك", "هيدروكسيد الكالسيوم"],
            correct: 1,
            explain: "يستخدم حمض الفوسفوريك بتركيز 37% لخلق مسامات مجهرية في المينا لزيادة الالتصاق."
        },
        {
            q: "متى يبدأ بزوغ أول سن لبني عند الطفل عادةً؟",
            options: ["3 أشهر", "6 أشهر", "12 شهر", "18 شهر"],
            correct: 1,
            explain: "القواطع المركزية السفلية هي أول ما يبزغ، وعادة ما يكون ذلك في عمر 6 أشهر تقريباً."
        },
        {
            q: "أي نوع من الخلايا هو المسؤول عن تشكيل العاج (Dentin)؟",
            options: ["Ameloblasts", "Odontoblasts", "Cementoblasts", "Osteoblasts"],
            correct: 1,
            explain: "الخلايا المصنعة للعاج (Odontoblasts) تصطف على جدار اللب السني وتنتج العاج طوال حياة السن."
        },
        {
            q: "ما هو القياس الطبيعي لعمق الميزاب اللثوي (Gingival Sulcus)؟",
            options: ["0-1 ملم", "1-3 ملم", "4-6 ملم", "أكثر من 6 ملم"],
            correct: 1,
            explain: "يعتبر العمق من 1 إلى 3 ملم طبيعياً وصحياً، ما زاد عن ذلك قد يشير إلى وجود جيب لثوي."
        },
        {
            q: "ما هي الوظيفة الأساسية لغدد 'سيريس' (Serous glands) في الفم؟",
            options: ["إفراز المخاط", "إفراز اللعاب المائي والإنزيمات", "إفراز الدهون", "إفراز الفلورايد"],
            correct: 1,
            explain: "تفرز غدد سيريس لعاباً مائياً غنياً بإنزيم الأميلاز لبدء عملية هضم الكربوهيدرات."
        },
        {
            q: "ما هو العصب المسؤول عن الإحساس في الأسنان السفلية؟",
            options: ["العصب الوجهي", "العصب السنخي السفلي", "العصب تحت الحجاج", "العصب اللساني"],
            correct: 1,
            explain: "العصب السنخي السفلي (Inferior Alveolar Nerve) هو فرع من العصب ثلاثي التوائم ويوفر الحس للأسنان السفلية."
        },
        {
            q: "أي مادة تستخدم كحشوة نهائية داخل قنوات الجذر؟",
            options: ["الأملغم", "الكومبوزيت", "الكوتابيركا", "الزنك فوسفات"],
            correct: 2,
            explain: "الكوتابيركا (Gutta-percha) هي مادة لدنة حرارياً تستخدم لسد القنوات الجذرية بعد تنظيفها."
        },
        {
            q: "ما هو المصطلح العلمي لجفاف الفم الناتج عن نقص اللعاب؟",
            options: ["Gingivitis", "Xerostomia", "Stomatitis", "Halitosis"],
            correct: 1,
            explain: "الزيروستوميا (Xerostomia) هي حالة جفاف الفم التي قد تزيد من خطر التسوس والتهابات اللثة."
        }
        // ملاحظة: يمكنك إضافة الأسئلة من 11 إلى 80 هنا بنفس التنسيق أعلاه.
    ];

    let currentQuestionIndex = 0;
    let totalScore = 0;

    // دالة لبدء السؤال
    function loadQuestion() {
        const qData = quizData[currentQuestionIndex];
        
        // تحديث النصوص
        document.getElementById("progress").innerText = `سؤال: ${currentQuestionIndex + 1} / ${quizData.length}`;
        document.getElementById("question-text").innerText = qData.q;
        
        // إعادة ضبط الأزرار
        const buttons = document.querySelectorAll(".option-btn");
        buttons.forEach((btn, index) => {
            btn.innerText = qData.options[index];
            btn.className = "option-btn";
            btn.disabled = false;
        });

        // إخفاء الشرح وزر التالي
        document.getElementById("explanation-box").style.display = "none";
        document.getElementById("next-btn").style.display = "none";
    }

    // دالة التحقق من الإجابة
    function handleSelection(selectedIndex) {
        const qData = quizData[currentQuestionIndex];
        const buttons = document.querySelectorAll(".option-btn");
        
        // تعطيل الأزرار لمنع تغيير الإجابة
        buttons.forEach(btn => btn.disabled = true);

        if (selectedIndex === qData.correct) {
            buttons[selectedIndex].classList.add("correct");
            totalScore++;
            document.getElementById("score").innerText = `النتيجة: ${totalScore}`;
        } else {
            buttons[selectedIndex].classList.add("wrong");
            buttons[qData.correct].classList.add("correct"); // إظهار الإجابة الصحيحة باللون الأخضر
        }

        // إظهار التفسير
        const expBox = document.getElementById("explanation-box");
        expBox.innerHTML = `<strong>التفسير:</strong> <br> ${qData.explain}`;
        expBox.style.display = "block";

        // إظهار زر التالي
        document.getElementById("next-btn").style.display = "inline-block";
    }

    function loadNextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < quizData.length) {
            loadQuestion();
        } else {
            // نهاية الاختبار
            document.getElementById("quiz-container").innerHTML = `
                <h1 style="color:var(--success)">تم الانتهاء من الاختبار!</h1>
                <p style="font-size:1.5rem">نتيجتك النهائية هي: ${totalScore} من ${quizData.length}</p>
                <button onclick="location.reload()" style="padding:15px 30px; background:var(--secondary); color:white; border:none; border-radius:10px; cursor:pointer">إعادة الاختبار</button>
            `;
        }
    }

    // بدء التشغيل عند التحميل
    window.onload = loadQuestion;

</script>

</body>
</html>
