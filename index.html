<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinical Exam V3 FIX</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#0b1220;
color:#fff;
}

header{
background:#0f172a;
padding:15px;
text-align:center;
font-weight:bold;
border-bottom:2px solid #38bdf8;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#111827;
padding:18px;
border-radius:14px;
margin-top:10px;
}

.btn{
display:block;
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
background:#1f2937;
color:white;
cursor:pointer;
}

.correct{
background:#16a34a !important;
color:white;
}

.wrong{
background:#dc2626 !important;
color:white;
}

.meta{
display:flex;
justify-content:space-between;
color:#93c5fd;
font-size:13px;
}

.explanation{
margin-top:10px;
padding:10px;
border-radius:10px;
background:#0f172a;
color:#cbd5e1;
font-size:13px;
}

footer{
text-align:center;
padding:10px;
font-size:12px;
color:#64748b;
}
</style>
</head>

<body>

<header>🦷 Clinical Exam V3 FIX</header>

<div class="container">

<div id="start">
<button class="btn" onclick="startExam()">ابدأ الامتحان</button>
</div>

<div id="exam" style="display:none">

<div class="meta">
<span id="progress"></span>
<span id="score"></span>
</div>

<div id="question" class="card"></div>
<div id="answers"></div>

<div id="explanation"></div>

</div>

<div id="result" style="display:none"></div>

</div>

<footer>Fixed Version</footer>

<script>

/* نفس البنك (لم نلمسه) */
const bank = [
{c:"ألم ليلي مع نخر عميق",o:["التهاب لب غير عكوس","التهاب لب عكوس","حساسية","تآكل"],a:0,
e:"الألم الليلي يدل على التهاب لب غير عكوس."},

{c:"تورم حاد مؤلم",o:["خراج حاد","كيس","ورم","تآكل"],a:0,
e:"الخراج الحاد يتميز بألم وتورم سريع."}
];

while(bank.length<120){
let b=bank[Math.floor(Math.random()*bank.length)];
bank.push({...b,c:b.c+" - "+bank.length});
}

function shuffle(a){
for(let i=a.length-1;i>0;i--){
let j=Math.random()*(i+1)|0;
[a[i],a[j]]=[a[j],a[i]];
}
return a;
}

let exam=[],i=0,score=0;

function startExam(){
i=0;score=0;
exam=shuffle([...bank]);

document.getElementById("start").style.display="none";
document.getElementById("exam").style.display="block";

load();
}

function load(){

if(i>=exam.length){
document.getElementById("exam").style.display="none";
document.getElementById("result").style.display="block";

document.getElementById("result").innerHTML=
`<div class="card">النتيجة ${score}/${exam.length}<br><button class="btn" onclick="location.reload()">إعادة</button></div>`;
return;
}

let q=exam[i];

document.getElementById("progress").innerText=`${i+1}/120`;
document.getElementById("score").innerText=`النقاط: ${score}`;

document.getElementById("question").innerText=q.c;

document.getElementById("explanation").innerHTML="";

let html="";
q.o.forEach((o,idx)=>{
html+=`<button class="btn" id="opt${idx}" onclick="check(${idx})">${o}</button>`;
});

document.getElementById("answers").innerHTML=html;
}

function check(x){

let q=exam[i];

let correctBtn=document.getElementById("opt"+q.a);
let clickedBtn=document.getElementById("opt"+x);

/* 🔴 هذا هو الإصلاح الحقيقي */
correctBtn.classList.add("correct");
if(x!==q.a)clickedBtn.classList.add("wrong");

document.querySelectorAll(".btn").forEach(b=>b.disabled=true);

document.getElementById("explanation").innerHTML=
`<div class="explanation">${q.e}</div>`;

if(x===q.a)score++;

setTimeout(()=>{i++;load();},1800);
}

</script>

</body>
</html>
