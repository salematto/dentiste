<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dental Smart Exam</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f3f6fb;
color:#0f172a;
text-align:center;
}

header{
background:#1e3a8a;
color:white;
padding:18px;
font-size:20px;
font-weight:bold;
border-bottom:4px solid #facc15;
}

.container{
max-width:800px;
margin:auto;
padding:20px;
}

.card{
background:#fff;
padding:24px;
border-radius:16px;
box-shadow:0 8px 20px rgba(30,58,138,0.12);
font-size:18px;
min-height:110px;
border:1px solid #e5e7eb;
}

.meta{
display:flex;
justify-content:space-between;
font-size:13px;
color:#475569;
margin:10px 0;
}

.btn{
display:block;
width:100%;
margin:10px 0;
padding:14px;
border:1px solid #cbd5e1;
border-radius:12px;
cursor:pointer;
font-size:15px;
background:#f8fafc;
}

.correct{background:#22c55e !important;color:white;}
.wrong{background:#ef4444 !important;color:white;}

.expl{
margin-top:12px;
padding:12px;
background:#e0f2fe;
border-radius:10px;
font-size:14px;
color:#0f172a;
text-align:right;
display:none;
}

.bad{
margin-top:6px;
background:#fee2e2;
padding:6px;
border-radius:8px;
font-size:13px;
display:none;
}

.start{
padding:14px;
border:none;
border-radius:12px;
background:#1e3a8a;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.result{
text-align:center;
font-size:18px;
padding:20px;
line-height:2;
}

.badge{
display:inline-block;
padding:6px 14px;
border-radius:999px;
background:#facc15;
color:#0f172a;
margin-top:10px;
font-size:14px;
font-weight:bold;
}

</style>
</head>

<body>

<header>🧠 Dental Smart Exam (تحليل ذكي)</header>

<div class="container">

<div id="start">
<button class="start" onclick="startExam()">ابدأ الاختبار</button>
</div>

<div id="exam" style="display:none;">

<div class="meta">
<div>السؤال: <span id="qnum"></span></div>
<div>النتيجة: <span id="score"></span></div>
</div>

<div id="question" class="card"></div>

<div id="answers"></div>

<div id="expl" class="expl"></div>

</div>

<div id="result" class="result" style="display:none;"></div>

</div>

<script>

/* بنك مختصر لكن قابل للتوسعة */
const bank = [
{q:"ألم ليلي مع تسوس عميق",o:["التهاب لب غير عكوس","حساسية","تآكل","تصبغ"],a:0,
e:"الألم الليلي يدل على التهاب لب غير عكوس بسبب ضغط داخل الحجرة اللبية."},

{q:"نزف لثة عند التفريش",o:["التهاب لثة","تسوس","كسر","تصبغ"],a:0,
e:"النزف العرضي مع التفريش علامة كلاسيكية لالتهاب اللثة."},

{q:"ألم عند البارد يزول بسرعة",o:["حساسية عاجية","التهاب لب","كسر","خراج"],a:0,
e:"اختفاء الألم بسرعة بعد البارد = حساسية وليست التهاب لب."},

{q:"تورم مع قيح",o:["خراج","تسوس","تآكل","حساسية"],a:0,
e:"وجود قيح يعني عدوى بكتيرية متقدمة (خراج)."},

{q:"ألم عند المضغ في سن سليم",o:["كسر شعري","تسوس","تصبغ","حساسية"],a:0,
e:"ألم عض بدون تسوس ظاهر يشير غالبًا إلى كسر شعري."}
];

let qlist=[];
let i=0;
let score=0;
let mistakes=[];

function startExam(){
qlist=bank.sort(()=>Math.random()-0.5);
i=0;
score=0;
mistakes=[];

document.getElementById("start").style.display="none";
document.getElementById("exam").style.display="block";
document.getElementById("result").style.display="none";

load();
}

function load(){

if(i>=qlist.length){
end();
return;
}

let q=qlist[i];

document.getElementById("qnum").innerText=(i+1)+"/"+qlist.length;
document.getElementById("score").innerText=score;

document.getElementById("question").innerText=q.q;

document.getElementById("expl").style.display="none";

let html="";
q.o.forEach((opt,idx)=>{
html+=`<button class="btn" onclick="check(${idx})">${opt}</button>`;
});

document.getElementById("answers").innerHTML=html;
}

function check(x){

let q=qlist[i];
let buttons=document.querySelectorAll(".btn");

buttons.forEach((b,idx)=>{
if(idx===q.a) b.classList.add("correct");
if(idx===x && x!==q.a) b.classList.add("wrong");
b.disabled=true;
});

if(x===q.a){
score++;
}else{
mistakes.push(q.q);
}

document.getElementById("expl").style.display="block";
document.getElementById("expl").innerText=q.e;

setTimeout(()=>{
i++;
load();
},1800);
}

function end(){

document.getElementById("exam").style.display="none";
document.getElementById("result").style.display="block";

let level =
score/qlist.length>0.8?"ممتاز 🟢":
score/qlist.length>0.5?"جيد 🟠":
"يحتاج تحسين 🔴";

let missText = mistakes.length
? "<br><br>الأخطاء:<br>" + mistakes.map(m=>"• "+m).join("<br>")
: "<br><br>بدون أخطاء 🎉";

document.getElementById("result").innerHTML=
"انتهى الاختبار 🧠<br><br>"+
"النتيجة: "+score+" / "+qlist.length+
"<br><span class='badge'>"+level+"</span>"+
missText;
}

</script>

</body>
</html>
