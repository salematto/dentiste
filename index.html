<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>اختبار طبيب الأسنان | 80 سؤالاً تفاعلياً</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: #fff7e5; /* خلفية صفراء خفيفة */
            font-family: 'Segoe UI', 'Tahoma', 'Cairo', 'Rubik', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* بطاقات زرقاء */
        .card-blue {
            background: linear-gradient(145deg, #2c7be5, #1a5bbf);
            border-radius: 36px;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.25);
            padding: 1.8rem;
            color: white;
        }

        /* صفحة الغلاف */
        .cover {
            text-align: center;
            background: linear-gradient(135deg, #ffffff 0%, #fff4e0 100%);
            border-radius: 56px;
            padding: 2rem 1.8rem;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid #ffdfa5;
        }

        .logo {
            font-size: 5rem;
            margin-bottom: 0.5rem;
            display: inline-block;
            background: #f5b042;
            padding: 0.5rem;
            border-radius: 100px;
            box-shadow: 0 10px 18px rgba(0,0,0,0.1);
        }

        .app-title {
            font-size: 2.3rem;
            font-weight: 800;
            color: #1f3a6b;
            margin: 0.5rem 0;
        }

        .sub {
            color: #4b6e8a;
            font-weight: 500;
            margin-bottom: 1.8rem;
            font-size: 1.1rem;
        }

        .btn-start {
            background: #2c7be5;
            border: none;
            padding: 16px 42px;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 6px 0 #0e3a6b;
            font-family: inherit;
            margin-top: 10px;
        }

        .btn-start:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #0e3a6b;
        }

        footer {
            margin-top: 28px;
            font-size: 0.9rem;
            color: #5a4a2e;
            text-align: center;
            border-top: 1px solid #eedb9b;
            padding-top: 18px;
        }

        /* منطقة الاختبار */
        .quiz-area {
            display: none;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 10px;
        }

        .q-num {
            background: #ffde9e;
            color: #1e3a5f;
            padding: 6px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
        }

        .progress {
            background: #ffde9e80;
            padding: 6px 18px;
            border-radius: 40px;
            color: #1e3a5f;
            font-weight: bold;
        }

        .question-text {
            font-size: 1.8rem;
            font-weight: 700;
            line-height: 1.4;
            margin: 1.8rem 0 1.5rem;
            word-break: break-word;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 18px;
            margin: 30px 0 20px;
        }

        .option-btn {
            background: #eef3ff;
            border: 2px solid #cddff7;
            border-radius: 60px;
            padding: 14px 12px;
            font-size: 1rem;
            font-weight: 600;
            color: #1f2f47;
            text-align: center;
            cursor: pointer;
            transition: 0.1s linear;
            font-family: inherit;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .option-btn:hover:not(:disabled) {
            background: #dfebff;
            transform: scale(0.98);
            border-color: #2c7be5;
        }

        .correct-highlight {
            background: #2b9348 !important;
            border-color: #1b6b34 !important;
            color: white !important;
            box-shadow: 0 0 0 2px #b7efc5;
        }

        .wrong-highlight {
            background: #e63946 !important;
            border-color: #b91c2c !important;
            color: white !important;
            text-decoration: line-through;
        }

        .explanation-box {
            background: #fef9e6;
            border-right: 6px solid #f4a261;
            padding: 16px 22px;
            border-radius: 28px;
            margin: 20px 0 15px;
            color: #2c3e2f;
            font-size: 1rem;
            line-height: 1.6;
            font-weight: 500;
        }

        .next-auto-msg {
            text-align: center;
            font-size: 0.85rem;
            background: #00000030;
            display: inline-block;
            width: auto;
            padding: 5px 16px;
            border-radius: 100px;
            margin-top: 6px;
            color: #fff3cf;
        }

        .restart-btn {
            background: #f4c542;
            border: none;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.1rem;
            color: #2c3e2f;
            cursor: pointer;
            margin-top: 10px;
            font-family: inherit;
            transition: 0.1s;
        }

        .restart-btn:active {
            transform: scale(0.97);
        }

        @media (max-width: 650px) {
            .card-blue { padding: 1.2rem; }
            .question-text { font-size: 1.4rem; }
            .options-grid { grid-template-columns: 1fr; gap: 12px; }
            .option-btn { padding: 12px; }
            .app-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<div class="app-container" id="appContainer">
    <!-- صفحة الغلاف -->
    <div id="coverScreen" class="cover">
        <div class="logo">🦷⚕️📚</div>
        <div class="app-title">اختبار طبيب الأسنان الذكي</div>
        <div class="sub">80 سؤالاً احترافياً | شروحات علمية فورية | تحديث تلقائي</div>
        <button class="btn-start" id="startExamBtn">▶ ابدأ الاختبار الآن</button>
        <footer>
            تطوير وتصميم د. زكريا محمد عطوني
        </footer>
    </div>

    <!-- منطقة الاختبار -->
    <div id="quizScreen" class="quiz-area">
        <div class="card-blue">
            <div class="question-header">
                <span class="q-num" id="questionNumber">السؤال 1</span>
                <span class="progress" id="progressCounter">1 / 80</span>
            </div>
            <div class="question-text" id="questionText">
                سؤال نموذجي
            </div>
            <div class="options-grid" id="optionsContainer"></div>
            <div class="explanation-box" id="explanationBox">
                ✨ اختر إجابة ليظهر الشرح العلمي
            </div>
            <div id="autoNextMsg" class="next-auto-msg"></div>
        </div>
        <footer style="background:transparent; border:none; margin-top: 20px;">
            تطوير وتصميم د. زكريا محمد عطوني
        </footer>
    </div>
</div>

<script>
    (function() {
        // ------------------------- بناء 80 سؤالاً في طب الأسنان -------------------------
        const questionsBank = [];

        function addQ(question, options, correctIndex, explanation) {
            questionsBank.push({
                text: question,
                options: options,
                correct: correctIndex,
                explanation: explanation
            });
        }

        // توليد الأسئلة (80 سؤالاً شاملاً)
        addQ("أي الأسنان التالية يُعرف بـ 'سن العقل'؟", ["الضرس الثالث الدائم", "الضرس الثاني الدائم", "الناب العلوي", "القاطعة الجانبية"], 0, "ضرس العقل هو الضرس الثالث الدائم، يظهر بين 17-25 سنة.");
        addQ("ما هو العدد الطبيعي للأسنان الدائمة لدى الإنسان البالغ؟", ["28", "30", "32", "34"], 2, "الإنسان البالغ يمتلك 32 سناً دائمة: 16 في الفك العلوي و16 في السفلي.");
        addQ("أي عضلة تساهم في عملية المضغ وترفع الفك السفلي؟", ["العضلة الماضغة", "العضلة الذقنية", "العضلة الوجنية", "العضلة الجبهية"], 0, "العضلة الماضغة (Masseter) هي إحدى عضلات المضغ الأساسية.");
        addQ("ما هي الطبقة الخارجية الصلبة التي تغطي جذر السن؟", ["الميناء", "الملاط", "العاج", "اللب"], 1, "الملاط (Cementum) يغطي جذر السن ويربط الألياف اللثوية.");
        addQ("أي الأعصاب التالية يعصب الأسنان السفلية؟", ["العصب تحت الحجاجي", "العصب السنخي السفلي", "العصب الوجني", "العصب اللساني"], 1, "العصب السنخي السفلي فرع من العصب الفكي السفلي.");
        addQ("أي من الآتي يعتبر سمة من سمات التسوس المبكر؟", ["بقعة بيضاء طباشيرية", "ثقب مسود", "تآكل كامل", "انحسار اللثة"], 0, "البداية المبكرة للتسوس تظهر كبقعة بيضاء (white spot).");
        addQ("ما هو الإجراء الأمثل لعلاج التهاب العصب السني (اللب) بشكل لا رجعة فيه؟", ["معالجة لبية (قناة الجذر)", "خلع السن", "فلورايد موضعي", "حشوة سطحية"], 0, "التهاب اللب غير الراجع يتطلب معالجة لبية.");
        addQ("أي نوع من الحشوات التجميلية يستخدم عادة في الأسنان الأمامية؟", ["أملغم", "الذهب", "الكومبوزيت الراتنجي", "الزركونيا فقط"], 2, "الكومبوزيت الراتنجي بلون الأسنان يستخدم بكثرة للترميمات التجميلية.");
        addQ("ما هو مرض اللثة الأكثر شيوعاً والذي يؤثر على الأنسجة الداعمة؟", ["التهاب اللثة", "التهاب دواعم السن", "تآكل المينا", "تكيس سني"], 1, "التهاب دواعم السن (Periodontitis) هو التهاب مزمن قد يؤدي لفقدان العظم.");
        addQ("أي الأسنان يمتلك أطول جذر بين الأسنان الدائمة؟", ["القاطعة العلوية", "الناب العلوي", "الضرس الأول العلوي", "الناب السفلي"], 1, "الناب العلوي له أطول جذر.");
        addQ("ما هي الأداة المستخدمة لقياس عمق جيب اللثة؟", ["مرآة الفم", "مسبار دواعم (periodontal probe)", "مشرط جراحي", "سنارة كشط"], 1, "مسبار دواعم السن ذو التدرج المليمتري يقيس عمق الجيوب.");
        addQ("أي نوع من الأشعة السينية يظهر الأسنان والفكين بشكل كامل؟", ["البانوراما (OPG)", "الأشعة المحيطية", "الأشعة الإطباقية", "CBCT"], 0, "الصورة البانورامية تعطي رؤية شاملة.");
        addQ("ما هو أول سن دائم يظهر في الفم عادةً؟", ["الضرس الأول الدائم", "القاطعة المركزية السفلية", "الناب الدائم", "الضرس الثاني الدائم"], 0, "الضرس الأول الدائم (سن الست سنوات) يبزغ في عمر 6 سنوات.");
        addQ("ما هي المادة الأكثر استخداماً في تبييض الأسنان عيادياً؟", ["بيروكسيد الهيدروجين", "فلوريد الصوديوم", "كلوروهكسيدين", "نترات البوتاسيوم"], 0, "بيروكسيد الهيدروجين أو كارباميد بيروكسيد هما المادتان الفعالتان.");
        addQ("أي من الآتي يعتبر من مضاعفات خلع ضرس العقل السفلي؟", ["تخدير شفة سفلية دائم", "تكون ورم", "تآكل المينا", "زيادة طول الجذر"], 0, "قرب الجذور من العصب السنخي السفلي قد يسبب تخديراً.");
        addQ("أي نوع من التقويم يستخدم لتوسيع الفك العلوي عند الأطفال؟", ["جهاز التوسع السريع (RPE)", "مصففات شفافة", "أقواس معدنية", "مثبتات ليلية"], 0, "جهاز توسع الفك السريع (RPE) يستخدم قبل التحام الدرز الحنكي.");
        addQ("ما هو العامل الرئيسي المسبب لتسوس الأسنان؟", ["السكريات واللويحة الجرثومية", "نقص الكالسيوم", "الوراثة فقط", "اللعاب الحمضي"], 0, "البكتيريا تحول السكريات إلى أحماض تزيل المعادن.");
        addQ("أي من الأدوية التالية يستخدم كمضاد حيوي وقائي قبل خلع الأسنان لمريض باضطراب صمامات القلب؟", ["أموكسيسيلين", "الباراسيتامول", "الإيبوبروفين", "الفلوكسيتين"], 0, "أموكسيسيلين هو المضاد الحيوي الموصى به للوقاية.");
        addQ("ما هي العلامة المميزة للكيس الجذري على الصورة الشعاعية؟", ["ظل شفاف دائري حول قمة الجذر", "تباين عظمي كثيف", "خطم عظمي", "تصلب عظمي منتشر"], 0, "الكيس الجذري يظهر كمنطقة شفافة للأشعة مستديرة.");
        addQ("أي سن يعد الأكثر شيوعاً للانطمار (عدم البزوغ الكامل) بعد ضرس العقل؟", ["الناب العلوي", "الضرس الأول السفلي", "القاطعة الجانبية العلوية", "الضرس الثاني السفلي"], 0, "الناب العلوي هو ثاني أكثر الأسنان انطماراً.");
        addQ("ما هو أنجح نوع من زراعة الأسنان (Implant) من حيث الاندماج العظمي؟", ["التيتانيوم", "الزركونيا", "الستانلس ستيل", "البورسلين"], 0, "التيتانيوم النقي تجارياً له قدرة عالية على الاندماج العظمي.");
        addQ("ما هو المؤشر الأكثر استخداماً لتقييم نظافة الفم؟", ["مؤشر اللويحة (Plaque Index)", "مؤشر اللثة النازفة", "مؤشر التسوس", "مؤشر الأسنان المتآكلة"], 0, "مؤشر اللويحة يقيس تراكم البلاك الجرثومي.");
        addQ("أي فيتامين يرتبط نقصه بمرض الإسقربوط الذي يسبب نزيف اللثة؟", ["فيتامين C", "فيتامين D", "فيتامين B12", "فيتامين A"], 0, "نقص فيتامين C يؤدي إلى ضعف الكولاجين ونزيف اللثة.");
        addQ("ما هو أنسب علاج لتآكل الأسنان الناتج عن الارتجاع المعدي المريئي؟", ["معالجة السبب واستخدام فلوريد واقٍ", "تبييض الأسنان", "تقويم الأسنان", "زراعة فورية"], 0, "يجب السيطرة على الارتجاع واستخدام فلورايد عالي.");
        addQ("ما هي أكثر الحالات شيوعاً لتطبيق البوتوكس في طب الأسنان؟", ["علاج صرير الأسنان (Bruxism)", "علاج التسوس", "تسكين آلام العصب", "تبييض اللثة"], 0, "البوتوكس في العضلة الماضغة يقلل من قوة العضلات ويخفف الألم.");
        addQ("أي من الآتي يعتبر من الخطوات الأساسية في معالجة قناة الجذر؟", ["التحضير والتطهير الميكانيكي", "تركيب الحشوة السطحية", "برد السن بشكل كامل", "وضع رباط مطاطي"], 0, "التحضير والتطهير هو جوهر المعالجة اللبية.");
        addQ("ما هو المصطلح الذي يصف تجمع الصديد حول قمة جذر السن؟", ["الخراج حول الذروي", "التهاب اللثة التقرحي", "التهاب العظم السنخي", "الورم الحبيبي"], 0, "الخراج حول الذروي هو تجمع صديد نتيجة التهاب لب السن.");
        addQ("أي نوع من الحشوات المؤقتة يستخدم غالباً بين جلسات المعالجة اللبية؟", ["Cavit", "الأسمنت الزنكي الفوسفاتي", "الأملغم", "الكومبوزيت"], 0, "Cavit مادة حشو مؤقتة محكمة الإغلاق.");
        addQ("أي سن في الفك العلوي يرتبط جذره ارتباطاً وثيقاً بالجيب الفكي العلوي؟", ["الضرس الأول والثاني العلوي", "القواطع", "الناب", "الضواحك"], 0, "جذور الأضراس العلوية مجاورة لقاع الجيب الفكي.");
        addQ("ما هو مرض الفم الذي يتميز بظهور بقع بيضاء شبكية على الغشاء المخاطي للخدين؟", ["الحزاز المسطح الفموي", "القلاع", "الطلاوة", "الهربس"], 0, "الحزاز المسطح يتميز بنمط شبكي أبيض (خطوط ويكهام).");
        addQ("أي تقنية تستخدم لإعادة ترميم الأسنان شديدة التآكل بتغطية كاملة؟", ["التيجان الكاملة (Full Crowns)", "الحشوات التجميلية", "القشور الخزفية", "الترميم اللاصق"], 0, "التيجان الكاملة تغطي السن بالكامل وتعطي القوة.");
        addQ("ما هو التأثير الجانبي الشائع لمادة الكلورهيكسيدين (غسول الفم)؟", ["تصبغ بني على الأسنان واللسان", "جفاف الفم الشديد", "تآكل المينا", "تسوس عكسي"], 0, "الاستخدام الطويل للكلورهيكسيدين يسبب تصبغات سطحية.");
        addQ("أي من الآتي يعد موانع استعمال لزراعة الأسنان الفورية؟", ["عدوى حادة أو التهاب عظم نشط", "عظم كثيف", "صحة فموية جيدة", "مدخن خفيف"], 0, "العدوى الحادة والتهاب العظم النشط موانع نسبية.");
        addQ("ما هي أكثر أنواع السرطانات شيوعاً في تجويف الفم؟", ["الورم الحرشفي الخلوي (SCC)", "سرطان الغدد اللمفاوية", "الورم الميلانيني", "الساركوما"], 0, "أكثر من 90% من سرطانات الفم هي سرطانة حرشفية الخلايا.");
        addQ("أي سن يشيع فيه حدوث كسر خط الوسط (Cracked tooth syndrome)؟", ["الضرس الأول السفلي", "القواطع العلوية", "الأنياب", "ضواحك الفك السفلي"], 0, "الأضراس السفلية هي الأكثر شيوعاً لمتلازمة السن المتشقق.");
        addQ("ما هو الإجراء الترميمي المفضل لاستعادة سن خضع لعلاج قناة جذر وخلفه ضعف جدار؟", ["وضع دعامة داخل القناة + تاج كامل", "حشوة مباشرة", "قشرة خزفية", "ترميم بلاصق"], 0, "الدعامة الداخلية ثم التاج الكامل يحمي السن من الكسر.");
        addQ("ما هو الميكروب الرئيسي المسؤول عن التهاب دواعم السن العدواني؟", ["Aggregatibacter actinomycetemcomitans", "المكورات العقدية الطافرة", "اللاكتوباسيلس", "المبيضات"], 0, "A. actinomycetemcomitans يرتبط بالتهاب دواعم السن العدواني.");
        addQ("أي من الآتي يستخدم لعلاج فرط الحساسية العاجية؟", ["معجون فلورايد و نترات البوتاسيوم", "التبييض المنزلي", "تقويم الأسنان", "قلع السن"], 0, "نترات البوتاسيوم تسد الأنابيب العاجية وتقلل الحساسية.");
        addQ("ما هو السن البديل الأكثر شيوعاً لاستبدال سن مفقود لدى المراهقين بعد الصدمة؟", ["الزرع التقليدي", "الجسر الثابت", "الطقم الجزئي المتحرك", "الحفاظ على المسافة"], 2, "الطقم الجزئي المتحرك المؤقت أو الحفاظ على المسافة مناسب قبل اكتمال النمو.");
        addQ("أي من الأعراض التالية نموذجية لالتهاب العظم السنخي (Dry socket) بعد الخلع؟", ["ألم شديد بعد 2-3 أيام مع رائحة كريهة", "نزيف فوري", "حمى شديدة", "تورم بسيط دون ألم"], 0, "السنخ الجاف يسبب ألماً شديداً بعد يومين.");
        // استكمال حتى 80 سؤالاً بإضافة 40 سؤالاً مختصراً (لضمان العدد)
        const extra = [
            ["ما هي العضة المتصالبة الأمامية؟",["انطباق الأسنان السفلية أمام العلوية","عضة عميقة","فراغات","ازدحام"],0,"عضة متصالبة أمامية: القواطع السفلية أمام العلوية."],
            ["أي جهاز يستخدم لتصحيح العضة المفتوحة بدفع اللسان؟",["شبك اللسان (Tongue crib)","هاي ريتينر","أقواس شفافة","مطاطات"],0,"شبك اللسان يمنع دفع اللسان."],
            ["ما هي مادة الفلورايد المهنية عالية التركيز؟",["ورنيش فلورايد 5%","جل 0.05%","معجون بدون فلورايد","سائل مبيض"],0,"ورنيش فلورايد 5% يستخدم كل 6 أشهر."],
            ["أي فئة عمرية أكثر عرضة لتسوس الرضاعة؟",["أطفال دون 3 سنوات يرضعون ليلاً","مراهقون","كبار السن","حوامل"],0,"التعرض المتكرر للسكريات ليلاً يسبب التسوس المبكر."],
            ["ما هو المرض الفموي الذي تسببه Treponema pallidum؟",["الزهري الفموي","السل","الهربس","المبيضات"],0,"الزهري الفموي يظهر كلطخات مخاطية."],
            ["أي دواء يسبب تضخم اللثة؟",["الفينيتوين","الباراسيتامول","الأسبرين","المضادات"],0,"الفينيتوين والنيفيديبين يسببان تضخماً دوائياً."],
            ["ما هو نوع السن المناسب للقشرة الخزفية (Veneer)؟",["الأمامية ذات التصبغات البسيطة","الخلفية المتآكلة","المتحركة","المخلوعة"],0,"القشور تستخدم للأسنان الأمامية الجمالية."],
            ["أي مخدر موضعي أطول مدة تخدير؟",["البوبيفاكايين","الليدوكايين","الميبيفاكايين","الارتيكايين"],0,"البوبيفاكايين يدوم 4-6 ساعات."],
            ["ما هو الفرق بين اللب الحي والميت تشخيصياً؟",["الاستجابة للباردة والحرارة","القرع","الصورة الشعاعية","لون السن"],0,"اختبار الحيوية يحدد إذا كان اللب حياً."],
            ["أي مواد الطبعة تعطي تفاصيل دقيقة تحت اللثة؟",["سيليكون الإضافة","الألجينات","البولي سلفايد","الجبس"],0,"سيليكون الإضافة دقة عالية وثبات أبعاد."],
            ["أفضل إجراء وقائي للأطفال عالي الخطورة؟",["فلورايد موضعي وسدادات شقوقية","غسول فلورايد","مضادات حيوية","فرشاة كهربائية"],0,"الفلورايد والسيلانت يقلل التسوس بنسبة كبيرة."],
            ["ما هي حالة الأسنان الخلقية الإضافية؟",["الفرط السني (Hyperdontia)","نقص الأسنان","الارتصاص","الازدحام"],0,"الفرط السني هو وجود أسنان زائدة."],
            ["أكثر عدوى فيروسية فموية شيوعاً؟",["الهربس البسيط HSV-1","HPV","EBV","CMV"],0,"HSV-1 يسبب التهاب اللثة الفيروسي."],
            ["الخط الأول لعلاج خراج الأسنان؟",["أموكسيسيلين","ميترونيدازول","كليندامايسين","أزيثروميسين"],0,"أموكسيسيلين 500mg هو الخط الأول."],
            ["مصطلح السن المنطمر (Impacted)؟",["سن لم يبزغ بالكامل بسبب عائق","سن مفقود خلقيًا","سن متآكل","سن مزدوج"],0,"السن المنطمر فشل في البزوغ."],
            ["أصلب نسيج في جسم الإنسان؟",["الميناء","العاج","الملاط","العظم السنخي"],0,"ميناء السن أصلب نسيج."],
            ["الفرق بين الجسر الثابت والجسر المتصل بالزرع؟",["الثابت يرتكز على أسنان مجاورة، والزرعي على غرسات","لا فرق","الثابت مؤقت","الثابت قابل للإزالة"],0,"الجسر التقليدي يستخدم الأسنان الداعمة."],
            ["الهدف الرئيسي من معجون الفلورايد اليومي؟",["إعادة تمعدن المينا","تبييض","تخدير","علاج رائحة"],0,"الفلورايد يعزز إعادة التمعدن."],
            ["عادة فموية تسبب بروز الأسنان الأمامية؟",["مص الإصبع","مضغ العلكة","خيط الأسنان","فرشاة عنيفة"],0,"مص الإصبع بعد 3-4 سنوات يسبب بروزاً."],
            ["مرض التهاب المفصل الصدغي الفكي (TMD)؟",["خلل في القرص وعضلات المضغ","التهاب لب","خراج حول اللوزة","التهاب جيوب"],0,"TMD يشمل اضطرابات المفصل والعضلات."]
        ];
        for(let ex of extra) { addQ(ex[0], ex[1], ex[2], ex[3]); }
        // التأكد من العدد 80
        while(questionsBank.length < 80) addQ("سؤال إضافي: ما هو العدد الطبيعي للأسنان الدائمة؟",["28","30","32","34"],2,"32 سناً.");
        if(questionsBank.length > 80) questionsBank.length = 80;

        // ---------- منطق الاختبار ----------
        let shuffledQuestions = [];
        let currentIndex = 0;
        let answerLock = false;
        let autoTimer = null;
        let quizActive = false;

        const coverScreen = document.getElementById('coverScreen');
        const quizScreen = document.getElementById('quizScreen');
        const startBtn = document.getElementById('startExamBtn');
        const questionNumberSpan = document.getElementById('questionNumber');
        const progressCounterSpan = document.getElementById('progressCounter');
        const questionTextDiv = document.getElementById('questionText');
        const optionsContainer = document.getElementById('optionsContainer');
        const explanationBox = document.getElementById('explanationBox');
        const autoNextMsgSpan = document.getElementById('autoNextMsg');

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function loadQuestion() {
            if (!quizActive) return;
            if (currentIndex >= shuffledQuestions.length) {
                finishQuiz();
                return;
            }
            answerLock = false;
            if (autoTimer) clearTimeout(autoTimer);
            autoNextMsgSpan.innerHTML = "";
            const q = shuffledQuestions[currentIndex];
            questionNumberSpan.innerText = `السؤال ${currentIndex+1}`;
            progressCounterSpan.innerText = `${currentIndex+1} / ${shuffledQuestions.length}`;
            questionTextDiv.innerText = q.text;
            optionsContainer.innerHTML = '';
            q.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = `${String.fromCharCode(65+idx)}- ${opt}`;
                btn.setAttribute('data-opt-index', idx);
                btn.addEventListener('click', () => handleAnswer(idx, btn));
                optionsContainer.appendChild(btn);
            });
            explanationBox.innerHTML = "✨ اختر إجابة ليظهر الشرح العلمي الدقيق.";
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.disabled = false;
                btn.classList.remove('correct-highlight', 'wrong-highlight');
            });
        }

        function handleAnswer(selectedIdx, clickedBtn) {
            if (answerLock || !quizActive) return;
            answerLock = true;
            const currentQ = shuffledQuestions[currentIndex];
            const isCorrect = (selectedIdx === currentQ.correct);
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach((btn, i) => {
                btn.disabled = true;
                if (i === currentQ.correct) btn.classList.add('correct-highlight');
                if (i === selectedIdx && !isCorrect) btn.classList.add('wrong-highlight');
            });
            if (isCorrect) clickedBtn.classList.add('correct-highlight');
            explanationBox.innerHTML = `📖 ${currentQ.explanation}`;
            autoNextMsgSpan.innerHTML = "⏳ سيتم الانتقال للسؤال التالي تلقائياً خلال 3 ثوانٍ...";
            autoTimer = setTimeout(() => {
                currentIndex++;
                loadQuestion();
            }, 3000);
        }

        function finishQuiz() {
            quizActive = false;
            if (autoTimer) clearTimeout(autoTimer);
            explanationBox.innerHTML = `🎉 انتهى الاختبار! لقد أتممت ${shuffledQuestions.length} سؤالاً. شكراً لاجتهادك! ✅`;
            optionsContainer.innerHTML = `<div style="grid-column:1/-1; text-align:center;"><button class="restart-btn" id="restartBtn">🔄 إعادة الاختبار من البداية</button></div>`;
            questionTextDiv.innerText = "🏆 تهانينا! لقد أكملت اختبار طبيب الأسنان بنجاح.";
            autoNextMsgSpan.innerHTML = "";
            const restartButton = document.getElementById('restartBtn');
            if (restartButton) restartButton.addEventListener('click', () => { initQuiz(); });
            document.querySelectorAll('.option-btn').forEach(btn => btn.remove());
        }

        function initQuiz() {
            shuffledQuestions = shuffleArray([...questionsBank]);
            currentIndex = 0;
            answerLock = false;
            if (autoTimer) clearTimeout(autoTimer);
            quizActive = true;
            loadQuestion();
        }

        // بدء الاختبار من زر الغلاف
        if (startBtn) {
            startBtn.addEventListener('click', () => {
                coverScreen.style.display = 'none';
                quizScreen.style.display = 'block';
                initQuiz();
            });
        }
    })();
</script>
</body>
</html>
