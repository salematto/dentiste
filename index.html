<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>امتحان طب الأسنان السريري</title>

<style>
body{
margin:0;
font-family:system-ui, Arial;
background:linear-gradient(135deg,#eef2ff,#f8fafc);
color:#0f172a;
}

header{
background:linear-gradient(90deg,#0f172a,#1e3a8a);
color:white;
padding:18px;
text-align:center;
font-size:20px;
font-weight:bold;
border-bottom:3px solid #06b6d4;
}

.container{max-width:850px;margin:auto;padding:22px;}

.card{
background:#fff;
padding:24px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
margin-top:15px;
}

.btn{
display:block;
width:100%;
margin:10px 0;
padding:14px;
border:none;
border-radius:10px;
background:#e2e8f0;
cursor:pointer;
font-size:15px;
}

.btn:hover{background:#cbd5e1;}

.explain{
margin-top:12px;
padding:12px;
background:#f1f5f9;
border-right:4px solid #06b6d4;
border-radius:10px;
}

.start,.restart{
padding:12px 16px;
border:none;
border-radius:10px;
background:#1e3a8a;
color:white;
cursor:pointer;
font-weight:bold;
}

footer{
text-align:center;
padding:18px;
font-size:12px;
color:#64748b;
}
</style>
</head>

<body>

<header>
🦷 امتحان طب الأسنان السريري
</header>

<div class="container">

<div id="start">
<button class="start" onclick="startExam()">ابدأ الامتحان</button>
</div>

<div id="exam" style="display:none;">

<div id="meta"></div>
<div id="question" class="card"></div>
<div id="answers"></div>
<div id="explain" class="explain" style="display:none;"></div>

</div>

<div id="result" style="display:none;"></div>

</div>

<footer>
تصميم وتطوير: د. زكريا عطوني
</footer>

<script>

/* =========================
   بنك الحالات (أساس ثابت)
========================= */

const baseCases = [
{
case:"ألم ليلي نابض مع تسوس عميق.",
q:"التشخيص؟",
o:["التهاب لب غير عكوس","التهاب لب عكوس","التهاب لثة","كسر سن"],
a:0,
e:"الألم الليلي يدل على التهاب لب غير عكوس"
},
{
case:"ألم بارد يزول بسرعة.",
q:"التشخيص؟",
o:["التهاب لب عكوس","تموت لبي","خراج","تآكل"],
a:0,
e:"ألم قصير = حالة عكوسة"
},
{
case:"تورم مع ناسور.",
q:"التشخيص؟",
o:["خراج مزمن","كيس","تسوس","حساسية"],
a:0,
e:"ناسور = خراج مزمن"
},
{
case:"ألم عند العض فقط.",
q:"التشخيص؟",
o:["كسر شعري","التهاب لب","تآكل","لثة"],
a:0,
e:"ألم عض = كسر شعري محتمل"
}
];

/* =========================
   بناء 120 حالة بدون خطأ
   + إصلاح مكان الإجابة الصحيحة
========================= */

let bank = [];

for(let i=0;i<120;i++){

let b = baseCases[i % baseCases.length];

// ننسخ الخيارات
let options = [...b.o];

// نحدد الإجابة الصحيحة
let correct = options[b.a];

// نخلط الخيارات
options.sort(() => Math.random() - 0.5);

// نعيد حساب مكان الإجابة الصحيحة بعد الخلط
let newIndex = options.indexOf(correct);

bank.push({
case: b.case + " (حالة " + (i+1) + ")",
q: b.q,
o: options,
a: newIndex,
e: b.e
});
}

let i=0,score=0;

function startExam(){
i=0;score=0;
document.getElementById("start").style.display="none";
document.getElementById("exam").style.display="block";
document.getElementById("result").style.display="none";
load();
}

function load(){
if(i>=bank.length){
end();return;
}

let q=bank[i];

document.getElementById("meta").innerHTML =
"الحالة " + (i+1) + " / 120 | النقاط: " + score;

document.getElementById("question").innerText =
q.case + "\n\n" + q.q;

let html="";
q.o.forEach((opt,idx)=>{
html += `<button class="btn" onclick="check(${idx})">${opt}</button>`;
});

document.getElementById("answers").innerHTML = html;
document.getElementById("explain").style.display="none";
}

function check(x){
let q=bank[i];
let buttons=document.querySelectorAll(".btn");

buttons.forEach((b,idx)=>{
b.disabled=true;

if(idx===q.a){
b.style.background="#22c55e";
b.style.color="white";
}

if(idx===x && x!==q.a){
b.style.background="#ef4444";
b.style.color="white";
}
});

document.getElementById("explain").innerText=q.e;
document.getElementById("explain").style.display="block";

if(x===q.a) score++;

setTimeout(()=>{i++;load();},1200);
}

function end(){
document.getElementById("exam").style.display="none";
document.getElementById("result").style.display="block";

document.getElementById("result").innerHTML=
`<div class="card">
<h2>انتهى الامتحان</h2>
<p>النتيجة: ${score} / 120</p>
<button class="restart" onclick="location.reload()">إعادة الامتحان</button>
</div>`;
}

</script>

</body>
</html>
