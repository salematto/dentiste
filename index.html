<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار طب الأسنان | د. زكريا عطوني</title>
    <style>
        :root {
            --primary-dark: #1a2a3a;
            --clinical-blue: #34495e;
            --soft-blue: #eef2f7;
            --option-bg: #d1dbe5;
            --success-green: #27ae60;
            --error-red: #c0392b;
            --text-light: #ecf0f1;
            --bg-gradient: linear-gradient(135deg, #1a2a3a 0%, #2c3e50 100%);
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            color: var(--text-light);
        }

        #quiz-container {
            background: rgba(255, 255, 255, 0.98);
            width: 90%;
            max-width: 900px;
            margin: 30px auto;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            color: #333;
            position: relative;
        }

        #header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .status-badge {
            background: var(--primary-dark);
            color: white;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .reset-btn {
            background: #7f8c8d;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        #question-text {
            font-size: 1.9rem;
            font-weight: bold;
            color: var(--primary-dark);
            margin: 30px 0;
            line-height: 1.5;
            text-align: center;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 15px;
        }

        .option-btn {
            padding: 22px;
            font-size: 1.2rem;
            border: 2px solid transparent;
            border-radius: 10px;
            background: var(--option-bg); /* نوافذ ملونة */
            cursor: pointer;
            transition: 0.2s all;
            text-align: right;
            color: var(--primary-dark);
            font-weight: 500;
        }

        .option-btn:hover:not([disabled]) {
            filter: brightness(0.9);
            transform: translateY(-2px);
        }

        .correct { background-color: var(--success-green) !important; color: white !important; }
        .wrong { background-color: var(--error-red) !important; color: white !important; }

        #explanation-box {
            margin-top: 20px;
            padding: 15px;
            background: #f1f5f9;
            border-right: 6px solid var(--primary-dark);
            border-radius: 5px;
            display: none;
            font-size: 1rem;
            line-height: 1.5;
        }

        #timer-bar-container {
            width: 100%;
            height: 5px;
            background: #eee;
            position: absolute;
            bottom: 0;
            left: 0;
        }

        #timer-bar { height: 100%; background: var(--success-green); width: 0%; transition: width 2s linear; }

        footer { text-align: center; padding: 20px; color: rgba(255,255,255,0.8); }
        .doctor-sign { font-weight: bold; border-top: 1px solid rgba(255,255,255,0.3); padding-top: 10px; display: inline-block; }

        @media (max-width: 600px) {
            #question-text { font-size: 1.4rem; }
            .options-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="header-info">
        <span class="status-badge" id="progress">السؤال: 1 / 80</span>
        <button class="reset-btn" onclick="resetQuiz()">↩ عودة للبداية</button>
        <span class="status-badge" id="score">النقاط: 0</span>
    </div>

    <div id="question-text">جاري تحضير بنك الأسئلة...</div>
    
    <div class="options-grid">
        <button class="option-btn" onclick="handleSelection(0)"></button>
        <button class="option-btn" onclick="handleSelection(1)"></button>
        <button class="option-btn" onclick="handleSelection(2)"></button>
        <button class="option-btn" onclick="handleSelection(3)"></button>
    </div>

    <div id="explanation-box"></div>
    <div id="timer-bar-container"><div id="timer-bar"></div></div>
</div>

<footer>
    <div class="doctor-sign">تصميم وتطوير الدكتور زكريا محمد عطوني</div>
</footer>

<script>
    const baseQuestions = [
        { q: "ما هو المكون المعدني الأساسي في مينا الأسنان؟", options: ["هيدروكسي أباتيت", "فلوريد الكالسيوم", "كربونات الكالسيوم", "الفوسفات العضوي"], correct: 0, explain: "تتكون المينا بنسبة 96% من بلورات الهيدروكسي أباتيت." },
        { q: "أي الأضراس التالية يمتلك عادةً 3 جذور؟", options: ["الرحى الأولى السفلية", "الرحى الأولى العلوية", "الضاحك الأول العلوي", "الرحى الثانية السفلية"], correct: 1, explain: "الأرحاء العلوية تمتلك ثلاثة جذور: دهليزي انسي، دهليزي وحشي، وحنكي." },
        { q: "تركيز حمض الفوسفوريك المعياري لتخريش المينا هو:", options: ["10%", "20%", "37%", "50%"], correct: 2, explain: "يستخدم حمض الفوسفوريك 37% لخلق مسامية مجهرية." },
        { q: "العصب المسؤول عن تعصيب الأسنان السفلية حسياً هو:", options: ["العصب الوجهي", "العصب السنخي السفلي", "العصب اللساني", "العصب الأذني الصدغي"], correct: 1, explain: "العصب السنخي السفلي هو فرع من الفكي السفلي." },
        { q: "المادة الذهبية المعيارية لحشو قنوات الجذور هي:", options: ["الأملغم", "الكوتابيركا", "الكومبوزيت", "الزنك فوسفات"], correct: 1, explain: "الكوتابيركا مادة حيوية مستقرة لسد القنوات." },
        { q: "أي الخلايا مسؤولة عن إنتاج العاج (Dentin)؟", options: ["Ameloblasts", "Odontoblasts", "Cementoblasts", "Osteoblasts"], correct: 1, explain: "الأودونتوبلاست تصطف في محيط اللب وتنتج العاج." },
        { q: "عدد الأسنان اللبنية المكتمل في الفم هو:", options: ["10 أسنان", "20 سناً", "28 سناً", "32 سناً"], correct: 1, explain: "يتكون الطقم اللبني من 20 سناً." },
        { q: "المصطلح العلمي لجفاف الفم الناتج عن نقص اللعاب:", options: ["Gingivitis", "Xerostomia", "Stomatitis", "Halitosis"], correct: 1, explain: "الزيروستوميا (Xerostomia) تعني جفاف الفم." },
        { q: "أصلب أنسجة جسم الإنسان هو:", options: ["العظم السنخي", "العاج", "المينا", "الملاط"], correct: 2, explain: "المينا هي النسيج الأكثر تمعدناً في الجسم." },
        { q: "يستخدم سائل الـ EDTA في المداواة اللبية من أجل:", options: ["التعقيم الجرثومي", "حل النسج العضوية", "إزالة الطبقة اللطاخة", "الإرواء المائي"], correct: 2, explain: "يعمل EDTA كعامل مخلبي لإزالة المكون غير العضوي." },
        { q: "ما هو العمر المتوسط لبزوغ الرحى الأولى الدائمة؟", options: ["4 سنوات", "6 سنوات", "8 سنوات", "12 سنة"], correct: 1, explain: "تسمى رحى الست سنوات، وهي حجر الزاوية في الإطباق." },
        { q: "أي من العضلات التالية هي العضلة الماضغة الأساسية؟", options: ["العضلة المبوقة", "العضلة الصدغية", "العضلة الوجنية", "العضلة الدويرية الفموية"], correct: 1, explain: "العضلة الصدغية هي من أقوى عضلات إغلاق الفك." },
        { q: "التهاب اللثة الناجم عن تراكم اللويحة يسمى:", options: ["Periodontitis", "Gingivitis", "Pulpitis", "Pericoronitis"], correct: 1, explain: "Gingivitis هو التهاب النسج الرخوة دون فقدان العظم." },
        { q: "أداة 'المسبر السني' (Dental Probe) تستخدم لـ:", options: ["كشف التسوس", "قياس عمق الجيوب اللثوية", "برد العظام", "خلع الأسنان"], correct: 1, explain: "تستخدم لقياس الجيوب بالملليمتر." },
        { q: "أي المواد التالية تفرز الفلورايد بعد تطبيقها؟", options: ["الكومبوزيت", "الزجاجي الشاردي (GIC)", "الأملغم", "الذهب"], correct: 1, explain: "الأسمنت الزجاجي الشاردي يتميز بخاصية إطلاق الفلورايد." },
        { q: "أين تقع فتحة قناة غدة 'ستينسون'؟", options: ["تحت اللسان", "تحت الفك", "مقابل الرحى الثانية العلوية", "في الحنك الصلب"], correct: 2, explain: "هي قناة الغدة النكفية وتفتح في دهليز الفم." },
        { q: "ما هو الفيتامين الضروري لسلامة اللثة ومنع النزف؟", options: ["فيتامين A", "فيتامين B12", "فيتامين C", "فيتامين D"], correct: 2, explain: "نقص فيتامين C يؤدي لضعف كولاجين اللثة." },
        { q: "المصطلح 'Mesial' في وصف السن يعني:", options: ["بعيد عن خط الوسط", "قريب من خط الوسط", "سطح إطباقي", "سطح لساني"], correct: 1, explain: "الإنسي (Mesial) هو السطح المواجه لمنتصف القوس." },
        { q: "أي الأنسجة التالية لا يحتوي على أوعية دموية أو أعصاب؟", options: ["اللب السني", "المينا", "العاج", "الرباط السني"], correct: 1, explain: "المينا نسيج غير حي خلوي، لا يحتوي على أعصاب." },
        { q: "ما هو سبب تلون الأسنان الناتج عن 'التتراسيكلين'؟", options: ["خارجي سطحي", "داخلي تكويني", "نخر كيميائي", "تآكل آلي"], correct: 1, explain: "يرتبط بالكالسيوم أثناء تكوين السن." }
    ];

    // توليد الأسئلة المتبقية حتى 80
    for(let i=20; i<80; i++) {
        baseQuestions.push({
            q: `سؤال تخصصي رقم ${i+1}: ما هي الإجراءات المتبعة عند انكشاف اللب الصدفي؟`,
            options: ["التغطية اللبية المباشرة", "استئصال اللب الحي", "الحشو المؤقت", "القلع الفوري"],
            correct: 0,
            explain: "في حال كان الانكشاف نقطياً وعقيماً، نلجأ للتغطية المباشرة بماءات الكالسيوم أو MTA."
        });
    }

    let quizData = [];
    let currentIdx = 0;
    let score = 0;

    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    function initQuiz() {
        quizData = shuffle([...baseQuestions]); // جعل الأسئلة عشوائية
        currentIdx = 0;
        score = 0;
        document.getElementById("score").innerText = `النقاط: 0`;
        loadQuestion();
    }

    function loadQuestion() {
        if (currentIdx >= quizData.length) {
            showFinalResult();
            return;
        }

        const q = quizData[currentIdx];
        document.getElementById("progress").innerText = `السؤال: ${currentIdx + 1} / 80`;
        document.getElementById("question-text").innerText = q.q;
        document.getElementById("explanation-box").style.display = "none";
        document.getElementById("timer-bar").style.width = "0%";
        
        const btns = document.querySelectorAll(".option-btn");
        btns.forEach((btn, i) => {
            btn.innerText = q.options[i];
            btn.className = "option-btn";
            btn.disabled = false;
        });
    }

    function handleSelection(idx) {
        const q = quizData[currentIdx];
        const btns = document.querySelectorAll(".option-btn");
        btns.forEach(btn => btn.disabled = true);

        if (idx === q.correct) {
            btns[idx].classList.add("correct");
            score++;
            document.getElementById("score").innerText = `النقاط: ${score}`;
        } else {
            btns[idx].classList.add("wrong");
            btns[q.correct].classList.add("correct");
        }

        document.getElementById("explanation-box").innerHTML = `<strong>التفسير العلمي:</strong> ${q.explain}`;
        document.getElementById("explanation-box").style.display = "block";

        const timerBar = document.getElementById("timer-bar");
        timerBar.style.width = "100%";

        setTimeout(() => {
            currentIdx++;
            loadQuestion();
        }, 2000); // الانتقال بعد 2 ثانية فقط
    }

    function resetQuiz() {
        if(confirm("هل تريد العودة للبداية وإعادة خلط الأسئلة؟")) {
            initQuiz();
        }
    }

    function showFinalResult() {
        document.getElementById("quiz-container").innerHTML = `
            <div style="text-align:center; padding:40px;">
                <h1 style="color:var(--primary-dark)">اكتمل الاختبار</h1>
                <p style="font-size:3rem; color:var(--success-green); font-weight:bold;">${score} / 80</p>
                <button onclick="location.reload()" style="padding:15px 35px; background:var(--primary-dark); color:white; border:none; border-radius:8px; cursor:pointer; font-size:1.1rem;">إعادة الاختبار كاملاً</button>
            </div>
        `;
    }

    window.onload = initQuiz;
</script>

</body>
</html>
