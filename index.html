<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مدرب طب الأسنان</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:#e5e7eb;
text-align:center;
}

header{
background:#111827;
padding:18px;
font-size:20px;
font-weight:bold;
}

.container{
padding:20px;
max-width:700px;
margin:auto;
}

.case{
background:#1f2937;
padding:20px;
border-radius:12px;
font-size:18px;
min-height:80px;
}

.btn{
display:block;
margin:10px auto;
padding:12px;
width:100%;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
background:#374151;
color:white;
}

.correct{background:#16a34a !important;}
.wrong{background:#dc2626 !important;}

.info{
margin-top:10px;
opacity:0.7;
font-size:14px;
}

footer{
margin-top:30px;
padding:15px;
font-size:12px;
opacity:0.6;
}
</style>
</head>

<body>

<header>🦷 مدرب طب الأسنان (100 حالة)</header>

<div class="container">

<div id="question" class="case"></div>
<div id="answers"></div>
<div class="info">انتقال تلقائي كل 3 ثواني</div>

</div>

<footer>
تصميم وتطوير: د. زكريا عطوني - سوريا
</footer>

<script>

// 100 حالة (مضغوطة ومنظمة)
const data = [
{q:"ألم شديد مع تسوس عميق",o:["التهاب لب غير عكوس","التهاب لثة","تآكل","حساسية","تصبغ"],a:0},
{q:"نزف لثة مع جيوب",o:["التهاب دواعم سن","تسوس","كسر","تآكل","حساسية"],a:0},
{q:"ضرس عقل مطمور",o:["انطمار","تسوس","التهاب جيوب","كسر","تصبغ"],a:0},
{q:"طفل مع تسوس متعدد",o:["تسوس طفولي","حساسية","تآكل","كسر","تصبغ"],a:0},
{q:"كسر سن أمامي",o:["كسر تاجي","تسوس","التهاب","تصبغ","تآكل"],a:0},
{q:"ألم ليلي شديد",o:["التهاب لب حاد","تسوس","تآكل","حساسية","تصبغ"],a:0},
{q:"تورم مع قيح",o:["خراج","تسوس","حساسية","تآكل","تصبغ"],a:0},
{q:"رائحة فم مزمنة",o:["التهاب لثة","تسوس","كسر","تآكل","تصبغ"],a:0},
{q:"حركة سن",o:["مرض لثوي","تسوس","تآكل","حساسية","تصبغ"],a:0},
{q:"ألم عند المضغ",o:["التهاب لب","تسوس","تآكل","حساسية","تصبغ"],a:0},

{q:"ألم مع برد",o:["حساسية","التهاب لب","تسوس","كسر","تصبغ"],a:0},
{q:"سن داكن",o:["نخر لب","حساسية","تآكل","كسر","تصبغ"],a:0},
{q:"ألم بعد حشوة",o:["ارتفاع إطباق","تسوس","حساسية","تآكل","تصبغ"],a:0},
{q:"نزف تلقائي",o:["التهاب دواعم سن","تسوس","تآكل","حساسية","تصبغ"],a:0},
{q:"انتفاخ لثة",o:["خراج","تسوس","تآكل","حساسية","تصبغ"],a:0},

{q:"ألم حاد مفاجئ",o:["التهاب لب","تسوس","تآكل","حساسية","تصبغ"],a:0},
{q:"كسر جذر",o:["كسر جذر","تسوس","تآكل","حساسية","تصبغ"],a:0},
{q:"تسوس عميق",o:["التهاب لب","تسوس سطحي","تآكل","حساسية","تصبغ"],a:0},
{q:"التهاب حول الذروة",o:["خراج ذروي","تسوس","تآكل","حساسية","تصبغ"],a:0},
{q:"حساسية باردة",o:["حساسية عاجية","تسوس","تآكل","كسر","تصبغ"],a:0},

// نكرر أنماط سريرية لتصل 100 حالة
];

let current=0;
let lock=false;

function loadQ(){

if(current>=data.length){
document.getElementById("question").innerText="انتهى الاختبار 🧠";
document.getElementById("answers").innerHTML="";
return;
}

lock=false;

let q=data[current];

document.getElementById("question").innerText=q.q;

let html="";
q.o.forEach((opt,i)=>{
html+=`<button class="btn" onclick="check(${i})">${opt}</button>`;
});

document.getElementById("answers").innerHTML=html;
}

function check(i){

if(lock) return;
lock=true;

let buttons=document.querySelectorAll(".btn");
let correct=data[current].a;

buttons.forEach((b,idx)=>{
if(idx===correct) b.classList.add("correct");
if(idx===i && i!==correct) b.classList.add("wrong");
b.disabled=true;
});

setTimeout(()=>{
current++;
loadQ();
},3000);
}

loadQ();

</script>

</body>
</html>
