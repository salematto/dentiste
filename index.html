<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dental Clinical Exam</title>

<style>
body{margin:0;font-family:system-ui;background:#0b1220;color:#fff}
header{background:#0f172a;padding:16px;text-align:center;border-bottom:3px solid #facc15;font-weight:bold}
.container{max-width:900px;margin:auto;padding:20px}

.card{
background:#111827;
padding:18px;
border-radius:14px;
margin-top:10px;
border-left:4px solid #38bdf8;
}

.btn{
display:block;
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
background:#1f2937;
color:white;
cursor:pointer;
transition:.2s;
}

.btn:hover{background:#334155}

.correct{background:#16a34a !important}
.wrong{background:#dc2626 !important}

.meta{
display:flex;
justify-content:space-between;
color:#93c5fd;
font-size:13px;
}

.explanation{
margin-top:10px;
padding:12px;
border-radius:10px;
background:#0f172a;
border-left:4px solid #facc15;
color:#e2e8f0;
font-size:14px;
}

footer{
text-align:center;
padding:12px;
color:#64748b;
font-size:12px;
}
</style>
</head>

<body>

<header>🦷 Clinical Dental Exam</header>

<div class="container">

<div id="start">
<button class="btn" onclick="startExam()">ابدأ الامتحان</button>
</div>

<div id="exam" style="display:none">

<div class="meta">
<span id="progress"></span>
<span id="score"></span>
</div>

<div id="question" class="card"></div>
<div id="answers"></div>
<div id="explanation"></div>

</div>

<div id="result" style="display:none"></div>

</div>

<footer>تصميم وتطوير د. زكريا محمد عطوني</footer>

<script>

/* 🔴 بنك ثابت بدون توليد */
const bank = [

/* Endo */
{q:"ألم ليلي نابض يستمر بعد البارد",o:["التهاب لب غير عكوس","حساسية","لب عكوس","كسر"],a:0,e:"استمرار الألم = irreversible pulpitis"},
{q:"ألم بارد لحظي يزول سريعًا",o:["حساسية عاجية","التهاب لب","خراج","كيس"],a:0,e:"استجابة قصيرة = حساسية"},
{q:"سن متغير اللون بعد رض",o:["تموت لبي","تسوس","كسر","لثة"],a:0,e:"الرض يؤدي لنخر اللب"},
{q:"ألم عند العض فقط",o:["كسر سن","تسوس","تصبغ","لثة"],a:0,e:"ألم الضغط = crack"},
{q:"ألم تلقائي بدون محفز",o:["التهاب لب غير عكوس","تسوس سطحي","لثة","تصبغ"],a:0,e:"spontaneous pain = pulpitis"},

/* Perio */
{q:"نزف لثوي مع لويحة",o:["التهاب لثة","التهاب دواعم","كيس","كسر"],a:0,e:"gingivitis plaque induced"},
{q:"جيوب 6 ملم مع فقدان عظم",o:["التهاب دواعم","تسوس","كسر","حساسية"],a:0,e:"periodontitis"},
{q:"رائحة فم مزمنة",o:["مرض لثوي","تسوس","كسر","تآكل"],a:0,e:"common perio cause"},
{q:"انحسار لثوي مع حساسية",o:["انحسار لثة","تسوس","كسر","ورم"],a:0,e:"root exposure"},
{q:"حركة سنية متزايدة",o:["فقدان دعم عظمي","تسوس","كسر","تصبغ"],a:0,e:"mobility due to bone loss"},

/* Surgery */
{q:"تورم حاد مؤلم مع حرارة",o:["خراج حاد","كيس","ورم","تآكل"],a:0,e:"acute abscess"},
{q:"تورم بطيء غير مؤلم",o:["كيس","خراج","تسوس","لثة"],a:0,e:"cyst"},
{q:"ألم بعد قلع مع عظم مكشوف",o:["Dry socket","كيس","خراج","تآكل"],a:0,e:"alveolar osteitis"},
{q:"صعوبة فتح الفم مع ضرس عقل",o:["Pericoronitis","كسر","تسوس","تآكل"],a:0,e:"التهاب حول التاج"},
{q:"تورم منتشر بدون تحديد",o:["Cellulitis","كيس","تسوس","لثة"],a:0,e:"انتشار الالتهاب"},

/* Pedo */
{q:"تسوس متعدد في طفل صغير",o:["Early childhood caries","تآكل","كسر","تصبغ"],a:0,e:"ECC"},
{q:"طفل غير متعاون",o:["إدارة سلوكية","خلع","تأجيل","تخدير"],a:0,e:"behavior management first"},
{q:"ألم عند تناول السكريات",o:["تسوس","كسر","لثة","تصبغ"],a:0,e:"caries"},
{q:"بقع بيضاء طباشيرية",o:["نزع تمعدن","تسوس عميق","كسر","تآكل"],a:0,e:"early lesion"},
{q:"نخر سريع للأسنان اللبنية",o:["ECC","تآكل","كسر","تصبغ"],a:0,e:"rapid caries"},

/* Prostho */
{q:"سقوط تاج متكرر",o:["فشل إسمنتي","تسوس","كسر","لثة"],a:0,e:"cement failure"},
{q:"ألم تحت جسر ثابت",o:["تسوس ثانوي","لثة","كسر","تآكل"],a:0,e:"secondary caries"},
{q:"عدم ثبات طقم كامل",o:["ضعف ارتكاز","كسر","تسوس","لثة"],a:0,e:"retention issue"},
{q:"تقرحات تحت طقم",o:["ضغط زائد","كسر","تآكل","تسوس"],a:0,e:"trauma"},
{q:"فراغات بعد تعويض",o:["سوء تصميم","كسر","تآكل","لثة"],a:0,e:"design flaw"}

];

/* 🟢 خلط الخيارات داخل كل سؤال */
function shuffleOptions(q){
let opts = q.o.map((text,i)=>({text,correct:i===q.a}));
for(let i=opts.length-1;i>0;i--){
let j=Math.random()*(i+1)|0;
[opts[i],opts[j]]=[opts[j],opts[i]];
}
return opts;
}

/* ENGINE */
let exam=[],i=0,score=0;

function startExam(){
i=0;score=0;
exam=[...bank];

document.getElementById("start").style.display="none";
document.getElementById("exam").style.display="block";

load();
}

function load(){

if(i>=exam.length){
document.getElementById("exam").style.display="none";
document.getElementById("result").style.display="block";

document.getElementById("result").innerHTML=
`<div class="card">النتيجة: ${score}/${exam.length}<br>
<button class="btn" onclick="location.reload()">إعادة</button></div>`;
return;
}

let q=exam[i];
let shuffled=shuffleOptions(q);

document.getElementById("progress").innerText=`${i+1}/${exam.length}`;
document.getElementById("score").innerText=`${score}`;

document.getElementById("question").innerText=q.q;
document.getElementById("explanation").innerHTML="";

let html="";
shuffled.forEach((opt,idx)=>{
html+=`<button class="btn" onclick="check(${idx})">${opt.text}</button>`;
});

document.getElementById("answers").innerHTML=html;

/* حفظ الإجابة الصحيحة */
window.currentAnswer = shuffled.findIndex(x=>x.correct);
window.currentExplain = q.e;
}

function check(x){

let buttons=document.querySelectorAll(".btn");

buttons.forEach(b=>b.disabled=true);

buttons[window.currentAnswer].classList.add("correct");
if(x!==window.currentAnswer)buttons[x].classList.add("wrong");

document.getElementById("explanation").innerHTML=
`<div class="explanation">${window.currentExplain}</div>`;

if(x===window.currentAnswer)score++;

setTimeout(()=>{i++;load();},1200);
}

</script>

</body>
</html>
