<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinical Dental Exam - Valid Core</title>

<style>
body{margin:0;font-family:system-ui;background:#0b1220;color:#fff}
header{background:#0f172a;padding:16px;text-align:center;border-bottom:3px solid #facc15;font-weight:bold}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:#111827;padding:18px;border-radius:14px;margin-top:10px;border-left:4px solid #38bdf8}
.btn{display:block;width:100%;padding:12px;margin:8px 0;border:none;border-radius:10px;background:#1f2937;color:white;cursor:pointer}
.correct{background:#16a34a !important}
.wrong{background:#dc2626 !important}
.meta{display:flex;justify-content:space-between;color:#93c5fd;font-size:13px}
.explanation{margin-top:10px;padding:12px;border-radius:10px;background:#0f172a;border-left:4px solid #facc15;color:#e2e8f0;font-size:14px}
</style>
</head>

<body>

<header>🦷 Clinical Dental Exam (Validated Core)</header>

<div class="container">

<div id="start">
<button class="btn" onclick="startExam()">ابدأ</button>
</div>

<div id="exam" style="display:none">

<div class="meta">
<span id="progress"></span>
<span id="score"></span>
</div>

<div id="question" class="card"></div>
<div id="answers"></div>
<div id="explanation"></div>

</div>

<div id="result" style="display:none"></div>

</div>

<script>

/* 🔴 حالات سريرية دقيقة */
const bank = [

{
q:"مريض يشكو من ألم شديد نابض يوقظه ليلاً، يستمر بعد إزالة البارد، ويخف قليلاً بالمسكنات",
o:[
"التهاب لب غير عكوس عرضي",
"التهاب لب عكوس",
"تموت لبي",
"خراج ذروي مزمن"
],
a:0,
e:"الألم الليلي المستمر بعد إزالة المنبه سمة irreversible pulpitis"
},

{
q:"ألم حاد سريع عند البارد يزول فوراً بدون ألم عفوي",
o:[
"حساسية عاجية",
"التهاب لب غير عكوس",
"تموت لبي",
"خراج ذروي حاد"
],
a:0,
e:"استجابة قصيرة وغير عفوية → dentin hypersensitivity"
},

{
q:"سن لا يستجيب لاختبار الحيوية مع وجود آفة شفافة ذروياً شعاعياً",
o:[
"تموت لبي مع آفة ذروية",
"التهاب لب عكوس",
"حساسية",
"كسر تاجي"
],
a:0,
e:"عدم الاستجابة + آفة شعاعية → necrotic pulp + apical lesion"
},

{
q:"ألم عند العض يزداد عند تحرير الضغط (release pain)",
o:[
"Cracked tooth syndrome",
"التهاب لثة",
"تسوس سطحي",
"حساسية"
],
a:0,
e:"الألم عند التحرير علامة مميزة للكسر الشعري"
},

{
q:"نزف لثوي مع لويحة دون فقدان عظم شعاعياً",
o:[
"التهاب لثة",
"التهاب دواعم",
"خراج",
"كيس"
],
a:0,
e:"gingivitis لا يظهر فقدان عظم"
},

{
q:"جيوب عميقة + فقدان عظم شعاعي",
o:[
"التهاب دواعم السن",
"التهاب لثة",
"تسوس",
"حساسية"
],
a:0,
e:"periodontitis يتميز بفقدان دعم عظمي"
},

{
q:"تورم حاد مؤلم مع حرارة وارتفاع سن",
o:[
"خراج ذروي حاد",
"كيس جذري",
"ورم حميد",
"تآكل"
],
a:0,
e:"acute apical abscess"
},

{
q:"تورم بطيء غير مؤلم مع حدود واضحة شعاعياً",
o:[
"كيس جذري",
"خراج حاد",
"تسوس",
"لثة"
],
a:0,
e:"cystic lesion"
},

{
q:"ألم شديد بعد القلع مع غياب الخثرة",
o:[
"Dry socket",
"خراج",
"كيس",
"التهاب لثة"
],
a:0,
e:"alveolar osteitis"
},

{
q:"صعوبة فتح الفم مع التهاب حول ضرس عقل جزئي البزوغ",
o:[
"Pericoronitis",
"كسر",
"تسوس",
"حساسية"
],
a:0,
e:"التهاب حول التاج"
},

{
q:"تسوس متعدد سريع في طفل يستخدم الرضاعة الليلية",
o:[
"Early childhood caries",
"تآكل",
"كسر",
"تصبغ"
],
a:0,
e:"نمط ECC"
},

{
q:"ألم عند المضغ تحت تاج قديم مع تسوس ثانوي",
o:[
"تسوس ثانوي",
"التهاب لثة",
"كسر",
"تآكل"
],
a:0,
e:"secondary caries under crown"
},

{
q:"سن حي مع ألم قصير للبارد دون ألم عفوي",
o:[
"التهاب لب عكوس",
"تموت لبي",
"خراج",
"كسر"
],
a:0,
e:"reversible pulpitis"
},

{
q:"سن غير مؤلم لكن متغير اللون ولا يستجيب لاختبار الحيوية",
o:[
"تموت لبي",
"التهاب لب",
"حساسية",
"لثة"
],
a:0,
e:"necrosis without pain"
},

{
q:"حركة سنية متزايدة مع فقدان عظم",
o:[
"التهاب دواعم متقدم",
"تسوس",
"كسر",
"تصبغ"
],
a:0,
e:"mobility due to bone loss"
}

];

/* خلط الخيارات */
function shuffle(q){
let arr=q.o.map((t,i)=>({t,correct:i===q.a}));
for(let i=arr.length-1;i>0;i--){
let j=Math.random()*(i+1)|0;
[arr[i],arr[j]]=[arr[j],arr[i]];
}
return arr;
}

let i=0,score=0;

function startExam(){
i=0;score=0;
document.getElementById("start").style.display="none";
document.getElementById("exam").style.display="block";
load();
}

function load(){

if(i>=bank.length){
document.getElementById("exam").style.display="none";
document.getElementById("result").style.display="block";

document.getElementById("result").innerHTML=
`<div class="card">النتيجة ${score}/${bank.length}<br>
<button class="btn" onclick="location.reload()">إعادة</button></div>`;
return;
}

let q=bank[i];
let s=shuffle(q);

document.getElementById("progress").innerText=`${i+1}/${bank.length}`;
document.getElementById("score").innerText=`${score}`;
document.getElementById("question").innerText=q.q;
document.getElementById("explanation").innerHTML="";

let html="";
s.forEach((o,idx)=>{
html+=`<button class="btn" onclick="check(${idx})">${o.t}</button>`;
});

document.getElementById("answers").innerHTML=html;

window.correctIndex=s.findIndex(x=>x.correct);
window.exp=q.e;
}

function check(x){

let btns=document.querySelectorAll(".btn");
btns.forEach(b=>b.disabled=true);

btns[window.correctIndex].classList.add("correct");
if(x!==window.correctIndex)btns[x].classList.add("wrong");

document.getElementById("explanation").innerHTML=
`<div class="explanation">${window.exp}</div>`;

if(x===window.correctIndex)score++;

setTimeout(()=>{i++;load();},1500);
}

</script>

</body>
</html>
