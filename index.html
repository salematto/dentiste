<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dental Clinical Exam Pro</title>

<style>
body{margin:0;font-family:system-ui;background:#0b1220;color:#fff}

/* Header */
header{
background:linear-gradient(90deg,#0f172a,#1e293b);
padding:18px;
text-align:center;
border-bottom:3px solid #38bdf8;
font-size:18px;
font-weight:bold
}

/* Layout */
.container{max-width:900px;margin:auto;padding:20px}

/* Card */
.card{
background:#111827;
padding:18px;
border-radius:14px;
margin-top:10px;
border-left:4px solid #38bdf8
}

/* Buttons */
.btn{
display:block;width:100%;
padding:12px;margin:6px 0;
border:none;border-radius:10px;
background:#1f2937;color:white;cursor:pointer
}
.correct{background:#16a34a !important}
.wrong{background:#dc2626 !important}

/* Meta */
.meta{
display:flex;justify-content:space-between;
color:#93c5fd;font-size:13px
}

/* Progress bar */
.progress-bar{
height:6px;
background:#1f2937;
border-radius:10px;
margin-top:10px;
overflow:hidden
}
.progress{
height:100%;
background:#38bdf8;
width:0%
}

/* Explanation */
.explanation{
margin-top:10px;
background:#0f172a;
padding:12px;
border-radius:10px;
border-left:4px solid #facc15
}

/* Footer */
footer{
text-align:center;
padding:14px;
color:#64748b;
font-size:13px;
border-top:1px solid #1f2937;
margin-top:20px
}
</style>
</head>

<body>

<header>
🦷 Dental Clinical Exam Pro  
<br><small style="color:#94a3b8">نظام تدريب سريري تفاعلي</small>
</header>

<div class="container">

<div id="start">
<button class="btn" onclick="startExam()">ابدأ الامتحان</button>
</div>

<div id="exam" style="display:none">

<div class="meta">
<span id="progressText"></span>
<span id="score"></span>
</div>

<div class="progress-bar">
<div id="progressBar" class="progress"></div>
</div>

<div id="question" class="card"></div>
<div id="answers"></div>
<div id="explanation"></div>

<button class="btn" onclick="restartExam()">🔄 إعادة من البداية</button>

</div>

<div id="result"></div>

</div>

<footer>
تصميم وتطوير د. زكريا محمد عطوني  
<br>Dental AI Training System
</footer>

<script>

/* ⚠️ نفس البنك السابق بدون أي تعديل */
const bank = [...bank || []]; 
/* ملاحظة: اترك بنكك كما هو — لا تغيره */

/* نفس الدوال بدون تغيير */
function shuffle(q){
let arr=q.o.map((t,i)=>({t,correct:i===q.a}));
for(let i=arr.length-1;i>0;i--){
let j=Math.random()*(i+1)|0;
[arr[i],arr[j]]=[arr[j],arr[i]];
}
return arr;
}

let index=0,score=0,currentOptions=[];

function startExam(){
index=0;score=0;
document.getElementById("start").style.display="none";
document.getElementById("exam").style.display="block";
load();
}

function restartExam(){
index=0;score=0;
load();
}

function load(){

if(index>=bank.length){
document.getElementById("exam").style.display="none";
document.getElementById("result").innerHTML=
`<div class="card">النتيجة ${score}/${bank.length}
<br><button class="btn" onclick="location.reload()">إعادة</button></div>`;
return;
}

let q=bank[index];
currentOptions=shuffle(q);

/* تحديث النص */
document.getElementById("progressText").innerText=`${index+1}/${bank.length}`;
document.getElementById("score").innerText=score;

/* تحديث الشريط */
let percent = ((index)/bank.length)*100;
document.getElementById("progressBar").style.width = percent + "%";

document.getElementById("question").innerText=q.q;
document.getElementById("explanation").innerHTML="";

let html="";
currentOptions.forEach((opt,i)=>{
html+=`<button class="btn" onclick="check(${i})">${opt.t}</button>`;
});

document.getElementById("answers").innerHTML=html;
}

function check(i){

let buttons=document.getElementById("answers").querySelectorAll(".btn");
let correctIndex=currentOptions.findIndex(x=>x.correct);

buttons[correctIndex].classList.add("correct");
if(i!==correctIndex)buttons[i].classList.add("wrong");

buttons.forEach(b=>b.disabled=true);

document.getElementById("explanation").innerHTML=
`<div class="explanation">${bank[index].e}</div>`;

if(i===correctIndex) score++;

setTimeout(()=>{index++;load();},1200);
}

</script>

</body>
</html>
