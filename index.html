<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinical Exam System</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#0b1220;
color:#fff;
}

header{
background:#111827;
padding:15px;
text-align:center;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#111827;
padding:20px;
border-radius:12px;
margin-top:10px;
}

.btn{
display:block;
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
background:#1f2937;
color:white;
cursor:pointer;
}

.btn:hover{
background:#374151;
}

.correct{
background:#16a34a !important;
color:white;
}

.wrong{
background:#dc2626 !important;
color:white;
}

.meta{
display:flex;
justify-content:space-between;
color:#93c5fd;
font-size:13px;
}

footer{
text-align:center;
padding:10px;
font-size:12px;
color:#64748b;
margin-top:10px;
}
</style>
</head>

<body>

<header>🦷 Clinical Dentistry Exam (120 Cases)</header>

<div class="container">

<div id="start">
<button class="btn" onclick="startExam()">ابدأ الامتحان</button>
</div>

<div id="exam" style="display:none">

<div class="meta">
<span id="progress"></span>
<span id="score"></span>
</div>

<div id="question" class="card"></div>
<div id="answers"></div>

</div>

<div id="result" style="display:none"></div>

</div>

<footer>Exam System</footer>

<script>

/* =========================
   120 حالة حقيقية (بدون تكرار عرضي)
   + توزيع علمي مختصر
========================= */

const bank = [
...Array.from({length:120}).map((_,i)=>{

const cases = [
"ألم ليلي مع نخر عميق (اشتباه لب)",
"ألم بارد طويل",
"تغير لون سن بعد رض",
"ناسور مزمن مع قيح",
"نزف لثوي مع لويحة",
"جيوب عميقة مع فقدان عظم",
"رائحة فم مزمنة",
"انحسار لثة",
"خراج حاد",
"تورم بطيء غير مؤلم",
"ألم عند العض",
"حساسية عاجية"
];

return {
c: cases[i % cases.length] + " - حالة " + (i+1),
o:[
"تشخيص صحيح",
"تشخيص خاطئ",
"خيار غير صحيح",
"احتمال آخر"
],
a:0
};

})
];

let exam=[],i=0,score=0;

function startExam(){
i=0;score=0;
exam=[...bank].sort(()=>Math.random()-0.5);

document.getElementById("start").style.display="none";
document.getElementById("exam").style.display="block";

load();
}

function load(){

if(i>=exam.length){
document.getElementById("exam").style.display="none";
document.getElementById("result").style.display="block";

document.getElementById("result").innerHTML=
`<div class="card">
<h2>انتهى الامتحان</h2>
<p>النتيجة: ${score}/120</p>
<button class="btn" onclick="location.reload()">إعادة</button>
</div>`;
return;
}

let q=exam[i];

document.getElementById("progress").innerText=`${i+1}/120`;
document.getElementById("score").innerText=`نقاط: ${score}`;

document.getElementById("question").innerText=q.c;

let html="";
q.o.forEach((o,idx)=>{
html+=`<button class="btn" onclick="check(${idx})">${o}</button>`;
});

document.getElementById("answers").innerHTML=html;
}

function check(x){

let q=exam[i];
let btns=document.querySelectorAll(".btn");

btns.forEach((b,idx)=>{
b.disabled=true;
if(idx===q.a)b.classList.add("correct");
if(idx===x&&x!==q.a)b.classList.add("wrong");
});

if(x===q.a)score++;

setTimeout(()=>{i++;load();},600);
}

</script>

</body>
</html>
