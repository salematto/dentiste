<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق اختبار طب الأسنان - د. زكريا عطوني</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --light: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ecf0f1;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 95%;
            max-width: 900px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        /* صفحة الغلاف */
        .logo { font-size: 80px; margin-bottom: 20px; }
        h1 { color: var(--primary); font-size: 32px; margin-bottom: 10px; }
        .subtitle { color: #7f8c8d; font-size: 18px; margin-bottom: 30px; }
        
        .start-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 15px 60px;
            font-size: 22px;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }

        .start-btn:hover { transform: scale(1.05); background: #2980b9; }

        /* منطقة الأسئلة */
        #quiz-area { display: none; }
        .q-header { display: flex; justify-content: space-between; margin-bottom: 25px; color: var(--accent); font-weight: bold; font-size: 18px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        .question-text {
            font-size: 30px; /* خط كبير جداً للسؤال */
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 35px;
            line-height: 1.5;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .option-btn {
            padding: 25px;
            font-size: 20px;
            border: 2px solid #dee2e6;
            border-radius: 15px;
            background: white;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
        }

        .option-btn:hover:not([disabled]) { border-color: var(--accent); background: #f0faff; transform: translateY(-3px); }
        
        .correct { background-color: var(--success) !important; color: white; border-color: #1e8449 !important; }
        .wrong { background-color: var(--danger) !important; color: white; border-color: #b03a2e !important; }

        .explanation {
            margin-top: 30px;
            padding: 25px;
            background: #e8f4fd;
            border-right: 8px solid var(--accent);
            text-align: right;
            display: none;
            border-radius: 0 10px 10px 0;
        }

        .next-btn {
            margin-top: 20px;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
        }

        footer {
            margin-top: 50px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #7f8c8d;
            font-size: 16px;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .options-grid { grid-template-columns: 1fr; }
            .question-text { font-size: 22px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="cover">
        <div class="logo">🦷</div>
        <h1>تطبيق بنك أسئلة طب الأسنان</h1>
        <p class="subtitle">اختبار شامل (80 سؤالاً) لطلاب وخريجي طب الأسنان</p>
        <button class="start-btn" onclick="startQuiz()">ابدأ الاختبار الآن</button>
    </div>

    <div id="quiz-area">
        <div class="q-header">
            <span id="q-num">سؤال 1 من 80</span>
            <span id="score">الدرجة: 0</span>
        </div>
        <div class="question-text" id="q-text"></div>
        <div class="options-grid" id="options"></div>
        
        <div class="explanation" id="exp-box">
            <strong style="font-size: 20px; color: var(--primary);">💡 التفسير العلمي:</strong>
            <p id="exp-text" style="font-size: 18px; margin-top: 10px;"></p>
            <button class="next-btn" onclick="nextQuestion()">السؤال التالي ←</button>
        </div>
    </div>

    <footer>
        تطوير وتصميم: د. زكريا محمد عطوني
    </footer>
</div>

<script>
const allQuestions = [
    // [1-10] Anatomy & Histology
    {q: "ما هو الجزء الوحيد في السن الذي ينشأ من طبقة الإكتوديرم؟", o: ["العاج", "المينا", "الملاط", "اللب"], c: 1, e: "المينا هي النسيج الوحيد الذي ينشأ من الإكتوديرم، بينما بقية أنسجة السن تنشأ من الميزنشيم المتوسط."},
    {q: "أي عصب يغذي الحس العام في الثلثين الأماميين من اللسان؟", o: ["العصب اللساني", "عصب الوجه", "العصب البلعومي", "تحت اللساني"], c: 0, e: "العصب اللساني (فرع من الفكي السفلي) مسؤول عن الحس العام، بينما الحبل الطبلي مسؤول عن التذوق."},
    {q: "كم عدد قنوات الرحى الأولى العلوية الأكثر شيوعاً؟", o: ["قناتان", "ثلاث قنوات", "أربع قنوات", "خمس قنوات"], c: 2, e: "غالباً ما توجد 4 قنوات بسبب وجود قناة ثانية في الجذر الأنسي الخدي (MB2)."},
    {q: "أين تفتح قناة الغدة النكفية (قناة ستينسون)؟", o: ["تحت اللسان", "مقابل الرحى الثانية العلوية", "مقابل الرحى الثانية السفلية", "خلف الرحى الثالثة"], c: 1, e: "تفتح قناة الغدة النكفية في دهليز الفم مقابل التاج الخاص بالرحى الثانية العلوية."},
    {q: "ما هو النسيج الذي يربط السن بالعظم السنخي؟", o: ["العاج", "الملاط", "أربطة حول السن", "المينا"], c: 2, e: "الأربطة حول السن (PDL) هي المسؤولة عن تثبيت السن وتوزيع قوى المضغ."},
    {q: "أي الخلايا مسؤولة عن إنتاج العاج؟", o: ["Ameloblasts", "Odontoblasts", "Cementoblasts", "Osteoblasts"], c: 1, e: "الأودنتوبلاست تصطف في محيط اللب وتفرز العاج طوال حياة السن."},
    {q: "المفصل الفكي الصدغي (TMJ) من النوع:", o: ["الليفي", "الغضروفي", "الرزي المنزلق", "الثابت"], c: 2, e: "هو مفصل زليلي يسمح بحركات الدوران والانزلاق (Ginglymoarthrodial)."},
    {q: "ما هو السن الدائم الذي يبزغ دون وجود سلف لبني له؟", o: ["الناب", "الضاحك الأول", "الرحى الأولى", "القاطع المركزي"], c: 2, e: "الأرحاء الدائمة تبزغ خلف الأسنان اللبنية دون استبدال أي سن لبني."},
    {q: "أطول جذر في الأسنان البشرية هو جذر:", o: ["الناب العلوي", "الرحى الأولى", "الناب السفلي", "الضاحك الثاني"], c: 0, e: "يتميز الناب العلوي بأطول جذر لضمان الثبات في عظم الفك."},
    {q: "نسبة المواد المعدنية في مينا الأسنان تبلغ حوالي:", o: ["70%", "96%", "50%", "30%"], c: 1, e: "تعتبر المينا أقسى نسيج في الجسم بسبب احتوائها على 96% هيدروكسي أباتيت."},

    // [11-20] Restorative Dentistry
    {q: "أي مادة تمنع بلمرة الكومبوزيت إذا وضعت تحته؟", o: ["GIC", "ZOE", "Calcium Hydroxide", "Varnish"], c: 1, e: "الأوجينول الموجود في ZOE يعيق تفاعل البلمرة الخاص بالحشوات الضوئية."},
    {q: "ما هو تركيز حمض الفوسفوريك القياسي للتخريش؟", o: ["10%", "37%", "50%", "100%"], c: 1, e: "يستخدم تركيز 37% لخلق مسامية مجهرية لزيادة قوة الارتباط."},
    {q: "تصنيف بلاك الدرجة الثانية (Class II) يخص:", o: ["الأسطح الطاحنة", "الأسطح الملاصقة للخلفيات", "الأسطح الملاصقة للأماميات", "عنق السن"], c: 1, e: "تشمل الدرجة الثانية نخور الأسطح المتلاصقة (Proximal) في الأرحاء والضواحك."},
    {q: "ظاهرة C-factor في الكومبوزيت تزداد في:", o: ["الحفر الكبيرة", "الحفر الضيقة والعميقة (صنف 1)", "قشور الفينير", "الأسطح الطاحنة المفتوحة"], c: 1, e: "كلما زاد عدد الجدران المرتبطة (مثل صنف 1)، زادت قوى التقلص والجهد على الجدران."},
    {q: "أي مادة تفرز الفلورايد وتعتبر حيوية مع السن؟", o: ["الأملغم", "الكومبوزيت", "الإسمنت الزجاجي (GIC)", "الأكريل"], c: 2, e: "الـ GIC يتميز بخاصية إطلاق الفلورايد والارتباط الكيميائي بالعاج."},
    {q: "ما هو المكون المسؤول عن تقليل التقلص في الكومبوزيت؟", o: ["الراتنج", "الحشوات (Fillers)", "البادئ الضوئي", "السيلان"], c: 1, e: "زيادة نسبة الحشوات (الفيلر) تحسن الخواص الميكانيكية وتقلل تقلص البلمرة."},
    {q: "الطبقة الشائبة (Smear Layer) تتكون نتيجة:", o: ["اللعاب", "استخدام السنابل (Bur)", "الحمض", "الفلورايد"], c: 1, e: "هي طبقة من حطام العاج والبكتيريا تنتج عن عملية تحضير السن ميكانيكياً."},
    {q: "يستخدم 'الوتد' (Wedge) مع المصفوفة (Matrix) لـ:", o: ["تثبيت الحشوة", "منع التجاوز اللثوي وتوفير تماس صحيح", "تبييض السن", "تسكين الألم"], c: 1, e: "يضمن الوتد عدم خروج المادة الترميمية لأسفل اللثة وضغط المصفوفة لإنشاء نقطة تماس."},
    {q: "افضل طريقة لعزل ساحة العمل في الترميم:", o: ["القطن", "ماص اللعاب", "الحاجز المطاطي (Rubber Dam)", "تيار الهواء"], c: 2, e: "يعتبر الحاجز المطاطي الوسيلة الوحيدة لضمان جفاف تام ومنع التلوث."},
    {q: "تآكل السن نتيجة الاحتكاك الميكانيكي بجسم خارجي يسمى:", o: ["Attrition", "Erosion", "Abrasion", "Abfraction"], c: 2, e: "الـ Abrasion ناتج عن عوامل خارجية مثل فرشاة الأسنان الخشنة."},

    // [21-30] Endodontics
    {q: "أهم سائل لإرواء القنوات وتدبير النسيج العضوي هو:", o: ["الماء", "هايبوكلوريت الصوديوم", "الكحول", "سيروم ملحي"], c: 1, e: "NaOCl يتميز بقدرته الفريدة على إذابة بقايا اللب وقتل البكتيريا."},
    {q: "مادة الـ EDTA تستخدم في علاج الجذور لـ:", o: ["حشو القناة", "إزالة الطبقة الشائبة (Chelation)", "تخدير العصب", "تبييض السن"], c: 1, e: "تعمل EDTA على إزالة المكونات غير العضوية وتوسيع القنوات الضيقة."},
    {q: "يتم تحديد الطول العامل (Working Length) بـ:", o: ["نهاية الجذر الشعاعية", "1 ملم قبل الذروة الشعاعية", "5 ملم قبل الذروة", "عند مستوى العنق"], c: 1, e: "يجب إنهاء التحضير قبل 0.5 إلى 1 ملم من الذروة لتجنب أذية الأنسجة حول السنية."},
    {q: "مادة حشو الجذور (الكوتابيركا) تعتبر مادة:", o: ["قابلة للامتصاص", "خاملة حيوياً ولدنة بالحرارة", "سائلة", "معدنية"], c: 1, e: "الكوتابيركا مادة مثالية لأنها لا تسبب حساسية وتتكيف مع شكل القناة بالحرارة."},
    {q: "التهاب اللب المرتد (Reversible) يتميز بـ:", o: ["ألم مستمر ليلاً", "ألم يزول بزوال المنبه (مثل البارد)", "وجود خراج", "تورم في الوجه"], c: 1, e: "في النوع المرتد، يكون الألم لحظياً ولا يتطلب علاج جذور بل حشوة بسيطة."},
    {q: "ما هو الهدف من عملية (Obturation)؟", o: ["توسيع القناة", "ختم القناة ثلاثي الأبعاد ومنع التسرب", "قتل البكتيريا", "تبييض التاج"], c: 1, e: "الهدف هو سد الفراغ تماماً لمنع دخول البكتيريا من التاج أو الذروة."},
    {q: "جهاز الـ Apex Locator يستخدم لـ:", o: ["حفر السن", "تحديد مكان الذروة إلكترونياً", "قياس قوة العض", "تعقيم الأدوات"], c: 1, e: "يعتمد على المقاومة الكهربائية لتحديد نهاية القناة بدقة عالية."},
    {q: "ظاهرة الـ Flare-up تعني:", o: ["نجاح العلاج", "ألم وتورم مفاجئ بعد جلسة العلاج", "تخلخل السن", "تغير لون السن"], c: 1, e: "هي اختلاط يحدث نتيجة دفع البكتيريا خارج الذروة أثناء العمل."},
    {q: "أهم سبب لفشل علاج الجذور هو:", o: ["نوع الحشوة", "وجود بكتيريا متبقية أو تسرب تاجي", "عمر المريض", "جنس المريض"], c: 1, e: "التنظيف غير الكافي أو الفشل في الختم التاجي يسمح للبكتيريا بالنمو مجدداً."},
    {q: "يستخدم الكالسيوم هيدروكسيد كضماد داخل القناة لـ:", o: ["تسكين الألم فقط", "تطهير القناة وتحفيز الشفاء", "تثبيت الكوتابيركا", "تقليل النزف"], c: 1, e: "يتميز بوسط قلوي يقتل البكتيريا ويساعد في ترميم العظم حول الذروة."},

    // [31-40] Oral Surgery & Anesthesia
    {q: "المخدر الموضعي الأكثر أماناً للحوامل (فئة B) هو:", o: ["ليدوكائين", "بريلوكائين", "ميبفاكائين", "أرتيكائين"], c: 0, e: "الليدوكائين هو الخيار الأول والأكثر أماناً للاستخدام أثناء الحمل."},
    {q: "وظيفة الأدرينالين في حقنة التخدير:", o: ["زيادة مفعول التخدير وتقليل السمية", "توسيع الأوعية", "تسكين الألم", "تحسين طعم المحلول"], c: 0, e: "يعمل كقابض للأوعية، مما يبقي المخدر في مكانه لفترة أطول ويقلل النزف."},
    {q: "المضاعفة الأكثر شيوعاً بعد خلع رحى عقل سفلية:", o: ["كسر الفك", "السنخ الجاف (Dry Socket)", "فقدان البصر", "الحساسية"], c: 1, e: "يحدث السنخ الجاف نتيجة فشل تكون الخثرة الدموية ويسبب ألماً شديداً."},
    {q: "العصب المسؤول عن تخدير الشفة السفلى هو:", o: ["العصب الوجهي", "العصب السنخي السفلي", "العصب الحنكي", "العصب اللساني"], c: 1, e: "العصب السنخي السفلي يعطي العصب الذقني المسؤول عن حس الشفة السفلى."},
    {q: "أقصى جرعة ليدوكائين (2%) مع أدرينالين هي:", o: ["2 ملغ/كغ", "4.4 ملغ/كغ", "7 ملغ/كغ", "10 ملغ/كغ"], c: 2, e: "الجرعة الآمنة القصوى للبالغ هي 7 ملغ لكل كغم (بحدود 500 ملغ إجمالاً)."},
    {q: "يستخدم المصعد (Elevator) في الجراحة لـ:", o: ["خلع السن مباشرة", "خلخلة السن وتمزيق الأربطة", "حفر العظم", "خياطة الجرح"], c: 1, e: "المصعد يسهل عملية الخلع عبر فك ارتباط السن بالعظم قبل استخدام الكلابة."},
    {q: "الحالة التي يمنع فيها الخلع تماماً هي:", o: ["مريض سكري منضبط", "وجود ورم وعائي غير معالج في منطقة الخلع", "مريض ضغط", "التهاب لثة"], c: 1, e: "الخلع في منطقة ورم وعائي (Hemangioma) قد يؤدي لنزف قاتل."},
    {q: "تخدير العصب السنخي العلوي الخلفي (PSA) يغطي:", o: ["جميع الأرحاء العلوية", "الأرحاء العلوية عدا الجذر الأنسي للرحى 1", "الضواحك", "الأنياب"], c: 1, e: "هذا العصب لا يغذي غالباً الجذر الأنسي الخدي للرحى الأولى العلوية."},
    {q: "ما هو الـ Trismus؟", o: ["نزف لثوي", "تشنج عضلات المضغ وصعوبة فتح الفم", "رائحة كريهة", "تخلخل أسنان"], c: 1, e: "يحدث غالباً بعد حقنة العصب السفلي أو نتيجة التهاب حول سن العقل."},
    {q: "يجب تجنب القابض الوعائي (الأدرينالين) لدى مرضى:", o: ["السكري", "فرط نشاط الغدة الدرقية غير المنضبط", "الحوامل", "الأطفال"], c: 1, e: "الأدرينالين قد يسبب أزمة قلبية لدى مرضى فرط نشاط الدرق غير المستقر."},

    // [41-50] Periodontics
    {q: "التهاب اللثة (Gingivitis) يتميز عن التهاب الداعم السني بـ:", o: ["وجود نزف", "أنه قابل للتراجع (Reversible) ولا فقد عظمي فيه", "وجود ألم", "تغير لون اللثة"], c: 1, e: "التهاب اللثة هو حالة سطحية، بينما التهاب الداعم (Periodontitis) يشمل فقدان العظم والأربطة."},
    {q: "العمق الطبيعي للميزاب اللثوي (Sulcus) هو:", o: ["1-3 ملم", "5-7 ملم", "10 ملم", "0 ملم"], c: 0, e: "القياس الصحي والاعتيادي يتراوح بين 1 إلى 3 ملم باستخدام المسبار اللثوي."},
    {q: "المسبب الرئيسي لأمراض اللثة هو:", o: ["السكر", "اللويحة الجرثومية (Biofilm)", "وراثة فقط", "نقص الكالسيوم"], c: 1, e: "تراكم البكتيريا في طبقة البلاك هو المحرك الأساسي للاستجابة الالتهابية."},
    {q: "ما هو الجير (Calculus)؟", o: ["بقايا طعام", "لويحة جرثومية متكلسة", "تسوس عاج", "تصبغات"], c: 1, e: "الجير هو بلاك صلب لا يمكن إزالته بالفرشاة بل يتطلب تنظيفاً احترافياً."},
    {q: "أخطر أنواع البكتيريا المرتبطة بالتهاب الداعم السني هي:", o: ["P. gingivalis", "S. mutans", "Lactobacillus", "S. salivarius"], c: 0, e: "تعتبر P. gingivalis من الممرضات الرئيسية للأنسجة الداعمة."},
    {q: "تضخم اللثة قد يكون عرضاً جانبياً لدواء:", o: ["البنادول", "الفينيتوئين (للصرع)", "الأموكسيسيلين", "الفيتامينات"], c: 1, e: "الفينيتوئين، والسيكلوسبورين، وحاصرات قنوات الكالسيوم تسبب تضخماً لثوياً."},

];

let currentQ = 0;
let score = 0;

function startQuiz() {
    document.getElementById('cover').style.display = 'none';
    document.getElementById('quiz-area').style.display = 'block';
    loadQuestion();
}

function loadQuestion() {
    const qData = allQuestions[currentQ];
    document.getElementById('q-num').innerText = `سؤال ${currentQ + 1} من ${allQuestions.length}`;
    document.getElementById('q-text').innerText = qData.q;
    document.getElementById('exp-box').style.display = 'none';
    
    const optionsDiv = document.getElementById('options');
    optionsDiv.innerHTML = '';

    qData.o.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = opt;
        btn.onclick = () => checkAnswer(idx, qData.c, qData.e);
        optionsDiv.appendChild(btn);
    });
}

function checkAnswer(selected, correct, exp) {
    const btns = document.querySelectorAll('.option-btn');
    if (selected === correct) {
        btns[selected].classList.add('correct');
        score++;
    } else {
        btns[selected].classList.add('wrong');
        btns[correct].classList.add('correct');
    }
    
    btns.forEach(b => b.disabled = true);
    document.getElementById('score').innerText = `الدرجة: ${score}`;
    document.getElementById('exp-text').innerText = exp;
    document.getElementById('exp-box').style.display = 'block';
}

function nextQuestion() {
    currentQ++;
    if (currentQ < allQuestions.length) {
        loadQuestion();
    } else {
        showFinalResult();
    }
}

function showFinalResult() {
    const percentage = Math.round((score / allQuestions.length) * 100);
    let msg = percentage >= 60 ? "أحسنت دكتور! نتيجتك ممتازة." : "تحتاج لمراجعة بعض المعلومات دكتور.";
    
    document.getElementById('quiz-area').innerHTML = `
        <div class="logo">🎓</div>
        <h2>اكتمل الاختبار!</h2>
        <p style="font-size: 26px;">لقد أجبت على ${score} من ${allQuestions.length} بشكل صحيح.</p>
        <p style="font-size: 22px; color: var(--accent); font-weight: bold;">نسبتك: ${percentage}%</p>
        <p style="font-size: 20px;">${msg}</p>
        <button class="start-btn" onclick="location.reload()">إعادة الاختبار</button>
    `;
}
