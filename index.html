<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مدرب طب الأسنان</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:#e5e7eb;
text-align:center;
}

header{
background:#111827;
padding:18px;
font-size:20px;
font-weight:bold;
}

.container{
padding:20px;
max-width:600px;
margin:auto;
}

.case{
background:#1f2937;
padding:20px;
border-radius:12px;
margin-bottom:15px;
font-size:18px;
}

.btn{
display:block;
margin:10px auto;
padding:12px;
width:100%;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
background:#374151;
color:white;
transition:0.2s;
}

.btn:hover{background:#4b5563;}

.correct{background:#16a34a !important;}
.wrong{background:#dc2626 !important;}

.next{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:8px;
background:#38bdf8;
font-weight:bold;
cursor:pointer;
display:none;
}

footer{
margin-top:30px;
padding:15px;
font-size:12px;
opacity:0.6;
}
</style>
</head>

<body>

<header>🦷 مدرب الحالات السريرية</header>

<div class="container">

<div id="question" class="case"></div>

<div id="answers"></div>

<button class="next" id="nextBtn" onclick="nextQ()">التالي ➜</button>

<div id="end" style="display:none;font-size:18px;margin-top:20px;"></div>

</div>

<footer>
تصميم وتطوير: د. زكريا عطوني - سوريا
</footer>

<script>

const data = [
{
q:"مريض ألم شديد مع تسوس عميق",
options:[
"التهاب لب غير عكوس",
"التهاب لثة بسيط",
"تآكل مينا",
"حساسية عاجية"
],
answer:0
},
{
q:"نزف لثة مع جيوب 5mm",
options:[
"التهاب دواعم سن مزمن",
"تسوس سطحي",
"كسر تاجي",
"تآكل عنقي"
],
answer:0
},
{
q:"ضرس عقل مطمور",
options:[
"انطمار ضرس عقل",
"التهاب جيوب",
"تسوس عنقي",
"كسر جذر"
],
answer:0
},
{
q:"طفل مع تسوس متعدد",
options:[
"تسوس طفولي منتشر",
"حساسية عاجية",
"تآكل",
"صدمة إطباق"
],
answer:0
},
{
q:"كسر سن أمامي",
options:[
"كسر تاجي",
"التهاب لثة",
"خراج",
"تصبغ"
],
answer:0
},
{
q:"ألم عند المضغ + سن داكن",
options:[
"نخر لب",
"التهاب جيوب",
"حساسية بسيطة",
"تآكل مينا"
],
answer:0
}
];

let current=0;
let score=0;

function loadQ(){

if(current>=data.length){
end();
return;
}

document.getElementById("nextBtn").style.display="none";

let q=data[current];

document.getElementById("question").innerText=q.q;

let html="";
q.options.forEach((opt,i)=>{
html+=`<button class="btn" onclick="check(${i})">${opt}</button>`;
});

document.getElementById("answers").innerHTML=html;
}

function check(i){

let buttons=document.querySelectorAll(".btn");
let correct=data[current].answer;

buttons.forEach((b,idx)=>{
if(idx===correct) b.classList.add("correct");
if(idx===i && i!==correct) b.classList.add("wrong");
b.disabled=true;
});

if(i===correct) score++;

document.getElementById("nextBtn").style.display="inline-block";
}

function nextQ(){
current++;
loadQ();
}

function end(){
document.getElementById("question").style.display="none";
document.getElementById("answers").style.display="none";
document.getElementById("nextBtn").style.display="none";

document.getElementById("end").style.display="block";
document.getElementById("end").innerHTML=
"انتهى الاختبار 🧠<br>نتيجتك: " + score + " / " + data.length;
}

loadQ();

</script>

</body>
</html>
